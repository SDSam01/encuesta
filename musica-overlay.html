<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Música Overlay</title>
<style>*{margin:0;padding:0;}body{background:transparent;width:1px;height:1px;overflow:hidden;}</style>
</head>
<body>
<script>
// ══ SDSAM01 — Adaptive Music Overlay ══
// 100% Web Audio API — sin copyright
// ENCUESTA: Hip-hop chill con sax simulado, energía constante
// 1VS1:     Música de pelea intensa, tipo luchador

let ac = null, masterGain = null;
let pollNodes = [], vsNodes = [];
let currentMode = 'idle';
let lastPollActive = false, lastManual = false, lastVolume = 0.6;
let pollLoopTimer = null;

function getAC(){
  if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(ac.state!=='running') ac.resume().catch(()=>{});
  return ac;
}

const _wu=setInterval(()=>{
  const a=getAC();
  if(a&&a.state==='running'){
    masterGain=a.createGain(); masterGain.connect(a.destination);
    masterGain.gain.value=lastVolume; clearInterval(_wu);
  }
},500);

// ══════════════════════════════════════════════
// ENCUESTA: Hip-Hop Chill con Sax — energía CONSTANTE
// BPM: 90 — no escala, solo fade in/out
// ══════════════════════════════════════════════
function startPollMusic(){
  if(currentMode==='poll') return;
  stopAll(false); currentMode='poll';
  const a=getAC(); if(!a||!masterGain) return;
  pollNodes=[];

  // Fade in suave
  masterGain.gain.cancelScheduledValues(a.currentTime);
  masterGain.gain.setValueAtTime(0, a.currentTime);
  masterGain.gain.linearRampToValueAtTime(lastVolume, a.currentTime+1.5);

  schedulePollLoop(a);
}

function schedulePollLoop(a){
  const BPM=90, beat=60/BPM, bar=beat*4;
  let t=a.currentTime+0.1;
  const BARS=8; // 8 compases y repite

  function oneLoop(){
    if(currentMode!=='poll') return;
    playHipHopLoop(a, t, BARS, bar, beat, pollNodes);
    t+=BARS*bar;
    pollLoopTimer=setTimeout(oneLoop,(BARS*bar-0.1)*1000);
  }
  oneLoop();
}

function playHipHopLoop(a, start, bars, bar, beat, nodes){
  const t=start;
  const beats=bars*4;

  for(let i=0;i<beats;i++){
    const bt=t+i*beat;

    // KICK — tiempos 1 y 3 (+ variaciones)
    if(i%4===0 || i%4===2){
      const kick=a.createOscillator(); kick.type='sine';
      kick.frequency.setValueAtTime(80,bt); kick.frequency.exponentialRampToValueAtTime(30,bt+0.15);
      const kg=a.createGain();
      kg.gain.setValueAtTime(0.5,bt); kg.gain.exponentialRampToValueAtTime(0.001,bt+0.2);
      kick.connect(kg); kg.connect(masterGain);
      kick.start(bt); kick.stop(bt+0.22); nodes.push(kick,kg);
      // Clic extra del kick
      const buf=a.createBuffer(1,Math.floor(a.sampleRate*0.03),a.sampleRate);
      const d=buf.getChannelData(0);
      for(let k=0;k<d.length;k++) d[k]=(Math.random()*2-1)*Math.pow(1-k/d.length,3);
      const ns=a.createBufferSource(); ns.buffer=buf;
      const ng=a.createGain(); ng.gain.setValueAtTime(0.2,bt);
      ns.connect(ng); ng.connect(masterGain); ns.start(bt); nodes.push(ns,ng);
    }

    // SNARE — tiempos 2 y 4
    if(i%4===1 || i%4===3){
      const sbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.12),a.sampleRate);
      const sd=sbuf.getChannelData(0);
      for(let k=0;k<sd.length;k++) sd[k]=(Math.random()*2-1)*Math.pow(1-k/sd.length,1.8);
      const ss=a.createBufferSource(); ss.buffer=sbuf;
      const sf=a.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=800; sf.Q.value=0.8;
      const sg=a.createGain(); sg.gain.setValueAtTime(0.25,bt); sg.gain.exponentialRampToValueAtTime(0.001,bt+0.12);
      ss.connect(sf); sf.connect(sg); sg.connect(masterGain); ss.start(bt);
      nodes.push(ss,sf,sg);
    }

    // HI-HAT — cada 8vo (cada medio beat)
    for(let h=0;h<2;h++){
      const ht=bt+h*(beat/2);
      const hbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.04),a.sampleRate);
      const hd=hbuf.getChannelData(0);
      for(let k=0;k<hd.length;k++) hd[k]=(Math.random()*2-1)*Math.pow(1-k/hd.length,2.5);
      const hs=a.createBufferSource(); hs.buffer=hbuf;
      const hf=a.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=8000;
      const hg=a.createGain(); const vol=h===0?0.12:0.06;
      hg.gain.setValueAtTime(vol,ht); hg.gain.exponentialRampToValueAtTime(0.001,ht+0.04);
      hs.connect(hf); hf.connect(hg); hg.connect(masterGain); hs.start(ht);
      nodes.push(hs,hf,hg);
    }
  }

  // BAJO — línea de 2 compases en loop
  const bassNotes=[55,55,49,55, 55,55,52,49]; // A A E A / A A Ab E
  bassNotes.forEach((freq,i)=>{
    const bt2=t+i*(bar/2);
    const bass=a.createOscillator(); bass.type='triangle'; bass.frequency.value=freq;
    const lfo=a.createOscillator(); lfo.type='sine'; lfo.frequency.value=4;
    const lfoG=a.createGain(); lfoG.gain.value=2;
    lfo.connect(lfoG); lfoG.connect(bass.frequency);
    const bfilt=a.createBiquadFilter(); bfilt.type='lowpass'; bfilt.frequency.value=200;
    const bg=a.createGain();
    bg.gain.setValueAtTime(0,bt2); bg.gain.linearRampToValueAtTime(0.3,bt2+0.02);
    bg.gain.setValueAtTime(0.28,bt2+bar/2-0.08); bg.gain.linearRampToValueAtTime(0,bt2+bar/2);
    bass.connect(bfilt); bfilt.connect(bg); bg.connect(masterGain);
    bass.start(bt2); bass.stop(bt2+bar/2+0.05); lfo.start(bt2); lfo.stop(bt2+bar/2+0.05);
    nodes.push(bass,bfilt,bg,lfo,lfoG);
  });

  // SAXOFÓN — melodía pentatónica menor en loop de 2 bars
  // A menor pentatónica: A3=220, C4=261.6, D4=293.7, E4=329.6, G4=392
  const saxMelody=[
    {f:220,  d:0.4, o:0},
    {f:261.6,d:0.2, o:0.5},
    {f:293.7,d:0.3, o:0.75},
    {f:329.6,d:0.4, o:1.1},
    {f:261.6,d:0.3, o:1.6},
    {f:220,  d:0.5, o:2.0},
    {f:196,  d:0.3, o:2.6},
    {f:220,  d:0.4, o:3.0},
    // barra 2
    {f:293.7,d:0.3, o:3.5},
    {f:329.6,d:0.4, o:3.9},
    {f:392,  d:0.3, o:4.4},
    {f:329.6,d:0.2, o:4.8},
    {f:293.7,d:0.5, o:5.1},
    {f:261.6,d:0.3, o:5.7},
    {f:220,  d:0.6, o:6.1},
  ];

  for(let rep=0;rep<Math.ceil(bars/2);rep++){
    const repT=t+rep*bar*2;
    if(repT+bar*2 > t+bars*bar+0.1) break;
    saxMelody.forEach(note=>{
      const nt=repT+note.o*beat;
      if(nt>t+bars*bar) return;
      // Sax = sawtooth + bandpass (timbre de lengüeta)
      const sax=a.createOscillator(); sax.type='sawtooth';
      sax.frequency.value=note.f;
      // Vibrato sutil
      const vib=a.createOscillator(); vib.type='sine'; vib.frequency.value=5.5;
      const vibG=a.createGain(); vibG.gain.value=3;
      vib.connect(vibG); vibG.connect(sax.frequency);
      // Filtro de sax
      const f1=a.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=1800; f1.Q.value=3;
      const f2=a.createBiquadFilter(); f2.type='peaking'; f2.frequency.value=900; f2.Q.value=2; f2.gain.value=8;
      const sg=a.createGain();
      sg.gain.setValueAtTime(0,nt);
      sg.gain.linearRampToValueAtTime(0.14,nt+0.04);
      sg.gain.setValueAtTime(0.12,nt+note.d*beat-0.05);
      sg.gain.linearRampToValueAtTime(0,nt+note.d*beat);
      sax.connect(f1); f1.connect(f2); f2.connect(sg); sg.connect(masterGain);
      sax.start(nt); sax.stop(nt+note.d*beat+0.05);
      vib.start(nt); vib.stop(nt+note.d*beat+0.05);
      nodes.push(sax,f1,f2,sg,vib,vibG);
    });
  }
}

// ══════════════════════════════════════════════
// 1VS1: Batalla intensa — tipo pelea/combate
// BPM: 120 — agresivo, con impacto
// ══════════════════════════════════════════════
function startVsMusic(){
  if(currentMode==='vs') return;
  stopAll(false); currentMode='vs';
  const a=getAC(); if(!a||!masterGain) return;
  vsNodes=[];

  masterGain.gain.cancelScheduledValues(a.currentTime);
  masterGain.gain.setValueAtTime(0,a.currentTime);
  masterGain.gain.linearRampToValueAtTime(lastVolume,a.currentTime+0.8);

  scheduleVsLoop(a);
}

function scheduleVsLoop(a){
  const BPM=115, beat=60/BPM, bar=beat*4;
  let t=a.currentTime+0.1;
  const BARS=4;

  function loop(){
    if(currentMode!=='vs') return;
    playVsLoop(a,t,BARS,bar,beat,vsNodes);
    t+=BARS*bar;
    // Usar setTimeout para el siguiente loop
    const loopDuration=(BARS*bar-0.1)*1000;
    pollLoopTimer=setTimeout(loop, loopDuration);
  }
  loop();
}

function playVsLoop(a,start,bars,bar,beat,nodes){
  const t=start;
  const beats=bars*4;

  for(let i=0;i<beats;i++){
    const bt=t+i*beat;

    // KICK DURO en cada beat
    const kick=a.createOscillator(); kick.type='sine';
    kick.frequency.setValueAtTime(100+(i%4===0?20:0),bt);
    kick.frequency.exponentialRampToValueAtTime(30,bt+0.2);
    const kg=a.createGain();
    const kickVol=i%4===0?0.8:i%4===2?0.5:0.25;
    kg.gain.setValueAtTime(kickVol,bt); kg.gain.exponentialRampToValueAtTime(0.001,bt+0.25);
    kick.connect(kg); kg.connect(masterGain);
    kick.start(bt); kick.stop(bt+0.28); nodes.push(kick,kg);

    // SNARE marcial — tiempos 2 y 4
    if(i%4===1||i%4===3){
      const sbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.15),a.sampleRate);
      const sd=sbuf.getChannelData(0);
      for(let k=0;k<sd.length;k++) sd[k]=(Math.random()*2-1)*Math.pow(1-k/sd.length,1.5);
      const ss=a.createBufferSource(); ss.buffer=sbuf;
      const sf=a.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=600; sf.Q.value=0.5;
      const sg=a.createGain(); sg.gain.setValueAtTime(0.45,bt); sg.gain.exponentialRampToValueAtTime(0.001,bt+0.15);
      ss.connect(sf); sf.connect(sg); sg.connect(masterGain); ss.start(bt);
      nodes.push(ss,sf,sg);
    }
  }

  // BAJO AGRESIVO — potente
  const bass2Notes=[55,55,58,55, 55,49,52,49];
  bass2Notes.forEach((freq,i)=>{
    const bt2=t+i*(bar/2);
    const bass=a.createOscillator(); bass.type='sawtooth'; bass.frequency.value=freq;
    const dist=a.createWaveShaper();
    const k=30;
    const curve=new Float32Array(256);
    for(let ci=0;ci<256;ci++){const x=ci*2/256-1; curve[ci]=(Math.PI+k)*x/(Math.PI+k*Math.abs(x));}
    dist.curve=curve;
    const bf=a.createBiquadFilter(); bf.type='lowpass'; bf.frequency.value=150;
    const bg=a.createGain();
    bg.gain.setValueAtTime(0,bt2); bg.gain.linearRampToValueAtTime(0.35,bt2+0.01);
    bg.gain.setValueAtTime(0.3,bt2+bar/2-0.05); bg.gain.linearRampToValueAtTime(0,bt2+bar/2);
    bass.connect(dist); dist.connect(bf); bf.connect(bg); bg.connect(masterGain);
    bass.start(bt2); bass.stop(bt2+bar/2+0.05); nodes.push(bass,dist,bf,bg);
  });

  // CUERDAS OSCURAS — acorde tenso de batalla
  const chordFreqs=[110,130.8,164.8]; // A2, C3, E3 menor
  chordFreqs.forEach(freq=>{
    const o=a.createOscillator(); o.type='sawtooth'; o.frequency.value=freq;
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=400;
    const g=a.createGain();
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.1,t+0.3);
    g.gain.setValueAtTime(0.1,t+bars*bar-0.3); g.gain.linearRampToValueAtTime(0,t+bars*bar);
    o.connect(f); f.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+bars*bar+0.1); nodes.push(o,f,g);
  });

  // IMPACTOS dramáticos en tiempos fuertes (cada 2 compases)
  for(let bar2=0;bar2<bars;bar2+=2){
    const it=t+bar2*bar;
    const imp=a.createOscillator(); imp.type='sine';
    imp.frequency.setValueAtTime(150,it); imp.frequency.exponentialRampToValueAtTime(40,it+0.5);
    const ig=a.createGain();
    ig.gain.setValueAtTime(0.5,it); ig.gain.exponentialRampToValueAtTime(0.001,it+0.55);
    imp.connect(ig); ig.connect(masterGain);
    imp.start(it); imp.stop(it+0.6); nodes.push(imp,ig);
  }
}

// ══ Stop & Fade ══
function stopAll(fade){
  currentMode='idle';
  if(pollLoopTimer){clearTimeout(pollLoopTimer);pollLoopTimer=null;}
  if(!ac||!masterGain) return;
  if(fade){
    const tv=ac.currentTime;
    masterGain.gain.cancelScheduledValues(tv);
    masterGain.gain.setValueAtTime(masterGain.gain.value,tv);
    masterGain.gain.linearRampToValueAtTime(0,tv+1.5);
    setTimeout(()=>{
      pollNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
      vsNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
      pollNodes=[]; vsNodes=[];
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.setValueAtTime(lastVolume,ac.currentTime);
    },1600);
  } else {
    pollNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
    vsNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
    pollNodes=[]; vsNodes=[];
  }
}

// ══ Loop principal de control ══
setInterval(()=>{
  if(!ac||!masterGain) return;
  try{
    const ms=JSON.parse(localStorage.getItem('music_state')||'{}');
    const vol=ms.volume!==undefined?ms.volume:0.6;
    if(vol!==lastVolume){
      lastVolume=vol;
      if(currentMode!=='idle'){
        masterGain.gain.cancelScheduledValues(ac.currentTime);
        masterGain.gain.setTargetAtTime(vol,ac.currentTime,0.2);
      }
    }
    const manual=!!ms.manual;
    if(manual!==lastManual){
      lastManual=manual;
      if(manual) startVsMusic();
      else stopAll(true);
      return;
    }
    if(manual) return;
    const ps=JSON.parse(localStorage.getItem('poll_state')||'{}');
    const pollActive=!!(ps.active&&ps.timerEnd&&ps.timerEnd>Date.now());
    if(pollActive!==lastPollActive){
      lastPollActive=pollActive;
      if(pollActive) startPollMusic();
      else stopAll(true);
    }
  }catch(e){}
},600);
</script>
</body>
