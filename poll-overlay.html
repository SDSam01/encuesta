<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poll Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;font-family:'DM Sans',sans-serif;overflow:hidden;}

#overlay{
  position:fixed;bottom:30px;left:30px;width:360px;
  opacity:0;transition:opacity .4s;
}
#overlay.visible{opacity:1;}

.ov-wrap{
  background:rgba(8,8,15,0.92);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:18px 20px 16px;
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
}

.ov-timer{
  font-family:'Bebas Neue',sans-serif;font-size:32px;
  text-align:center;color:#fff;letter-spacing:3px;
  margin-bottom:10px;display:none;
}
.ov-timer.urgent{color:#ff4d6d;animation:pulse .5s infinite alternate;}
@keyframes pulse{to{opacity:.4}}

.ov-question{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:1.5px;color:#fff;margin-bottom:14px;line-height:1.1;
}

.ov-opt{margin-bottom:9px;}
.ov-bar-bg{
  height:44px;border-radius:8px;
  background:rgba(255,255,255,0.04);overflow:hidden;position:relative;
}
.ov-bar-fill{
  height:100%;border-radius:8px;position:absolute;left:0;top:0;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.fill-a{background:linear-gradient(90deg,rgba(255,184,0,.45),rgba(255,184,0,.18));}
.fill-b{background:linear-gradient(90deg,rgba(204,17,0,.45),rgba(204,17,0,.18));}
.ov-bar-content{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:space-between;padding:0 12px;
}
.ov-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;}
.name-a{color:#FFB800;} .name-b{color:#CC1100;}
.ov-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;transition:font-size .3s;}
.pct-a{color:#FFB800;} .pct-b{color:#CC1100;}
.ov-votes{font-size:11px;color:rgba(255,255,255,.3);font-weight:500;margin-top:3px;padding-left:2px;}

.ov-comeback{
  text-align:center;font-family:'Bebas Neue',sans-serif;
  font-size:15px;letter-spacing:2px;color:#ffd700;
  margin-top:6px;min-height:18px;
}
.ov-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:9px;
  border-top:1px solid rgba(255,255,255,0.06);
}
.ov-total{font-size:11px;color:rgba(255,255,255,.28);font-weight:500;}
</style>
</head>
<body>
<div id="overlay">
<div class="ov-wrap">
  <div class="ov-timer" id="ovTimer">2:00</div>
  <div class="ov-question" id="ovQ">¿Qué eligen?</div>

  <div class="ov-opt">
    <div class="ov-bar-bg">
      <div class="ov-bar-fill fill-a" id="barA" style="width:50%"></div>
      <div class="ov-bar-content">
        <span class="ov-name name-a" id="ovNameA">HOMER</span>
        <span class="ov-pct pct-a" id="ovPctA">50%</span>
      </div>
    </div>
    <div class="ov-votes"><span id="ovVotesA">0</span> votos</div>
  </div>

  <div class="ov-opt">
    <div class="ov-bar-bg">
      <div class="ov-bar-fill fill-b" id="barB" style="width:50%"></div>
      <div class="ov-bar-content">
        <span class="ov-name name-b" id="ovNameB">BART</span>
        <span class="ov-pct pct-b" id="ovPctB">50%</span>
      </div>
    </div>
    <div class="ov-votes"><span id="ovVotesB">0</span> votos</div>
  </div>

  <div class="ov-comeback" id="ovComeback"></div>
  <div class="ov-footer">
    <div class="ov-total" id="ovTotal">0 votos totales</div>
  </div>
</div>
</div>

<script>
const LS = 'poll_state';
let prevState = null;
let prevLeader = null, prevDiff = 0;

function render(s) {
  const vA = s.vA || 0, vB = s.vB || 0;
  const total = vA + vB;
  const pA = total === 0 ? 50 : Math.round(vA / total * 100);
  const pB = total === 0 ? 50 : 100 - pA;

  document.getElementById('ovQ').textContent      = s.question || '¿Qué eligen?';
  document.getElementById('ovNameA').textContent  = (s.nameA || 'A').toUpperCase();
  document.getElementById('ovNameB').textContent  = (s.nameB || 'B').toUpperCase();
  document.getElementById('barA').style.width     = pA + '%';
  document.getElementById('barB').style.width     = pB + '%';
  document.getElementById('ovPctA').textContent   = pA + '%';
  document.getElementById('ovPctB').textContent   = pB + '%';
  document.getElementById('ovVotesA').textContent = vA;
  document.getElementById('ovVotesB').textContent = vB;
  document.getElementById('ovTotal').textContent  = total + (total === 1 ? ' voto total' : ' votos totales');

  // Tamaño dinámico del ganador
  const pctA = document.getElementById('ovPctA');
  const pctB = document.getElementById('ovPctB');
  if (total === 0) { pctA.style.fontSize = pctB.style.fontSize = '22px'; }
  else if (pA > pB) { pctA.style.fontSize = '26px'; pctB.style.fontSize = '18px'; }
  else if (pB > pA) { pctB.style.fontSize = '26px'; pctA.style.fontSize = '18px'; }
  else { pctA.style.fontSize = pctB.style.fontSize = '22px'; }

  // Remontada
  const leader = pA > pB ? 'a' : pA < pB ? 'b' : null;
  const diff   = Math.abs(pA - pB);
  const cb     = document.getElementById('ovComeback');
  if (total >= 10 && prevLeader && leader && leader !== prevLeader && prevDiff >= 15) {
    const nm = leader === 'a' ? (s.nameA||'A').toUpperCase() : (s.nameB||'B').toUpperCase();
    cb.textContent = `⚡ ¡REMONTADA DE ${nm}!`;
    setTimeout(() => { cb.textContent = ''; }, 4000);
  }
  prevLeader = leader;
  prevDiff   = diff;

  // Timer
  const timerEl = document.getElementById('ovTimer');
  if (s.timerEnd && s.timerEnd > 0) {
    const rem = Math.max(0, Math.ceil((s.timerEnd - Date.now()) / 1000));
    if (rem > 0) {
      timerEl.style.display = 'block';
      if (rem < 60) {
        timerEl.textContent = rem + 's';
      } else {
        const m = Math.floor(rem/60), sec = rem%60;
        timerEl.textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
      }
      timerEl.className = 'ov-timer' + (rem <= 10 ? ' urgent' : '');
    } else {
      timerEl.style.display = 'none';
    }
  } else {
    timerEl.style.display = 'none';
  }
}

// ══ Leer localStorage cada 500ms (funciona entre panel OBS y Browser Source) ══
setInterval(() => {
  try {
    const raw = localStorage.getItem(LS);
    if (!raw) return;
    const s = JSON.parse(raw);

    const overlay = document.getElementById('overlay');
    if (s.active) {
      overlay.classList.add('visible');
      render(s);
    } else {
      overlay.classList.remove('visible');
    }
  } catch(e) {}
}, 500);
</script>
</body>
</html>
