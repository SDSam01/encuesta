<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poll Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:transparent;
  overflow:hidden;
  width:100vw;height:100vh;
}

#widget{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  width:520px;
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}
#widget.visible{opacity:1;}

/* Timer + pregunta */
.w-header{text-align:center;margin-bottom:6px;}
.w-timer{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;color:#fff;letter-spacing:2px;line-height:1;
  text-shadow:0 2px 12px rgba(0,0,0,.9);display:none;
}
.w-timer.urgent{color:#ff4444;animation:tblink .5s infinite;}
@keyframes tblink{0%,100%{opacity:1;}50%{opacity:.3;}}
.w-question{
  font-family:'Bebas Neue',sans-serif;
  font-size:17px;color:rgba(255,255,255,.7);
  letter-spacing:1.5px;margin-top:2px;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
}

/* ══ Contenedor único con fills superpuestos ══ */
.w-box{
  position:relative;
  height:110px;
  border-radius:12px;
  overflow:hidden;
  background:rgba(10,10,10,0.55);
  box-shadow:0 8px 40px rgba(0,0,0,.7);
}

/* Fill A — desde la izquierda */
.fill-a{
  position:absolute;
  top:0;left:0;bottom:0;
  background:#FFB800;
  opacity:.38;
  transition:width .7s cubic-bezier(.4,0,.2,1);
  z-index:1;
}

/* Fill B — desde la derecha */
.fill-b{
  position:absolute;
  top:0;right:0;bottom:0;
  background:#CC1100;
  opacity:.38;
  transition:width .7s cubic-bezier(.4,0,.2,1);
  z-index:1;
}

/* Contenido encima de los fills */
.w-content{
  position:absolute;
  inset:0;
  display:flex;
  z-index:2;
}

/* Mitad izquierda (A) */
.w-side{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:12px 18px;
}
.w-side-b{align-items:flex-end;text-align:right;}

.w-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;letter-spacing:2px;
  color:rgba(255,255,255,.5);margin-bottom:1px;
}
.w-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:2px;color:#fff;
  line-height:1;margin-bottom:3px;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
}
.w-pct{
  font-family:'Bebas Neue',sans-serif;
  font-size:58px;color:#fff;letter-spacing:-1px;line-height:1;
  text-shadow:0 2px 10px rgba(0,0,0,.4);
  transition:font-size .3s;
}
.w-pct.winner{font-size:66px;}
.w-pct.loser{font-size:46px;color:rgba(255,255,255,.6);}
.w-votes-txt{
  font-size:11px;color:rgba(255,255,255,.5);
  font-weight:700;letter-spacing:.5px;margin-top:2px;
}

/* Total */
.w-total{
  text-align:center;font-size:11px;
  color:rgba(255,255,255,.4);font-weight:700;
  letter-spacing:.5px;margin-top:5px;
}

/* ══ Remontada ══ */
.w-remontada{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.85);
  background:rgba(8,8,8,.92);
  border:2px solid #FFD000;
  border-radius:10px;
  padding:7px 18px;
  text-align:center;
  z-index:10;
  opacity:0;
  transition:opacity .3s,transform .3s;
  pointer-events:none;
  white-space:nowrap;
}
.w-remontada.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.w-rem-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;color:#FFD000;letter-spacing:2px;
}
.w-rem-sub{
  font-size:10px;color:rgba(255,255,255,.6);
  font-weight:700;letter-spacing:1px;text-transform:uppercase;
}
</style>
</head>
<body>

<div id="widget">
  <div class="w-header">
    <div class="w-timer" id="wTimer">30s</div>
    <div class="w-question" id="wQuestion">¿Qué eligen?</div>
  </div>

  <div class="w-box">
    <!-- Fills que se invaden -->
    <div class="fill-a" id="fillA" style="width:50%"></div>
    <div class="fill-b" id="fillB" style="width:50%"></div>

    <!-- Contenido -->
    <div class="w-content">
      <!-- Lado A -->
      <div class="w-side">
        <div class="w-label">A</div>
        <div class="w-name" id="wNameA">HOMER</div>
        <div class="w-pct" id="wPctA">50%</div>
        <div class="w-votes-txt"><span id="wVotesA">0</span> votos</div>
      </div>
      <!-- Lado B -->
      <div class="w-side w-side-b">
        <div class="w-label">B</div>
        <div class="w-name" id="wNameB">BART</div>
        <div class="w-pct" id="wPctB">50%</div>
        <div class="w-votes-txt"><span id="wVotesB">0</span> votos</div>
      </div>
    </div>

    <!-- Remontada -->
    <div class="w-remontada" id="wRemontada">
      <div class="w-rem-title">¡REMONTADA!</div>
      <div class="w-rem-sub" id="wRemSub">A ESTÁ SUBIENDO</div>
    </div>
  </div>

  <div class="w-total" id="wTotal">0 votos totales</div>
</div>

<script>
const LS = 'poll_state';
let prevLeader = null, prevDiff = 0, remTimeout = null;

function render(s) {
  const vA = s.vA || 0, vB = s.vB || 0;
  const total = vA + vB;
  const pA = total === 0 ? 50 : Math.round(vA / total * 100);
  const pB = total === 0 ? 50 : 100 - pA;

  document.getElementById('wQuestion').textContent  = s.question || '¿Qué eligen?';
  document.getElementById('wNameA').textContent     = (s.nameA || 'A').toUpperCase();
  document.getElementById('wNameB').textContent     = (s.nameB || 'B').toUpperCase();
  document.getElementById('wPctA').textContent      = pA + '%';
  document.getElementById('wPctB').textContent      = pB + '%';
  document.getElementById('wVotesA').textContent    = vA;
  document.getElementById('wVotesB').textContent    = vB;
  document.getElementById('wTotal').textContent     = total + (total === 1 ? ' voto total' : ' votos totales');

  // Fills que se invaden mutuamente
  document.getElementById('fillA').style.width = pA + '%';
  document.getElementById('fillB').style.width = pB + '%';

  // Tamaño dinámico
  const pctA = document.getElementById('wPctA');
  const pctB = document.getElementById('wPctB');
  if (total === 0) {
    pctA.className = pctB.className = 'w-pct';
  } else if (pA > pB) {
    pctA.className = 'w-pct winner'; pctB.className = 'w-pct loser';
  } else if (pB > pA) {
    pctB.className = 'w-pct winner'; pctA.className = 'w-pct loser';
  } else {
    pctA.className = pctB.className = 'w-pct';
  }

  // Remontada
  const leader = pA > pB ? 'a' : pA < pB ? 'b' : null;
  const diff   = Math.abs(pA - pB);
  if (total >= 10 && prevLeader && leader && leader !== prevLeader && prevDiff >= 15) {
    const name = (leader === 'a' ? (s.nameA||'A') : (s.nameB||'B')).toUpperCase();
    document.getElementById('wRemSub').textContent = name + ' ESTÁ SUBIENDO';
    const rem = document.getElementById('wRemontada');
    rem.classList.add('show');
    if (remTimeout) clearTimeout(remTimeout);
    remTimeout = setTimeout(() => rem.classList.remove('show'), 3500);
  }
  prevLeader = leader;
  prevDiff   = diff;

  // Timer
  const timerEl = document.getElementById('wTimer');
  if (s.timerEnd && s.timerEnd > 0) {
    const rem = Math.max(0, Math.ceil((s.timerEnd - Date.now()) / 1000));
    if (rem > 0) {
      timerEl.style.display = 'block';
      timerEl.textContent   = rem >= 60
        ? Math.floor(rem/60) + ':' + String(rem%60).padStart(2,'0')
        : rem + 's';
      timerEl.className = 'w-timer' + (rem <= 10 ? ' urgent' : '');
    } else {
      timerEl.style.display = 'none';
    }
  } else {
    timerEl.style.display = 'none';
  }
}

setInterval(() => {
  try {
    const raw = localStorage.getItem(LS);
    if (!raw) return;
    const s = JSON.parse(raw);
    const w = document.getElementById('widget');
    if (s.active) { w.classList.add('visible'); render(s); }
    else { w.classList.remove('visible'); }
  } catch(e) {}
}, 500);
</script>
</body>
</html>
