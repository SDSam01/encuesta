<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Castigos Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@700;900&family=Inter:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;}

#overlay{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);pointer-events:none;z-index:10;
  transition:background 1s;
}
#overlay.show{background:rgba(0,0,0,.9);}

/* Header de quién pierde */
#loserBanner{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:6px;
  margin-bottom:20px;
  opacity:0;transform:translateY(-20px);
  transition:opacity .5s, transform .5s;
}
#loserBanner.show{opacity:1;transform:translateY(0);}
#loserBanner.sam{color:#4488ff;text-shadow:0 0 20px rgba(68,136,255,.6);}
#loserBanner.chat{color:#f87171;text-shadow:0 0 20px rgba(248,113,113,.6);}

/* Tómbola */
#tombola{
  position:relative;width:480px;height:480px;
  opacity:0;transform:scale(.5);
  transition:opacity .6s, transform .6s cubic-bezier(.34,1.56,.64,1);
}
#tombola.show{opacity:1;transform:scale(1);}
#arrow{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:32px;z-index:6;animation:ab .6s infinite ease-in-out;}
@keyframes ab{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-6px);}}

#wheelCenter{
  position:absolute;width:100px;height:100px;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.2);z-index:5;
  font-size:38px;
  background:radial-gradient(circle,#111,#000);
}

/* Animación de entrada de bolas */
.ball-intro{
  position:absolute;width:60px;height:60px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;
  font-weight:700;pointer-events:none;z-index:20;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}

/* Carta revelación */
#revCard{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%) scale(0);
  width:820px;
  background:linear-gradient(160deg,#0d0d1a,#060610);
  border-radius:20px;padding:40px 50px;opacity:0;
  transition:transform .6s cubic-bezier(.34,1.56,.64,1), opacity .4s;
  z-index:20;
}
#revCard.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#revCard.sam{border:2px solid rgba(68,136,255,.5);box-shadow:0 0 80px rgba(68,136,255,.25);}
#revCard.chat{border:2px solid rgba(248,113,113,.5);box-shadow:0 0 80px rgba(248,113,113,.25);}

.rev-para{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;margin-bottom:12px;}
.rev-para.sam{color:rgba(68,136,255,.7);}
.rev-para.chat{color:rgba(248,113,113,.7);}
.rev-title{font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:#fff;margin-bottom:18px;line-height:1.1;}
.rev-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);margin-bottom:18px;}
.rev-desc{font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:rgba(255,255,255,.8);line-height:1.6;font-style:italic;}
.rev-hint{margin-top:24px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.2);text-align:center;}

#flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:25;transition:opacity .1s;}
#particles{position:fixed;inset:0;pointer-events:none;z-index:15;}
</style>
</head>
<body>
<div id="overlay">
  <div id="loserBanner">⚔️ CASTIGO PARA SAM</div>
  <div id="tombola">
    <div id="arrow">🔻</div>
    <canvas id="wheelCanvas" width="480" height="480"></canvas>
    <div id="wheelCenter">💀</div>
  </div>
</div>

<div id="revCard">
  <div class="rev-para sam" id="revPara">CASTIGO PARA SAM</div>
  <div class="rev-title" id="revTitle"></div>
  <div class="rev-divider"></div>
  <div class="rev-desc" id="revDesc"></div>
  <div class="rev-hint">— Presiona girar nuevamente para cerrar —</div>
</div>

<div id="flash"></div>
<canvas id="particles" width="1920" height="1080"></canvas>

<script>
const LS='castigos_state';
const COLORS_SAM=['#4488ff','#2266dd','#1144bb','#3377ee','#5599ff'];
const COLORS_CHAT=['#f87171','#dc4545','#c03030','#e85555','#ff8888'];

const AC=new(window.AudioContext||window.webkitAudioContext)();
let lastTs=0, isSpinning=false, cardVisible=false;
let currentTarget='sam';

// ══ CANVAS WHEEL ══
const canvas=document.getElementById('wheelCanvas');
const ctx=canvas.getContext('2d');

function drawWheel(angle,castigos,winnerIdx,phase){
  ctx.clearRect(0,0,480,480);
  const cx=240,cy=240,r=232;
  const count=castigos.filter(c=>c.titulo).length||3;
  const seg=(Math.PI*2)/count;
  const colors=currentTarget==='sam'?COLORS_SAM:COLORS_CHAT;

  for(let i=0;i<count;i++){
    const sA=angle+i*seg-Math.PI/2, eA=sA+seg;
    const isWin=i===winnerIdx&&phase==='reveal';
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sA,eA); ctx.closePath();
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'rgba(10,10,20,.9)');
    g.addColorStop(1,colors[i%colors.length]+(isWin?'ff':'99'));
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=isWin?'#fff':'rgba(255,255,255,.15)';
    ctx.lineWidth=isWin?3:1; ctx.stroke();
    if(isWin){ctx.beginPath();ctx.arc(cx,cy,r,sA,eA);ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=6;ctx.stroke();}

    // Texto
    const mA=sA+seg/2, tR=r*0.65;
    ctx.save();
    ctx.translate(cx+Math.cos(mA)*tR,cy+Math.sin(mA)*tR);
    ctx.rotate(mA+Math.PI/2);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isWin?'#fff':'rgba(255,255,255,.9)';
    ctx.font=`bold 22px 'Bebas Neue',sans-serif`;
    const label=(castigos[i]?.titulo||'').substring(0,14).toUpperCase();
    ctx.fillText(label,0,0);
    ctx.restore();
  }

  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=currentTarget==='sam'?'rgba(68,136,255,.5)':'rgba(248,113,113,.5)';
  ctx.lineWidth=4;ctx.stroke();
}

// ══ ANIMACIÓN DE ENTRADA DE BOLAS ══
function animateBallsEntry(castigos, callback){
  const valid=castigos.filter(c=>c.titulo);
  const colors=currentTarget==='sam'?COLORS_SAM:COLORS_CHAT;
  let done=0;
  valid.forEach((c,i)=>{
    setTimeout(()=>{
      playBallSound(i);
      // Crear bola que vuela hacia el centro
      const ball=document.createElement('div');
      ball.className='ball-intro';
      ball.style.background=colors[i%colors.length];
      ball.style.left='0px'; ball.style.top='0px';
      ball.textContent=(i+1)+'';
      // Posición inicial aleatoria fuera de pantalla
      const startX=Math.random()<0.5?-100:2020;
      const startY=100+Math.random()*880;
      ball.style.position='fixed';
      ball.style.left=startX+'px'; ball.style.top=startY+'px';
      ball.style.transition=`left ${0.6}s cubic-bezier(.25,.46,.45,.94), top ${0.6}s cubic-bezier(.25,.46,.45,.94), opacity .3s`;
      document.body.appendChild(ball);
      setTimeout(()=>{
        ball.style.left='930px'; ball.style.top='490px';
      },50);
      setTimeout(()=>{
        ball.style.opacity='0';
        setTimeout(()=>ball.remove(),300);
        done++;
        if(done===valid.length) setTimeout(callback,200);
      },700);
    },i*300);
  });
}

// ══ SPIN ══
function spinWheel(castigos,winnerIdx){
  isSpinning=true;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('tombola').classList.add('show');
  const banner=document.getElementById('loserBanner');
  banner.className='loserBanner show '+currentTarget;
  banner.classList.add('show');
  banner.textContent=currentTarget==='sam'?'⚔️ CASTIGO PARA SAM':'💬 CASTIGO PARA EL CHAT';

  // Dibujar rueda estática primero
  drawWheel(0,castigos,-1,'spin');

  // Animar entrada de bolas
  animateBallsEntry(castigos,()=>{
    // Empezar spin
    playSpinSound();
    const count=castigos.filter(c=>c.titulo).length||3;
    const seg=(Math.PI*2)/count;
    const rotations=5+Math.floor(Math.random()*3);
    const finalAngle=rotations*Math.PI*2+(seg*(count-winnerIdx));
    const duration=4000;
    const startTime=performance.now();

    function frame(now){
      const t=Math.min(1,(now-startTime)/duration);
      const ease=1-Math.pow(1-t,3);
      drawWheel(finalAngle*ease,castigos,-1,'spin');
      if(t<1) requestAnimationFrame(frame);
      else{
        drawWheel(finalAngle,castigos,winnerIdx,'reveal');
        flashScreen();
        playRevealSound();
        setTimeout(()=>showCard(castigos,winnerIdx),700);
      }
    }
    requestAnimationFrame(frame);
  });
}

function showCard(castigos,winnerIdx){
  const c=castigos[winnerIdx];
  const card=document.getElementById('revCard');
  card.className='show '+currentTarget;
  document.getElementById('revPara').className='rev-para '+currentTarget;
  document.getElementById('revPara').textContent=currentTarget==='sam'?'⚔️ CASTIGO PARA SAM':'💬 CASTIGO PARA EL CHAT';
  document.getElementById('revTitle').textContent=(c.titulo||'').toUpperCase();
  document.getElementById('revDesc').textContent=c.descripcion||c.titulo||'';
  cardVisible=true;
  startParticles();
  setTimeout(()=>speakMaleficent(c.descripcion||c.titulo||''),500);
}

function hideAll(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('tombola').classList.remove('show');
  document.getElementById('loserBanner').classList.remove('show');
  document.getElementById('revCard').className='';
  cardVisible=false;isSpinning=false;
  stopParticles();
  window.speechSynthesis.cancel();
}

// ══ MALÉFICA ══
function speakMaleficent(text){
  if(!text) return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance();
  utt.lang='es-MX'; utt.pitch=0.25; utt.rate=0.58; utt.volume=1.0;
  utt.text=text.replace(/\./g,'...').replace(/,/g,',,');
  const voices=window.speechSynthesis.getVoices();
  const esV=voices.find(v=>v.lang.startsWith('es'))||voices[0];
  if(esV) utt.voice=esV;
  window.speechSynthesis.speak(utt);
}
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ══ FLASH ══
function flashScreen(){
  const f=document.getElementById('flash');
  const color=currentTarget==='sam'?'rgba(68,136,255,.5)':'rgba(248,113,113,.5)';
  f.style.background=color; f.style.opacity='1';
  setTimeout(()=>f.style.opacity='0',150);
  setTimeout(()=>{f.style.opacity='.5';setTimeout(()=>f.style.opacity='0',100);},300);
}

// ══ PARTÍCULAS ══
let pInterval=null;
const pCanvas=document.getElementById('particles');
const pCtx=pCanvas.getContext('2d');
const particles=[];

function startParticles(){
  if(pInterval) return;
  pInterval=setInterval(()=>{
    const colors=currentTarget==='sam'?['#4488ff','#88aaff','#2255cc']:['#f87171','#ff9999','#cc4444'];
    for(let i=0;i<6;i++){
      particles.push({x:Math.random()*1920,y:1080,vx:(Math.random()-.5)*3,vy:-(Math.random()*4+2),size:Math.random()*10+4,life:1,color:colors[Math.floor(Math.random()*colors.length)]});
    }
  },60);
  animP();
}
function stopParticles(){if(pInterval){clearInterval(pInterval);pInterval=null;}}
function animP(){
  pCtx.clearRect(0,0,1920,1080);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=0.012;
    if(p.life<=0){particles.splice(i,1);continue;}
    pCtx.save();pCtx.globalAlpha=p.life;pCtx.fillStyle=p.color;pCtx.shadowColor=p.color;pCtx.shadowBlur=8;
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fill();pCtx.restore();
  }
  if(particles.length||pInterval) requestAnimationFrame(animP);
}

// ══ SONIDOS ══
function playBallSound(idx){
  AC.resume();
  const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='sine'; o.frequency.value=440+idx*80;
  const g=AC.createGain(); g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+0.16);
}

function playSpinSound(){
  AC.resume(); const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(200,t); o.frequency.linearRampToValueAtTime(60,t+4);
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=300;
  const g=AC.createGain(); g.gain.setValueAtTime(0.12,t); g.gain.linearRampToValueAtTime(0.001,t+4.5);
  o.connect(f); f.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+4.6);
  for(let i=0;i<55;i++){
    const delay=Math.pow(i/55,2)*4;
    const c=AC.createOscillator(); c.type='sine'; c.frequency.value=900;
    const cg=AC.createGain(); cg.gain.setValueAtTime(0.08,t+delay); cg.gain.exponentialRampToValueAtTime(0.001,t+delay+0.04);
    c.connect(cg); cg.connect(AC.destination); c.start(t+delay); c.stop(t+delay+0.05);
  }
}

function playRevealSound(){
  AC.resume(); const t=AC.currentTime;
  const sub=AC.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(80,t); sub.frequency.exponentialRampToValueAtTime(25,t+0.8);
  const sg=AC.createGain(); sg.gain.setValueAtTime(1.0,t); sg.gain.exponentialRampToValueAtTime(0.001,t+0.9);
  sub.connect(sg); sg.connect(AC.destination); sub.start(t); sub.stop(t+0.9);
  [523,440,370,294,247].forEach((freq,i)=>{
    const o=AC.createOscillator(); o.type='sawtooth';
    const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq*2;
    const g=AC.createGain(); const st=t+0.1+i*0.15;
    g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.28,st+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.4);
    o.frequency.value=freq; o.connect(f); f.connect(g); g.connect(AC.destination);
    o.start(st); o.stop(st+0.45);
  });
}

// ══ POLLING ══
setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);
    if(!raw) return;
    const s=JSON.parse(raw);
    if(!s.spinning||s.ts===lastTs) return;
    if(isSpinning) return;
    if(cardVisible){hideAll();return;}
    lastTs=s.ts;
    currentTarget=s.target||'sam';
    const castigos=s[currentTarget]||[];
    const valid=castigos.filter(c=>c.titulo);
    if(!valid.length) return;
    spinWheel(castigos,s.winner);
  }catch(e){}
},300);

// Dibujo inicial
drawWheel(0,Array.from({length:3},(_,i)=>({titulo:String(i+1)})),-1,'spin');
</script>
</body>
</html>
