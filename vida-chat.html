<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vida Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:100vw;height:100vh;}

/* Flash verde curación */
#flashGreen{
  position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;
  background:radial-gradient(ellipse at center, rgba(0,255,0,0) 20%, rgba(0,255,0,0.55) 100%);
  transition:opacity .07s;
}
#flashGreen.show{opacity:1;}

/* Widget corazones — posicionado arriba derecha donde terminan comentarios */
#widget{
  position:fixed;
  top:390px;   /* Ajusta este valor en OBS si necesitas moverlo */
  right:16px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:5px;
}

.w-label{
  font-family:'Courier New',monospace;
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:rgba(255,255,255,.5);text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,1);
}

.hearts-row{
  display:flex;gap:5px;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.95));
}

.heart-wrap{
  width:44px;height:44px;
}
.heart-wrap.hit{animation:heartHit .5s ease-out;}
@keyframes heartHit{
  0%{transform:scale(1.5) rotate(10deg);}
  40%{transform:scale(0.8) rotate(-5deg);}
  100%{transform:scale(1) rotate(0deg);}
}
.heart-wrap.heal{animation:heartHeal .4s ease-out;}
@keyframes heartHeal{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

#widget.shake{animation:wShake .4s ease-out;}
@keyframes wShake{
  0%{transform:translateX(0);}
  20%{transform:translateX(8px);}
  40%{transform:translateX(-8px);}
  60%{transform:translateX(5px);}
  80%{transform:translateX(-3px);}
  100%{transform:translateX(0);}
}

/* CHAT ELIMINATED */
#deadScreen{
  position:fixed;inset:0;pointer-events:none;z-index:99;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .5s;
}
#deadScreen.show{opacity:1;}
.dead-text{
  font-family:'Courier New',monospace;font-size:52px;font-weight:900;
  color:#FF0000;letter-spacing:4px;
  text-shadow:0 0 20px rgba(255,0,0,.8);
  animation:dp 1s infinite alternate;
}
@keyframes dp{from{opacity:.6;}to{opacity:1;}}
</style>
</head>
<body>

<div id="flashGreen"></div>
<div id="deadScreen"><div class="dead-text">CHAT MUERTO</div></div>

<div id="widget">
  <div class="w-label">Chat</div>
  <div class="hearts-row" id="heartsRow"></div>
</div>

<script>
const LS = 'battle_state';
let lastHit = 0, lastHeal = 0, lastHp = 6, lastDead = false;

const AC = new (window.AudioContext || window.webkitAudioContext)();

function playHit() {
  AC.resume();
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(280, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(100, AC.currentTime + 0.18);
  g.gain.setValueAtTime(0.3, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.22);
  o.start(); o.stop(AC.currentTime + 0.22);
}

function playHeal() {
  AC.resume();
  [392, 523, 659].forEach((freq, i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'sine';
    const t = AC.currentTime + i * 0.1;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  });
}

function playDeath() {
  AC.resume();
  [280,250,210,180,140].forEach((freq,i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'square';
    const t = AC.currentTime + i * 0.14;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    o.start(t); o.stop(t + 0.16);
  });
}

function doFlash(elId) {
  const el = document.getElementById(elId);
  el.classList.add('show');
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 80); }, 100);
  }, 80);
}

// SVG corazón ROJO (igual que Danny)
function heartSVG(filled) {
  const c  = filled === 2 ? '#FF2222' : filled === 1 ? '#FF2222' : '#2a2a2a';
  const cr = filled === 2 ? '#FF2222' : '#2a2a2a';
  const sh = filled >= 1  ? '#FF6666' : '#3a3a3a';
  return `<svg viewBox="0 0 16 14" xmlns="http://www.w3.org/2000/svg" width="44" height="44" style="display:block">
    <rect x="1" y="0" width="3" height="2" fill="${sh}"/>
    <rect x="4" y="0" width="4" height="1" fill="${c}"/>
    <rect x="8" y="0" width="4" height="1" fill="${cr}"/>
    <rect x="12" y="0" width="3" height="2" fill="${filled===2?sh:(filled===1?cr:'#3a3a3a')}"/>
    <rect x="0" y="1" width="8" height="4" fill="${c}"/>
    <rect x="8" y="1" width="8" height="4" fill="${cr}"/>
    <rect x="0" y="5" width="16" height="3" fill="${filled>=1?'#FF2222':'#2a2a2a'}"/>
    <rect x="1" y="8" width="14" height="2" fill="${filled>=1?'#FF2222':'#2a2a2a'}"/>
    <rect x="2" y="10" width="12" height="2" fill="${filled>=1?'#FF2222':'#2a2a2a'}"/>
    <rect x="4" y="12" width="8" height="1" fill="${filled>=1?'#FF2222':'#2a2a2a'}"/>
    <rect x="6" y="13" width="4" height="1" fill="${filled>=1?'#FF2222':'#2a2a2a'}"/>
  </svg>`;
}

function renderHearts(hp) {
  const row = document.getElementById('heartsRow');
  row.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const base   = i * 2;
    const filled = hp >= base+2 ? 2 : hp >= base+1 ? 1 : 0;
    const wrap   = document.createElement('div');
    wrap.className = 'heart-wrap';
    wrap.id = 'heart_' + i;
    wrap.innerHTML = heartSVG(filled);
    row.appendChild(wrap);
  }
}

function animateHeart(oldHp, newHp, type) {
  const idx = type === 'hit'
    ? Math.min(2, Math.floor((oldHp - 1) / 2))
    : Math.min(2, Math.floor(newHp / 2));
  const el = document.getElementById('heart_' + idx);
  if (!el) return;
  el.classList.remove('hit','heal');
  void el.offsetWidth;
  el.classList.add(type);
  setTimeout(() => el.classList.remove(type), 500);
}

setInterval(() => {
  try {
    const raw = localStorage.getItem(LS);
    if (!raw) return;
    const s = JSON.parse(raw);

    // DAÑO
    if (s.chatHit && s.chatHit !== lastHit && s.chatHp < lastHp) {
      const old = lastHp;
      lastHit = s.chatHit;
      lastHp  = s.chatHp;
      const w = document.getElementById('widget');
      w.classList.remove('shake'); void w.offsetWidth; w.classList.add('shake');
      setTimeout(() => w.classList.remove('shake'), 500);
      animateHeart(old, s.chatHp, 'hit');
      if (s.chatHp <= 0) playDeath();
      else playHit();
      setTimeout(() => renderHearts(s.chatHp), 300);
    }

    // CURACIÓN
    if (s.chatHeal && s.chatHeal !== lastHeal && s.chatHp > lastHp) {
      const old = lastHp;
      lastHeal = s.chatHeal;
      lastHp   = s.chatHp;
      doFlash('flashGreen');
      playHeal();
      animateHeart(old, s.chatHp, 'heal');
      setTimeout(() => renderHearts(s.chatHp), 200);
    }

    // Sync sin animación (reset, etc.)
    if (s.chatHp !== lastHp) {
      lastHp = s.chatHp;
      renderHearts(s.chatHp);
    }

    // Death
    if (s.chatDead && !lastDead) {
      lastDead = true;
      document.getElementById('deadScreen').classList.add('show');
    } else if (!s.chatDead && lastDead) {
      lastDead = false;
      document.getElementById('deadScreen').classList.remove('show');
    }
  } catch(e) {}
}, 200);

renderHearts(6);
</script>
</body>
</html>
