<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trivia Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:'Bebas Neue',sans-serif;}

/* ══ LAYOUT ══ */
#stage{position:fixed;inset:0;display:flex;align-items:flex-end;}
.team-zone{width:420px;height:1080px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;}
#center{flex:1;height:1080px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:30px 20px;}

/* ══ MARCADOR ══ */
#scoreboard{
  display:flex;gap:40px;align-items:center;
  background:rgba(0,0,0,.7);border-radius:20px;padding:16px 36px;
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);
  opacity:0;transform:translateY(-20px);transition:opacity .5s,transform .5s;
}
#scoreboard.show{opacity:1;transform:translateY(0);}
.score-team{display:flex;flex-direction:column;align-items:center;gap:4px;}
.score-name{font-size:20px;letter-spacing:6px;color:rgba(255,255,255,.7);}
.score-pts{font-size:72px;line-height:1;color:#fff;}
.score-sep{font-size:48px;color:rgba(255,255,255,.2);}
.score-target{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.3);}

/* ══ PREGUNTA ══ */
#questionBox{
  width:100%;max-width:960px;
  background:rgba(0,0,0,.85);border-radius:20px;
  padding:28px 36px;border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
  opacity:0;transform:scale(.92);
  transition:opacity .4s,transform .4s cubic-bezier(.34,1.56,.64,1);
}
#questionBox.show{opacity:1;transform:scale(1);}
.q-cat{font-size:11px;letter-spacing:8px;color:rgba(255,200,0,.7);margin-bottom:10px;}
.q-text{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:20px;}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.q-opt{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 14px;
  font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:rgba(255,255,255,.85);
  transition:background .3s,border-color .3s;
}
.q-opt-key{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;
  background:rgba(255,255,255,.12);flex-shrink:0;
}
.q-opt.correct{background:rgba(74,222,128,.2);border-color:#4ade80;}
.q-opt.correct .q-opt-key{background:#4ade80;color:#000;}
.q-opt.wrong{background:rgba(248,113,113,.15);border-color:#f87171;}

/* ══ RESULTADO FLASH ══ */
#resultFlash{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
}
#resultFlash.show{animation:flashAnim 2.2s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes flashAnim{
  0%{opacity:0;} 15%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;}
}
#resultIcon{font-size:280px;line-height:1;filter:drop-shadow(0 0 40px currentColor);}
#resultLabel{
  position:absolute;bottom:320px;font-size:60px;letter-spacing:16px;
  text-align:center;
}
.flash-correct #resultIcon{color:#4ade80;}
.flash-correct #resultLabel{color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,.7);}
.flash-wrong #resultIcon{color:#f87171;}
.flash-wrong #resultLabel{color:#f87171;text-shadow:0 0 30px rgba(248,113,113,.7);}
.flash-winner #resultIcon{font-size:160px;}
.flash-winner #resultLabel{font-size:80px;color:#FFD000;text-shadow:0 0 40px rgba(255,208,0,.8);}

/* ══ NOMBRE DEL REP ══ */
.rep-name-badge{
  font-size:20px;letter-spacing:4px;color:#fff;
  background:rgba(0,0,0,.6);border-radius:10px;padding:6px 18px;
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:10px;
  opacity:0;transform:translateY(10px);
  transition:opacity .4s,transform .4s;
  white-space:nowrap;max-width:380px;overflow:hidden;text-overflow:ellipsis;
  text-align:center;
}
.rep-name-badge.show{opacity:1;transform:translateY(0);}

/* ══ AVATAR CONTAINER ══ */
.avatar-wrap{
  width:380px;height:680px;position:relative;
  cursor:default;
}
.avatar-wrap.talking .mouth-happy,
.avatar-wrap.talking .mouth-serious{animation:talk .18s ease-in-out infinite alternate;}
@keyframes talk{from{transform:scaleY(1);}to{transform:scaleY(1.6) translateY(2px);}}

/* ══ VIDAS DEL EQUIPO ══ */
.team-lives{
  display:flex;gap:6px;margin-bottom:8px;
}
.life-heart{font-size:22px;transition:transform .2s,opacity .3s;}
.life-heart.lost{opacity:.2;transform:scale(.8);}

/* ══ ESTADO "HABLANDO" (burbuja) ══ */
.talking-bubble{
  position:absolute;top:60px;
  background:rgba(255,255,255,.9);border-radius:12px;padding:6px 14px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#000;
  opacity:0;transform:scale(.8);
  transition:opacity .2s,transform .2s;
  white-space:nowrap;z-index:10;
}
.talking-bubble.show{opacity:1;transform:scale(1);}
#team1 .talking-bubble{right:-10px;}
#team2 .talking-bubble{left:-10px;}
</style>
</head>
<body>
<div id="stage">

  <!-- EQUIPO 1 — Izquierda -->
  <div class="team-zone" id="team1">
    <div class="talking-bubble" id="bubble1">...</div>
    <div class="rep-name-badge" id="repName1">—</div>
    <div class="team-lives" id="lives1"></div>
    <div class="avatar-wrap" id="avatar1"></div>
  </div>

  <!-- CENTRO -->
  <div id="center">
    <div id="scoreboard">
      <div class="score-team" id="scoreLeft">
        <div class="score-name" id="teamName1">EQUIPO 1</div>
        <div class="score-pts" id="pts1">0</div>
        <div class="score-target">META: <span id="meta1">10</span></div>
      </div>
      <div class="score-sep">VS</div>
      <div class="score-team" id="scoreRight">
        <div class="score-name" id="teamName2">EQUIPO 2</div>
        <div class="score-pts" id="pts2">0</div>
        <div class="score-target">META: <span id="meta2">10</span></div>
      </div>
    </div>

    <div id="questionBox">
      <div class="q-cat" id="qCat">🌍 CATEGORÍA</div>
      <div class="q-text" id="qText">La pregunta aparecerá aquí...</div>
      <div class="q-options" id="qOptions"></div>
    </div>

    <div style="height:40px;"></div>
  </div>

  <!-- EQUIPO 2 — Derecha -->
  <div class="team-zone" id="team2">
    <div class="talking-bubble" id="bubble2">...</div>
    <div class="rep-name-badge" id="repName2">—</div>
    <div class="team-lives" id="lives2"></div>
    <div class="avatar-wrap" id="avatar2"></div>
  </div>
</div>

<!-- Flash de resultado -->
<div id="resultFlash">
  <div id="resultIcon">✓</div>
  <div id="resultLabel">CORRECTO</div>
</div>

<script>
// ══ AVATAR GENERATOR ══
const SKIN_COLORS=['#f4a261','#e76f51','#2a9d8f','#e9c46a','#264653','#a8dadc','#ff6b6b','#c77dff','#4cc9f0','#f72585','#7b2d8b','#06d6a0','#ffd166','#ef476f','#118ab2'];
const EYE_STYLES=['round','almond','wide','dot'];
const ACCESSORIES=['none','none','none','hat','cap','glasses','crown','cat_ears','headband'];
const BODY_PATTERNS=['plain','plain','stripes','dots','gradient'];
const MOUTH_STYLES=['happy','grin','serious','smirk'];

function seededRand(seed){
  let s=seed;
  return function(){s=(s*1664525+1013904223)&0x7fffffff;return s/0x7fffffff;};
}

function generateAvatar(seed, side){
  const r=seededRand(seed);
  const skin=SKIN_COLORS[Math.floor(r()*SKIN_COLORS.length)];
  const detail=SKIN_COLORS[Math.floor(r()*SKIN_COLORS.length)];
  const eyeStyle=EYE_STYLES[Math.floor(r()*EYE_STYLES.length)];
  const acc=ACCESSORIES[Math.floor(r()*ACCESSORIES.length)];
  const pattern=BODY_PATTERNS[Math.floor(r()*BODY_PATTERNS.length)];
  const mouthStyle=MOUTH_STYLES[Math.floor(r()*MOUTH_STYLES.length)];
  const bodyColor=SKIN_COLORS[Math.floor(r()*SKIN_COLORS.length)];
  const cheekColor='rgba(255,100,100,0.3)';
  const flip=side===2?'scale(-1,1)':'';

  // SVG del avatar
  const w=300,h=580;
  let accSVG='';
  if(acc==='hat') accSVG=`<polygon points="150,10 220,70 80,70" fill="${detail}"/><rect x="60" y="68" width="180" height="18" rx="4" fill="${detail}"/>`;
  else if(acc==='cap') accSVG=`<ellipse cx="150" cy="58" rx="75" ry="22" fill="${detail}"/><ellipse cx="210" cy="65" rx="38" ry="14" fill="${detail}"/>`;
  else if(acc==='glasses') accSVG=`<circle cx="110" cy="145" r="28" fill="none" stroke="${detail}" stroke-width="5"/><circle cx="190" cy="145" r="28" fill="none" stroke="${detail}" stroke-width="5"/><line x1="138" y1="145" x2="162" y2="145" stroke="${detail}" stroke-width="5"/>`;
  else if(acc==='crown') accSVG=`<polygon points="90,65 110,30 130,55 150,20 170,55 190,30 210,65" fill="#FFD000" stroke="#FFA000" stroke-width="2"/>`;
  else if(acc==='cat_ears') accSVG=`<polygon points="95,52 115,12 130,52" fill="${detail}"/><polygon points="170,52 185,12 205,52" fill="${detail}"/><polygon points="102,48 115,22 126,48" fill="rgba(255,180,200,0.7)"/><polygon points="176,48 185,22 197,48" fill="rgba(255,180,200,0.7)"/>`;
  else if(acc==='headband') accSVG=`<rect x="72" y="72" width="156" height="20" rx="10" fill="${detail}"/>`;

  let eyeSVG='';
  if(eyeStyle==='round'){
    eyeSVG=`<circle cx="110" cy="148" r="18" fill="white"/><circle cx="110" cy="150" r="10" fill="#1a1a2e"/><circle cx="114" cy="146" r="4" fill="white"/>
             <circle cx="190" cy="148" r="18" fill="white"/><circle cx="190" cy="150" r="10" fill="#1a1a2e"/><circle cx="194" cy="146" r="4" fill="white"/>`;
  } else if(eyeStyle==='almond'){
    eyeSVG=`<ellipse cx="110" cy="148" rx="20" ry="13" fill="white"/><ellipse cx="110" cy="150" rx="11" ry="9" fill="#1a1a2e"/><circle cx="114" cy="147" r="3" fill="white"/>
             <ellipse cx="190" cy="148" rx="20" ry="13" fill="white"/><ellipse cx="190" cy="150" rx="11" ry="9" fill="#1a1a2e"/><circle cx="194" cy="147" r="3" fill="white"/>`;
  } else if(eyeStyle==='wide'){
    eyeSVG=`<circle cx="108" cy="146" r="22" fill="white"/><circle cx="108" cy="148" r="13" fill="#1a1a2e"/><circle cx="113" cy="143" r="5" fill="white"/>
             <circle cx="192" cy="146" r="22" fill="white"/><circle cx="192" cy="148" r="13" fill="#1a1a2e"/><circle cx="197" cy="143" r="5" fill="white"/>`;
  } else {
    eyeSVG=`<circle cx="110" cy="150" r="10" fill="#1a1a2e"/><circle cx="113" cy="147" r="3" fill="white"/>
             <circle cx="190" cy="150" r="10" fill="#1a1a2e"/><circle cx="193" cy="147" r="3" fill="white"/>`;
  }

  let mouthSVG='';
  if(mouthStyle==='happy') mouthSVG=`<path class="mouth-happy" d="M120,185 Q150,210 180,185" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>`;
  else if(mouthStyle==='grin') mouthSVG=`<path class="mouth-happy" d="M115,183 Q150,215 185,183" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/><line x1="130" y1="196" x2="170" y2="196" stroke="#1a1a2e" stroke-width="2"/>`;
  else if(mouthStyle==='serious') mouthSVG=`<line class="mouth-serious" x1="125" y1="192" x2="175" y2="192" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>`;
  else mouthSVG=`<path class="mouth-happy" d="M125,183 Q148,205 175,188" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>`;

  // Patrón del cuerpo
  let patternDef='', patternFill=`fill="${bodyColor}"`;
  if(pattern==='stripes'){
    patternDef=`<pattern id="str${seed}" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)"><rect width="10" height="20" fill="${bodyColor}"/><rect x="10" width="10" height="20" fill="${detail}"/></pattern>`;
    patternFill=`fill="url(#str${seed})"`;
  } else if(pattern==='dots'){
    patternDef=`<pattern id="dot${seed}" patternUnits="userSpaceOnUse" width="25" height="25"><rect width="25" height="25" fill="${bodyColor}"/><circle cx="12" cy="12" r="5" fill="${detail}"/></pattern>`;
    patternFill=`fill="url(#dot${seed})"`;
  } else if(pattern==='gradient'){
    patternDef=`<linearGradient id="grad${seed}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${bodyColor}"/><stop offset="100%" stop-color="${detail}"/></linearGradient>`;
    patternFill=`fill="url(#grad${seed})"`;
  }

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;transform:${flip}">
  <defs>${patternDef}</defs>
  <!-- Sombra -->
  <ellipse cx="150" cy="${h-20}" rx="80" ry="14" fill="rgba(0,0,0,0.2)"/>
  <!-- Pierna izquierda -->
  <ellipse class="leg left-leg" cx="112" cy="${h-80}" rx="32" ry="70" ${patternFill}/>
  <!-- Pierna derecha -->
  <ellipse class="leg right-leg" cx="188" cy="${h-80}" rx="32" ry="70" ${patternFill}/>
  <!-- Cuerpo -->
  <ellipse class="body" cx="150" cy="${h-200}" rx="95" ry="130" ${patternFill}/>
  <!-- Brazo izquierdo -->
  <ellipse class="arm left-arm" cx="42" cy="${h-295}" rx="28" ry="70" ${patternFill} transform="rotate(-15,42,${h-295})"/>
  <!-- Brazo derecho -->
  <ellipse class="arm right-arm" cx="258" cy="${h-295}" rx="28" ry="70" ${patternFill} transform="rotate(15,258,${h-295})"/>
  <!-- Mano izquierda -->
  <circle cx="28" cy="${h-240}" r="20" ${patternFill}/>
  <!-- Mano derecha -->
  <circle cx="272" cy="${h-240}" r="20" ${patternFill}/>
  <!-- Cuello -->
  <rect x="130" y="${h-370}" width="40" height="35" rx="10" fill="${skin}"/>
  <!-- Cabeza -->
  <circle cx="150" cy="${h-420}" r="88" fill="${skin}"/>
  <!-- Cachetes -->
  <circle cx="88" cy="${h-400}" r="20" fill="${cheekColor}"/>
  <circle cx="212" cy="${h-400}" r="20" fill="${cheekColor}"/>
  <!-- Ojos -->
  ${eyeSVG.replace(/cy="(\d+)"/g,(_,n)=>`cy="${h-580+parseInt(n)}"`).replace(/cx="(\d+)"/g,(_,n)=>`cx="${n}"`)}
  <!-- Nariz -->
  <ellipse cx="150" cy="${h-450}" rx="6" ry="4" fill="rgba(0,0,0,0.15)"/>
  <!-- Boca -->
  ${mouthSVG.replace(/cy="(\d+)"/g,(_,n)=>`cy="${h-580+parseInt(n)}"`).replace(/y1="(\d+)"/g,(_,n)=>`y1="${h-580+parseInt(n)}"`).replace(/y2="(\d+)"/g,(_,n)=>`y2="${h-580+parseInt(n)}"`)}
  <!-- Accesorio -->
  ${accSVG.replace(/cy="(\d+)"/g,(_,n)=>`cy="${h-580+parseInt(n)}"`).replace(/points="([^"]+)"/g,(m,pts)=>`points="${pts.split(' ').map(p=>{const[px,py]=p.split(',');return `${px},${h-580+parseInt(py)}`;}).join(' ')}"`)}
</svg>`;
}

// ══ ESTADO DEL JUEGO ══
const LS = 'trivia_state';
let lastTs = 0;
let state = {
  team1: { name:'EQUIPO 1', pts:0, lives:6, repName:'', repUserId:'' },
  team2: { name:'EQUIPO 2', pts:0, lives:6, repName:'', repUserId:'' },
  meta: 10,
  question: null,
  showQuestion: false,
  result: null,
  active: false,
  avatar1Seed: Math.random()*9999|0,
  avatar2Seed: Math.random()*9999|0,
};

// ══ RENDER ══
function renderLives(teamIdx, lives) {
  const max = 6;
  const el = document.getElementById('lives'+teamIdx);
  el.innerHTML = '';
  for(let i=0;i<max;i++){
    const h=document.createElement('span');
    h.className='life-heart'+(i>=lives?' lost':'');
    h.textContent='❤️';
    el.appendChild(h);
  }
}

function renderQuestion(q, showAnswer=false, correctOpt=null) {
  if(!q) return;
  document.getElementById('qCat').textContent = q.categoria || '';
  document.getElementById('qText').textContent = q.pregunta || '';
  const opts = document.getElementById('qOptions');
  opts.innerHTML = '';
  ['A','B','C','D'].forEach(key => {
    const div=document.createElement('div');
    div.className='q-opt'+(showAnswer&&key===correctOpt?' correct':showAnswer?' wrong':'');
    div.innerHTML=`<div class="q-opt-key">${key}</div><span>${q.opciones?.[key]||''}</span>`;
    opts.appendChild(div);
  });
  document.getElementById('questionBox').classList.toggle('show', true);
}

function showResult(correct, winnerName='') {
  const el=document.getElementById('resultFlash');
  const icon=document.getElementById('resultIcon');
  const label=document.getElementById('resultLabel');
  el.className='';
  void el.offsetWidth;
  if(winnerName) {
    icon.textContent='🏆'; label.textContent=winnerName+' GANA';
    el.classList.add('show','flash-winner');
  } else if(correct) {
    icon.textContent='✓'; label.textContent='CORRECTO';
    el.classList.add('show','flash-correct');
  } else {
    icon.textContent='✗'; label.textContent='INCORRECTO';
    el.classList.add('show','flash-wrong');
  }
  setTimeout(()=>el.className='',2400);
}

function updateUI() {
  // Marcador
  document.getElementById('teamName1').textContent=state.team1.name;
  document.getElementById('teamName2').textContent=state.team2.name;
  document.getElementById('pts1').textContent=state.team1.pts;
  document.getElementById('pts2').textContent=state.team2.pts;
  document.getElementById('meta1').textContent=state.meta;
  document.getElementById('meta2').textContent=state.meta;
  document.getElementById('scoreboard').classList.toggle('show',state.active);
  renderLives(1,state.team1.lives);
  renderLives(2,state.team2.lives);
  // Nombres de reps
  const r1=document.getElementById('repName1');
  const r2=document.getElementById('repName2');
  r1.textContent=state.team1.repName||'—';
  r2.textContent=state.team2.repName||'—';
  r1.classList.toggle('show',!!state.team1.repName&&state.active);
  r2.classList.toggle('show',!!state.team2.repName&&state.active);
  // Pregunta
  if(!state.showQuestion) document.getElementById('questionBox').classList.remove('show');
  else renderQuestion(state.question,false,null);
}

// ══ AVATAR STATE MACHINE ══
function initAvatar(el, seed, side) {
  el.innerHTML = generateAvatar(seed, side);
  el.style.animation='avatarIdle 2s ease-in-out infinite';
  el.style.transformOrigin='center bottom';
  setTimeout(()=>scheduleAction(el), 2000+Math.random()*4000);
}

function scheduleAction(el) {
  const delay = 4000 + Math.random()*20000; // 4s a 24s entre acciones
  setTimeout(()=>{
    doAction(el);
  }, delay);
}

const ACTIONS=['wave','walk','jump','tpose','dance','look_up','wiggle'];

function doAction(el) {
  const action = ACTIONS[Math.floor(Math.random()*ACTIONS.length)];
  const arm_l = el.querySelector('.left-arm');
  const arm_r = el.querySelector('.right-arm');
  const body  = el.querySelector('.body');

  if(action==='wave' && arm_r) {
    arm_r.style.transition='transform 0.3s ease';
    arm_r.style.transform='rotate(-60deg) translateY(-20px)';
    let count=0;
    const iv=setInterval(()=>{
      count++;
      arm_r.style.transform=count%2?'rotate(-80deg) translateY(-30px)':'rotate(-40deg) translateY(-10px)';
      if(count>5){clearInterval(iv);arm_r.style.transform='';}
    },200);
  } else if(action==='walk') {
    el.style.animation='avatarWalk 0.4s ease-in-out 5 alternate';
    setTimeout(()=>el.style.animation='avatarIdle 2s ease-in-out infinite',2500);
  } else if(action==='jump') {
    el.style.animation='avatarJump 0.6s cubic-bezier(.4,0,.2,1) 2';
    setTimeout(()=>el.style.animation='avatarIdle 2s ease-in-out infinite',1400);
  } else if(action==='tpose' && arm_l && arm_r) {
    arm_l.style.transition='transform 0.4s ease';
    arm_r.style.transition='transform 0.4s ease';
    arm_l.style.transform='rotate(80deg) translateX(-30px)';
    arm_r.style.transform='rotate(-80deg) translateX(30px)';
    setTimeout(()=>{arm_l.style.transform='';arm_r.style.transform='';},1800);
  } else if(action==='dance') {
    el.style.animation='avatarDance 0.3s ease-in-out 8 alternate';
    setTimeout(()=>el.style.animation='avatarIdle 2s ease-in-out infinite',2600);
  } else if(action==='look_up') {
    const head=el.querySelector('circle');
    if(head){head.style.transition='transform 0.3s';head.style.transform='translateY(-12px)';setTimeout(()=>head.style.transform='',1500);}
  } else if(action==='wiggle') {
    el.style.animation='avatarWiggle 0.15s ease-in-out 8 alternate';
    setTimeout(()=>el.style.animation='avatarIdle 2s ease-in-out infinite',1500);
  }

  scheduleAction(el);
}

// ══ DETECCIÓN DE HABLA ══
let lastMsg1='', lastMsg2='';
function checkTalking() {
  try {
    const users=JSON.parse(localStorage.getItem('chat_users')||'{}');
    const now=Date.now();
    const rep1Id=state.team1.repUserId;
    const rep2Id=state.team2.repUserId;
    if(rep1Id&&users[rep1Id]&&now-users[rep1Id].lastSeen<2000) {
      const av=document.getElementById('avatar1');
      av.classList.add('talking');
      document.getElementById('bubble1').textContent=users[rep1Id].text?.substring(0,20)||'...';
      document.getElementById('bubble1').classList.add('show');
      setTimeout(()=>{av.classList.remove('talking');document.getElementById('bubble1').classList.remove('show');},2000);
    }
    if(rep2Id&&users[rep2Id]&&now-users[rep2Id].lastSeen<2000) {
      const av=document.getElementById('avatar2');
      av.classList.add('talking');
      document.getElementById('bubble2').textContent=users[rep2Id].text?.substring(0,20)||'...';
      document.getElementById('bubble2').classList.add('show');
      setTimeout(()=>{av.classList.remove('talking');document.getElementById('bubble2').classList.remove('show');},2000);
    }
  }catch(e){}
}

// ══ POLLING ══
setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);
    if(!raw)return;
    const s=JSON.parse(raw);
    if(!s.ts||s.ts===lastTs)return;
    lastTs=s.ts;
    const prev=JSON.parse(JSON.stringify(state));
    Object.assign(state,s);

    // Resultado flash
    if(s.result&&s.result!==prev.result) {
      if(s.result==='correct') showResult(true);
      else if(s.result==='wrong') showResult(false);
      else if(s.result==='winner') showResult(false,s.winnerName||'');
    }
    // Cambio de avatar
    if(s.avatar1Seed&&s.avatar1Seed!==prev.avatar1Seed)
      initAvatar(document.getElementById('avatar1'),s.avatar1Seed,1);
    if(s.avatar2Seed&&s.avatar2Seed!==prev.avatar2Seed)
      initAvatar(document.getElementById('avatar2'),s.avatar2Seed,2);

    updateUI();
  }catch(e){}
},250);

setInterval(checkTalking,500);

// ══ CSS ANIMATIONS ══
const styleEl=document.createElement('style');
styleEl.textContent=`
@keyframes avatarIdle{0%,100%{transform:translateY(0) scaleX(1);}50%{transform:translateY(-8px) scaleX(1.02);}}
@keyframes avatarWalk{from{transform:translateX(-18px);}to{transform:translateX(18px);}}
@keyframes avatarJump{0%{transform:translateY(0) scaleY(1);}30%{transform:translateY(-60px) scaleY(1.08);}80%{transform:translateY(0) scaleY(.85);}100%{transform:translateY(0) scaleY(1);}}
@keyframes avatarDance{from{transform:rotate(-8deg);}to{transform:rotate(8deg);}}
@keyframes avatarWiggle{from{transform:skewX(-6deg);}to{transform:skewX(6deg);}}
.avatar-wrap{animation:avatarIdle 2s ease-in-out infinite;transform-origin:center bottom;}
`;
document.head.appendChild(styleEl);

// Init avatares con seeds por defecto
initAvatar(document.getElementById('avatar1'), 1234, 1);
initAvatar(document.getElementById('avatar2'), 5678, 2);
</script>
