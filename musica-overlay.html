<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Música Overlay</title>
<style>*{margin:0;padding:0;}body{background:transparent;width:1px;height:1px;overflow:hidden;}</style>
</head>
<body>
<script>
// ══ SDSAM01 — Adaptive Music Overlay ══
// 100% Web Audio API — sin copyright
// ENCUESTA: Hip-hop chill con sax simulado, energía constante
// 1VS1:     Música de pelea intensa, tipo luchador

let ac = null, masterGain = null;
let pollNodes = [], vsNodes = [];
let currentMode = 'idle';
let lastPollActive = false, lastManual = false, lastVolume = 0.6;
let pollLoopTimer = null;

function getAC(){
  if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(ac.state!=='running') ac.resume().catch(()=>{});
  return ac;
}

const _wu=setInterval(()=>{
  const a=getAC();
  if(a&&a.state==='running'){
    masterGain=a.createGain(); masterGain.connect(a.destination);
    masterGain.gain.value=lastVolume; clearInterval(_wu);
  }
},500);

// ══════════════════════════════════════════════
// ENCUESTA: Hip-Hop Chill con Sax — energía CONSTANTE
// BPM: 90 — no escala, solo fade in/out
// ══════════════════════════════════════════════
function startPollMusic(){
  if(currentMode==='poll') return;
  stopAll(false); currentMode='poll';
  const a=getAC(); if(!a||!masterGain) return;
  pollNodes=[];

  // Fade in suave
  masterGain.gain.cancelScheduledValues(a.currentTime);
  masterGain.gain.setValueAtTime(0, a.currentTime);
  masterGain.gain.linearRampToValueAtTime(lastVolume, a.currentTime+1.5);

  schedulePollLoop(a);
}

function schedulePollLoop(a){
  const BPM=90, beat=60/BPM, bar=beat*4;
  let t=a.currentTime+0.1;
  const BARS=8; // 8 compases y repite

  function oneLoop(){
    if(currentMode!=='poll') return;
    playHipHopLoop(a, t, BARS, bar, beat, pollNodes);
    t+=BARS*bar;
    pollLoopTimer=setTimeout(oneLoop,(BARS*bar-0.1)*1000);
  }
  oneLoop();
}

function playHipHopLoop(a, start, bars, bar, beat, nodes){
  const t=start;
  const beats=bars*4;

  for(let i=0;i<beats;i++){
    const bt=t+i*beat;

    // KICK — tiempos 1 y 3 (+ variaciones)
    if(i%4===0 || i%4===2){
      const kick=a.createOscillator(); kick.type='sine';
      kick.frequency.setValueAtTime(80,bt); kick.frequency.exponentialRampToValueAtTime(30,bt+0.15);
      const kg=a.createGain();
      kg.gain.setValueAtTime(0.5,bt); kg.gain.exponentialRampToValueAtTime(0.001,bt+0.2);
      kick.connect(kg); kg.connect(masterGain);
      kick.start(bt); kick.stop(bt+0.22); nodes.push(kick,kg);
      // Clic extra del kick
      const buf=a.createBuffer(1,Math.floor(a.sampleRate*0.03),a.sampleRate);
      const d=buf.getChannelData(0);
      for(let k=0;k<d.length;k++) d[k]=(Math.random()*2-1)*Math.pow(1-k/d.length,3);
      const ns=a.createBufferSource(); ns.buffer=buf;
      const ng=a.createGain(); ng.gain.setValueAtTime(0.2,bt);
      ns.connect(ng); ng.connect(masterGain); ns.start(bt); nodes.push(ns,ng);
    }

    // SNARE — tiempos 2 y 4
    if(i%4===1 || i%4===3){
      const sbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.12),a.sampleRate);
      const sd=sbuf.getChannelData(0);
      for(let k=0;k<sd.length;k++) sd[k]=(Math.random()*2-1)*Math.pow(1-k/sd.length,1.8);
      const ss=a.createBufferSource(); ss.buffer=sbuf;
      const sf=a.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=800; sf.Q.value=0.8;
      const sg=a.createGain(); sg.gain.setValueAtTime(0.25,bt); sg.gain.exponentialRampToValueAtTime(0.001,bt+0.12);
      ss.connect(sf); sf.connect(sg); sg.connect(masterGain); ss.start(bt);
      nodes.push(ss,sf,sg);
    }

    // HI-HAT — cada 8vo (cada medio beat)
    for(let h=0;h<2;h++){
      const ht=bt+h*(beat/2);
      const hbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.04),a.sampleRate);
      const hd=hbuf.getChannelData(0);
      for(let k=0;k<hd.length;k++) hd[k]=(Math.random()*2-1)*Math.pow(1-k/hd.length,2.5);
      const hs=a.createBufferSource(); hs.buffer=hbuf;
      const hf=a.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=8000;
      const hg=a.createGain(); const vol=h===0?0.12:0.06;
      hg.gain.setValueAtTime(vol,ht); hg.gain.exponentialRampToValueAtTime(0.001,ht+0.04);
      hs.connect(hf); hf.connect(hg); hg.connect(masterGain); hs.start(ht);
      nodes.push(hs,hf,hg);
    }
  }

  // BAJO — línea de 2 compases en loop
  const bassNotes=[55,55,49,55, 55,55,52,49]; // A A E A / A A Ab E
  bassNotes.forEach((freq,i)=>{
    const bt2=t+i*(bar/2);
    const bass=a.createOscillator(); bass.type='triangle'; bass.frequency.value=freq;
    const lfo=a.createOscillator(); lfo.type='sine'; lfo.frequency.value=4;
    const lfoG=a.createGain(); lfoG.gain.value=2;
    lfo.connect(lfoG); lfoG.connect(bass.frequency);
    const bfilt=a.createBiquadFilter(); bfilt.type='lowpass'; bfilt.frequency.value=200;
    const bg=a.createGain();
    bg.gain.setValueAtTime(0,bt2); bg.gain.linearRampToValueAtTime(0.3,bt2+0.02);
    bg.gain.setValueAtTime(0.28,bt2+bar/2-0.08); bg.gain.linearRampToValueAtTime(0,bt2+bar/2);
    bass.connect(bfilt); bfilt.connect(bg); bg.connect(masterGain);
    bass.start(bt2); bass.stop(bt2+bar/2+0.05); lfo.start(bt2); lfo.stop(bt2+bar/2+0.05);
    nodes.push(bass,bfilt,bg,lfo,lfoG);
  });

  // SAXOFÓN PROMINENTE — melodía hip-hop sax, más fuerte y expresiva
  // F menor pentatónica: F3=174.6, Ab3=207.7, Bb3=233.1, C4=261.6, Eb4=311.1
  const saxMelody=[
    // Frase 1 — pregunta
    {f:261.6,d:0.5, o:0},
    {f:311.1,d:0.3, o:0.6},
    {f:349.2,d:0.4, o:1.0},
    {f:311.1,d:0.2, o:1.5},
    {f:261.6,d:0.6, o:1.8},
    // Frase 2 — respuesta
    {f:233.1,d:0.4, o:2.7},
    {f:261.6,d:0.3, o:3.2},
    {f:311.1,d:0.5, o:3.6},
    {f:349.2,d:0.3, o:4.2},
    {f:392.0,d:0.4, o:4.6},
    {f:349.2,d:0.3, o:5.1},
    {f:311.1,d:0.3, o:5.5},
    {f:261.6,d:0.7, o:5.9},
    // Nota larga de cierre
    {f:233.1,d:0.8, o:6.8},
  ];

  for(let rep=0;rep<Math.ceil(bars/2);rep++){
    const repT=t+rep*bar*2;
    if(repT+bar*2 > t+bars*bar+0.1) break;
    saxMelody.forEach(note=>{
      const nt=repT+note.o*beat;
      if(nt>t+bars*bar) return;

      // Sax 1: sawtooth con filtros (cuerpo del sax)
      const sax=a.createOscillator(); sax.type='sawtooth';
      sax.frequency.value=note.f;
      // Vibrato más pronunciado para sonar más real
      const vib=a.createOscillator(); vib.type='sine'; vib.frequency.value=5.8;
      const vibG=a.createGain(); vibG.gain.value=note.f*0.015; // vibrato relativo
      vib.connect(vibG); vibG.connect(sax.frequency);
      // Filtros de sax — más warmth
      const f1=a.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=1600; f1.Q.value=4;
      const f2=a.createBiquadFilter(); f2.type='peaking'; f2.frequency.value=800; f2.Q.value=1.5; f2.gain.value=10;
      const f3=a.createBiquadFilter(); f3.type='highshelf'; f3.frequency.value=4000; f3.gain.value=-4;

      // Envelope con ataque más expresivo
      const sg=a.createGain();
      sg.gain.setValueAtTime(0,nt);
      sg.gain.linearRampToValueAtTime(0.22,nt+0.06); // más fuerte
      sg.gain.setValueAtTime(0.19,nt+note.d*beat-0.08);
      sg.gain.linearRampToValueAtTime(0,nt+note.d*beat);

      sax.connect(f1); f1.connect(f2); f2.connect(f3); f3.connect(sg); sg.connect(masterGain);
      sax.start(nt); sax.stop(nt+note.d*beat+0.08);
      vib.start(nt); vib.stop(nt+note.d*beat+0.08);

      // Sax 2: una octava arriba muy suave para brillo (breath)
      const sax2=a.createOscillator(); sax2.type='sawtooth';
      sax2.frequency.value=note.f*2;
      const sg2=a.createGain();
      sg2.gain.setValueAtTime(0,nt); sg2.gain.linearRampToValueAtTime(0.04,nt+0.06);
      sg2.gain.linearRampToValueAtTime(0,nt+note.d*beat);
      const f4=a.createBiquadFilter(); f4.type='lowpass'; f4.frequency.value=3000;
      sax2.connect(f4); f4.connect(sg2); sg2.connect(masterGain);
      sax2.start(nt); sax2.stop(nt+note.d*beat+0.08);

      nodes.push(sax,f1,f2,f3,sg,vib,vibG,sax2,f4,sg2);
    });
  }
}

// ══════════════════════════════════════════════
// 1VS1: HIP-HOP JAZZ — boom-bap oscuro, bajo caminante
// BPM: 88 — groove relajado con stabs de jazz
// ══════════════════════════════════════════════
function startVsMusic(){
  if(currentMode==='vs') return;
  stopAll(false); currentMode='vs';
  const a=getAC(); if(!a||!masterGain) return;
  vsNodes=[];
  masterGain.gain.cancelScheduledValues(a.currentTime);
  masterGain.gain.setValueAtTime(0,a.currentTime);
  masterGain.gain.linearRampToValueAtTime(lastVolume,a.currentTime+0.3);
  scheduleVsLoop(a);
}

function scheduleVsLoop(a){
  const BPM=88, beat=60/BPM, bar=beat*4;
  let t=a.currentTime+0.05;
  const BARS=4;
  function loop(){
    if(currentMode!=='vs') return;
    playJazzHopLoop(a,t,BARS,bar,beat,vsNodes);
    t+=BARS*bar;
    pollLoopTimer=setTimeout(loop,(BARS*bar-0.08)*1000);
  }
  loop();
}

// ══ GENERADOR DE JAZZ HIP-HOP ══
// Cada vez que el loop corre, genera una combinación diferente
// de frase de sax, bajo caminante y stabs de acorde

function rng(seed){
  // LCG seededRandom — determinístico por seed, diferente cada loop
  let s=seed;
  return function(){
    s=(s*1664525+1013904223)&0xffffffff;
    return (s>>>0)/0xffffffff;
  };
}

function playJazzHopLoop(a,start,bars,bar,beat,nodes){
  const t=start;
  const eighth=beat/2;
  const swing=eighth*1.38; // swing feel
  const totalBeats=bars*4;
  const r=rng(Math.floor(Date.now()/100)); // seed diferente cada loop

  // ── DRUMS — boom-bap constante con variación en hi-hats ──
  for(let i=0;i<totalBeats;i++){
    const bt=t+i*beat;
    // KICK en 1 y 3
    if(i%4===0||i%4===2){
      const kick=a.createOscillator(); kick.type='sine';
      kick.frequency.setValueAtTime(110,bt);
      kick.frequency.exponentialRampToValueAtTime(i%4===0?36:46,bt+0.28);
      const kg=a.createGain();
      kg.gain.setValueAtTime(i%4===0?0.72:0.52,bt);
      kg.gain.exponentialRampToValueAtTime(0.001,bt+0.3);
      kick.connect(kg); kg.connect(masterGain);
      kick.start(bt); kick.stop(bt+0.32); nodes.push(kick,kg);
    }
    // SNARE en 2 y 4
    if(i%4===1||i%4===3){
      const sbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.13),a.sampleRate);
      const sd=sbuf.getChannelData(0);
      for(let k=0;k<sd.length;k++) sd[k]=(Math.random()*2-1)*Math.pow(1-k/sd.length,2.5);
      const ss=a.createBufferSource(); ss.buffer=sbuf;
      const sf=a.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=550; sf.Q.value=0.5;
      const sg2=a.createGain(); sg2.gain.setValueAtTime(0.25,bt); sg2.gain.exponentialRampToValueAtTime(0.001,bt+0.13);
      ss.connect(sf); sf.connect(sg2); sg2.connect(masterGain); ss.start(bt);
      nodes.push(ss,sf,sg2);
    }
  }
  // HI-HATS swingueados con variación aleatoria
  for(let b=0;b<bars;b++){
    for(let s=0;s<4;s++){
      const ht=t+b*bar+s*beat;
      [0,swing].forEach((offset,idx)=>{
        if(idx===1&&r()<0.25) return; // omitir off-beat ocasionalmente
        const htime=ht+offset;
        if(htime>t+bars*bar) return;
        const hbuf=a.createBuffer(1,Math.floor(a.sampleRate*0.02),a.sampleRate);
        const hd=hbuf.getChannelData(0);
        for(let k=0;k<hd.length;k++) hd[k]=(Math.random()*2-1)*Math.pow(1-k/hd.length,4);
        const hs=a.createBufferSource(); hs.buffer=hbuf;
        const hf=a.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=10000;
        const hg=a.createGain(); hg.gain.setValueAtTime(idx===0?0.08:0.045,htime);
        hg.gain.exponentialRampToValueAtTime(0.001,htime+0.02);
        hs.connect(hf); hf.connect(hg); hg.connect(masterGain); hs.start(htime);
        nodes.push(hs,hf,hg);
      });
    }
  }

  // ── BAJO GENERATIVO — escala D menor, movimiento caminante ──
  // Pool de notas disponibles (D-E-F-G-A-Bb-C)
  const bassScale=[36.7,41.2,43.7,49.0,55.0,58.3,65.4,73.4,87.3,98.0];
  let bassIdx=Math.floor(r()*3)+5; // empieza en zona media-grave
  for(let i=0;i<totalBeats;i++){
    const bt=t+i*beat;
    // Movimiento: paso a paso o salto pequeño
    const move=Math.round((r()-0.45)*3);
    bassIdx=Math.max(0,Math.min(bassScale.length-1,bassIdx+move));
    const noteFreq=bassScale[bassIdx];
    // Ghost note ocasional en el off-beat
    const hasGhost=r()<0.3;
    const bass=a.createOscillator(); bass.type='triangle';
    bass.frequency.value=noteFreq;
    const bf=a.createBiquadFilter(); bf.type='lowpass'; bf.frequency.value=220;
    const bg=a.createGain();
    bg.gain.setValueAtTime(0,bt); bg.gain.linearRampToValueAtTime(0.28,bt+0.03);
    bg.gain.setValueAtTime(0.24,bt+beat*0.85); bg.gain.linearRampToValueAtTime(0,bt+beat);
    bass.connect(bf); bf.connect(bg); bg.connect(masterGain);
    bass.start(bt); bass.stop(bt+beat+0.04); nodes.push(bass,bf,bg);
    // Ghost note
    if(hasGhost){
      const ghostT=bt+swing;
      if(ghostT<t+bars*bar){
        const ghostIdx=Math.max(0,Math.min(bassScale.length-1,bassIdx+(r()<0.5?1:-1)));
        const gb=a.createOscillator(); gb.type='triangle';
        gb.frequency.value=bassScale[ghostIdx];
        const gbf=a.createBiquadFilter(); gbf.type='lowpass'; gbf.frequency.value=200;
        const gbg=a.createGain();
        gbg.gain.setValueAtTime(0,ghostT); gbg.gain.linearRampToValueAtTime(0.1,ghostT+0.02);
        gbg.gain.linearRampToValueAtTime(0,ghostT+beat*0.3);
        gb.connect(gbf); gbf.connect(gbg); gbg.connect(masterGain);
        gb.start(ghostT); gb.stop(ghostT+beat*0.35); nodes.push(gb,gbf,gbg);
      }
    }
  }

  // ── SAX GENERATIVO — escala pentatónica menor, frases variables ──
  // D menor pentatónica + blue note: D-F-G-Ab-A-C
  const saxScale=[146.8,174.6,196.0,207.7,220.0,261.6,293.7,311.1,349.2,392.0,440.0,523.3];
  const durPool=[0.28,0.35,0.45,0.55,0.65,0.85];
  let saxNoteIdx=Math.floor(r()*4)+4; // empieza en zona media
  let pos=r()*0.3; // entrada levemente al azar
  const saxNotes=[];
  while(pos<bars*4-0.5){
    // Movimiento melódico — preferir pasos pequeños (jazz)
    const stepRaw=(r()-0.4)*4;
    const step=Math.round(stepRaw);
    saxNoteIdx=Math.max(0,Math.min(saxScale.length-1,saxNoteIdx+step));
    const dur=durPool[Math.floor(r()*durPool.length)];
    // Nota larga ocasional para expresión
    const isLong=r()<0.2;
    saxNotes.push({f:saxScale[saxNoteIdx],d:isLong?dur*2:dur,o:pos});
    // Rest ocasional entre notas
    const rest=r()<0.35?r()*0.4:0.02;
    pos+=isLong?dur*2+rest:dur+rest;
  }

  saxNotes.forEach(note=>{
    const nt=t+note.o*beat;
    if(nt>=t+bars*bar-0.1) return;
    const actualDur=Math.min(note.d,(bars*bar-(nt-t))/beat);
    // Timbre de sax = sawtooth + bandpass + vibrato
    const sax=a.createOscillator(); sax.type='sawtooth';
    sax.frequency.value=note.f;
    const vib=a.createOscillator(); vib.type='sine'; vib.frequency.value=5.5+(r()-0.5)*1.5;
    const vibG=a.createGain(); vibG.gain.value=note.f*0.012;
    vib.connect(vibG); vibG.connect(sax.frequency);
    const f1=a.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=1500; f1.Q.value=3.5;
    const f2=a.createBiquadFilter(); f2.type='peaking'; f2.frequency.value=750; f2.Q.value=1.5; f2.gain.value=9;
    const f3=a.createBiquadFilter(); f3.type='highshelf'; f3.frequency.value=3500; f3.gain.value=-5;
    // Envelope expresivo — ataque + sustain + release
    const vol=0.18+r()*0.06; // volumen ligeramente variable
    const sg=a.createGain();
    sg.gain.setValueAtTime(0,nt); sg.gain.linearRampToValueAtTime(vol,nt+0.06);
    sg.gain.setValueAtTime(vol*0.88,nt+actualDur*beat-0.08);
    sg.gain.linearRampToValueAtTime(0,nt+actualDur*beat);
    sax.connect(f1); f1.connect(f2); f2.connect(f3); f3.connect(sg); sg.connect(masterGain);
    sax.start(nt); sax.stop(nt+actualDur*beat+0.08);
    vib.start(nt); vib.stop(nt+actualDur*beat+0.08);
    nodes.push(sax,f1,f2,f3,sg,vib,vibG);
  });

  // ── CHORD STABS GENERATIVOS — voicings de jazz ──
  const jazzChords=[
    [293.7,369.99,440,554.4],   // Dm9
    [261.6,329.6,392,493.9],    // Cmaj7
    [220,277.2,329.6,415.3],    // Am7
    [246.9,311.1,392,466.2],    // Bm7b5
    [293.7,349.2,440,523.3],    // Dm7
    [174.6,220,261.6,311.1],    // Fm7
  ];
  // Generar 3-5 stabs en posiciones al azar
  const numStabs=3+Math.floor(r()*3);
  const usedPos=new Set();
  for(let i=0;i<numStabs;i++){
    let stabBeat=Math.floor(r()*bars*4)+r();
    stabBeat=Math.round(stabBeat*2)/2; // en 8vos
    if(usedPos.has(stabBeat)) continue;
    usedPos.add(stabBeat);
    const st=t+stabBeat*beat;
    if(st>=t+bars*bar-0.1) continue;
    const chord=jazzChords[Math.floor(r()*jazzChords.length)];
    chord.forEach(freq=>{
      const o=a.createOscillator(); o.type='triangle';
      o.frequency.value=freq/2;
      const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=0.7;
      const g=a.createGain();
      g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.022,st+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,st+0.22);
      o.connect(f); f.connect(g); g.connect(masterGain);
      o.start(st); o.stop(st+0.25); nodes.push(o,f,g);
    });
  }
}


// ══ Stop & Fade ══
function stopAll(fade){
  currentMode='idle';
  if(pollLoopTimer){clearTimeout(pollLoopTimer);pollLoopTimer=null;}
  if(!ac||!masterGain) return;
  if(fade){
    const tv=ac.currentTime;
    masterGain.gain.cancelScheduledValues(tv);
    masterGain.gain.setValueAtTime(masterGain.gain.value,tv);
    masterGain.gain.linearRampToValueAtTime(0,tv+1.5);
    setTimeout(()=>{
      pollNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
      vsNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
      pollNodes=[]; vsNodes=[];
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.setValueAtTime(lastVolume,ac.currentTime);
    },1600);
  } else {
    pollNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
    vsNodes.forEach(n=>{try{n.stop&&n.stop(0);}catch(e){}});
    pollNodes=[]; vsNodes=[];
  }
}

// ══ Loop principal de control ══
setInterval(()=>{
  if(!ac||!masterGain) return;
  try{
    const ms=JSON.parse(localStorage.getItem('music_state')||'{}');
    const vol=ms.volume!==undefined?ms.volume:0.6;
    if(vol!==lastVolume){
      lastVolume=vol;
      if(currentMode!=='idle'){
        masterGain.gain.cancelScheduledValues(ac.currentTime);
        masterGain.gain.setTargetAtTime(vol,ac.currentTime,0.2);
      }
    }
    const manual=!!ms.manual;
    if(manual!==lastManual){
      lastManual=manual;
      if(manual) startVsMusic();
      else stopAll(true);
      return;
    }
    if(manual) return;
    const ps=JSON.parse(localStorage.getItem('poll_state')||'{}');
    const pollActive=!!(ps.active&&ps.timerEnd&&ps.timerEnd>Date.now());
    if(pollActive!==lastPollActive){
      lastPollActive=pollActive;
      if(pollActive) startPollMusic();
      else stopAll(true);
    }
  }catch(e){}
},600);
</script>
</body>
</html>
