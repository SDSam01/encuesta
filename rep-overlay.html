<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rep Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:'Bebas Neue',sans-serif;}

#sirenOverlay{
  position:fixed;inset:0;z-index:60;pointer-events:none;
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#sirenOverlay.show{opacity:1;}
.siren-flash{
  position:fixed;inset:0;
  background:rgba(255,20,20,0);
  animation:sirenFlash 0.5s infinite;
}
@keyframes sirenFlash{
  0%,100%{background:rgba(255,20,20,0);}
  50%{background:rgba(255,20,20,0.35);}
}
.siren-text{
  font-size:80px;letter-spacing:10px;
  color:#FF3333;
  text-shadow:0 0 40px rgba(255,0,0,1),0 0 80px rgba(255,0,0,.6);
  animation:sirenText .5s infinite alternate;
  position:relative;z-index:1;
}
@keyframes sirenText{
  from{opacity:.6;transform:scale(.98);}
  to{opacity:1;transform:scale(1.02);}
}
.siren-sub{
  font-size:26px;letter-spacing:6px;
  color:rgba(255,100,100,.8);margin-top:10px;
  position:relative;z-index:1;
  animation:sirenText .5s infinite alternate;
}

#bg{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  transition:background .5s;pointer-events:none;z-index:10;
}
#bg.show{background:rgba(0,0,0,0.85);}
#bg.jackpot{background:rgba(0,0,0,0.92);}

#particles{position:fixed;inset:0;z-index:15;pointer-events:none;}

#stage{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
#stage.show{opacity:1;}
.s-eyebrow{font-size:26px;letter-spacing:8px;color:rgba(255,255,255,.4);margin-bottom:14px;}
.s-title{
  font-size:80px;letter-spacing:6px;color:#FFD000;
  text-shadow:0 0 40px rgba(255,208,0,.8),0 0 80px rgba(255,208,0,.4);
  line-height:1;margin-bottom:36px;text-align:center;
}
#shuffleZone{display:flex;flex-direction:column;align-items:center;gap:10px;min-height:180px;justify-content:center;}
.shuffle-name{font-size:50px;letter-spacing:3px;color:rgba(255,255,255,.22);transition:all .08s;text-align:center;}
.shuffle-name.active{color:#fff;font-size:66px;text-shadow:0 0 25px rgba(255,255,255,.8),0 0 50px rgba(255,255,255,.3);}
#chosenName{
  font-size:108px;letter-spacing:6px;color:#FFD000;
  text-shadow:0 0 50px rgba(255,208,0,1),0 0 100px rgba(255,208,0,.6),0 6px 30px rgba(0,0,0,1);
  text-align:center;line-height:1;
  opacity:0;transform:scale(.7);
  transition:opacity .5s,transform .6s cubic-bezier(.34,1.56,.64,1);display:none;
}
#chosenName.show{opacity:1;transform:scale(1);display:block;}
.s-badge{font-size:20px;letter-spacing:4px;color:rgba(255,208,0,.6);margin-top:14px;opacity:0;transition:opacity .5s;}
.s-badge.show{opacity:1;}

/* ══ JACKPOT — Slot Machine Premium ══ */
/* ══ JACKPOT VIP — Cinematic Premium ══ */
#jackpotStage{
  position:fixed;inset:0;z-index:22;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  background:radial-gradient(ellipse at center,#0c0500 0%,#000 70%);
  transition:opacity .5s;
}
#jackpotStage.show{opacity:1;}

/* Spotlight pulsante detrás de la carta */
#jpSpotlight{
  position:absolute;
  width:700px;height:700px;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,160,0,.07) 0%,transparent 65%);
  animation:spotPulse 2s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes spotPulse{from{opacity:.5;transform:scale(.9);}to{opacity:1;transform:scale(1.1);}}

/* Eyebrow */
.jp-eyebrow{
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;letter-spacing:14px;
  color:rgba(255,200,0,.55);
  margin-bottom:32px;z-index:2;position:relative;
  animation:eyePulse 1.4s ease-in-out infinite alternate;
}
@keyframes eyePulse{from{opacity:.4;letter-spacing:12px;}to{opacity:.9;letter-spacing:16px;}}

/* Escena de carta */
.jp-card-scene{
  width:520px;height:300px;
  position:relative;z-index:2;
}
.jp-card{
  width:100%;height:100%;
  position:relative;
  animation:cardEnter .5s cubic-bezier(.34,1.56,.64,1) forwards;
  will-change:transform,opacity;
}
@keyframes cardEnter{
  0%{opacity:0;transform:translateY(50px) scale(.85);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}

/* Cara frontal — scanning */
.jp-card-front{
  position:absolute;inset:0;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#130800,#220d00,#130800);
  border:2px solid rgba(255,160,0,.4);
  box-shadow:0 0 50px rgba(255,130,0,.15),inset 0 0 50px rgba(0,0,0,.6);
  overflow:hidden;
  transition:transform .32s ease-in, opacity .32s ease-in;
  transform:scaleX(1);opacity:1;
}
/* Shimmer sweep en el frente */
.jp-card-front::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(255,180,0,.06) 50%,transparent 65%);
  animation:shimmer 2.5s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}

.jp-card-front-icon{font-size:48px;margin-bottom:8px;opacity:.8;filter:drop-shadow(0 0 12px rgba(255,180,0,.5));}
.jp-card-scanning{
  font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;
  color:rgba(255,210,100,.8);min-height:42px;text-align:center;
  text-shadow:0 0 15px rgba(255,180,0,.6);
}
.jp-card-vip{
  font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:12px;
  color:rgba(255,160,0,.35);margin-top:8px;
}

/* Cara trasera — reveal */
.jp-card-back{
  position:absolute;inset:0;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#000a18,#00102a,#000a18);
  border:2px solid rgba(255,215,0,.7);
  box-shadow:0 0 70px rgba(255,215,0,.4),0 0 140px rgba(255,180,0,.2),inset 0 0 50px rgba(0,0,20,.8);
  transform:scaleX(0);opacity:0;
  transition:transform .32s ease-out .32s, opacity .2s ease-out .38s;
}
.jp-card.flipped .jp-card-front{transform:scaleX(0);opacity:0;}
.jp-card.flipped .jp-card-back{transform:scaleX(1);opacity:1;}

/* Decoración en la carta back */
.jp-card-back::before{
  content:'';position:absolute;
  inset:8px;border:1px solid rgba(255,215,0,.12);border-radius:12px;
}
.jp-card-back-label{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:10px;
  color:rgba(255,215,0,.45);margin-bottom:12px;position:relative;z-index:1;
}
.jp-card-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:58px;letter-spacing:5px;color:#fff;line-height:1;
  text-shadow:0 0 25px rgba(255,255,255,.8),0 0 50px rgba(255,215,0,.6),0 0 90px rgba(255,150,0,.3);
  text-align:center;padding:0 18px;position:relative;z-index:1;
}
.jp-card-name.glow{animation:nameGlow 1.5s infinite alternate;}
@keyframes nameGlow{
  from{text-shadow:0 0 20px rgba(255,255,255,.7),0 0 40px rgba(255,215,0,.5);}
  to{text-shadow:0 0 40px rgba(255,255,255,1),0 0 80px rgba(255,215,0,.9),0 0 130px rgba(255,130,0,.4);}
}
.jp-card-back-badge{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:8px;
  color:rgba(255,215,0,.55);margin-top:12px;position:relative;z-index:1;
  opacity:0;transform:translateY(8px);transition:opacity .5s .4s,transform .5s .4s;
}
.jp-card.flipped .jp-card-back-badge{opacity:1;transform:translateY(0);}

/* Reveal screen — nombre grande tras cerrar la carta */
#jpReveal{
  position:fixed;inset:0;z-index:35;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  background:linear-gradient(160deg,#000a18,#00060f);
  opacity:0;transition:opacity .4s;
}
#jpReveal.show{display:flex;opacity:1;}
/* Líneas decorativas */
#jpReveal::before{
  content:'';position:absolute;
  width:1px;height:40%;left:50%;top:0;
  background:linear-gradient(180deg,transparent,rgba(255,215,0,.3),transparent);
}
#jpReveal::after{
  content:'';position:absolute;
  width:1px;height:40%;left:50%;bottom:0;
  background:linear-gradient(0deg,transparent,rgba(255,215,0,.3),transparent);
}
.jp-jackpot-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:16px;
  color:rgba(255,215,0,.6);margin-bottom:10px;
  animation:jtIn .4s ease forwards;opacity:0;
}
@keyframes jtIn{from{opacity:0;letter-spacing:8px;}to{opacity:1;letter-spacing:16px;}}

/* Línea dorada */
.jp-reveal-line{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.6),transparent);
  animation:lineExpand .5s ease .2s forwards;margin-bottom:14px;
}
@keyframes lineExpand{from{width:0;}to{width:600px;}}

.jp-winner-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:140px;letter-spacing:4px;color:#fff;line-height:.95;
  text-shadow:0 0 40px rgba(255,255,255,.8),0 0 80px rgba(255,215,0,.5);
  animation:nameBlast .55s cubic-bezier(.22,1.2,.36,1) .25s forwards;opacity:0;
}
@keyframes nameBlast{
  0%{opacity:0;transform:scale(1.6);filter:blur(16px);}
  60%{opacity:1;filter:blur(1px);}
  80%{transform:scale(.98);}
  100%{opacity:1;transform:scale(1);filter:blur(0);}
}
.jp-sub-badge{
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:10px;
  color:rgba(255,215,0,.75);margin-top:18px;
  text-shadow:0 0 10px rgba(255,215,0,.5);
  opacity:0;transform:translateY(12px);
  transition:opacity .4s,transform .4s cubic-bezier(.34,1.56,.64,1);
}
.jp-sub-badge.show{opacity:1;transform:translateY(0);}

#jpFlash{
  position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;
  background:radial-gradient(ellipse at center,rgba(255,220,100,.7) 0%,rgba(255,150,0,.1) 60%,transparent 80%);
  transition:opacity .07s;
}
#jpFlash.show{opacity:1;}

/* Slots ocultos */
.jp-slots{display:none;}
.jp-reel,.jp-reel-inner,.jp-reel-item{display:none;}
@keyframes winnerShine{from{opacity:1;}to{opacity:1;}}

.jp-reel-line{
  position:absolute;top:50%;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.9),rgba(255,255,180,1),rgba(255,215,0,.9),transparent);
  transform:translateY(-50%);z-index:3;
  box-shadow:0 0 14px rgba(255,215,0,.8),0 0 28px rgba(255,215,0,.4);
}

/* Reveal */
#jpReveal{
  position:fixed;inset:0;z-index:35;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;background:rgba(0,0,0,.94);
  opacity:0;transition:opacity .5s;
}
#jpReveal.show{display:flex;opacity:1;}

.jp-jackpot-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;letter-spacing:18px;line-height:1;
  color:rgba(255,215,0,.7);
  text-shadow:0 0 20px rgba(255,200,0,.5);
  animation:eyeIn .3s ease forwards;opacity:0;
  margin-bottom:6px;
}
@keyframes eyeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* Línea decorativa */
.jp-reveal-line{
  width:0;height:2px;
  background:linear-gradient(90deg,transparent,#FFD700,transparent);
  animation:lineExpand .4s ease .25s forwards;
  box-shadow:0 0 12px rgba(255,215,0,.6);
}
@keyframes lineExpand{from{width:0;}to{width:700px;}}

.jp-winner-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:160px;letter-spacing:6px;color:#fff;line-height:.95;margin-top:14px;
  text-shadow:0 0 40px rgba(255,255,255,.9),0 0 80px rgba(255,215,0,.6),0 0 140px rgba(255,150,0,.3);
  animation:nameBlast .5s cubic-bezier(.22,1.2,.36,1) .3s forwards;opacity:0;
}
@keyframes nameBlast{
  0%{opacity:0;transform:scale(1.8);filter:blur(12px);}
  60%{opacity:1;filter:blur(0);}
  80%{transform:scale(.97);}
  100%{opacity:1;transform:scale(1);filter:blur(0);}
}
.jp-sub-badge{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:10px;color:rgba(255,215,0,.8);margin-top:16px;
  text-shadow:0 0 12px rgba(255,215,0,.6);
  opacity:0;transform:translateY(14px);
  transition:opacity .4s, transform .4s cubic-bezier(.34,1.56,.64,1);
}
.jp-sub-badge.show{opacity:1;transform:translateY(0);}

#jpFlash{
  position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;
  background:radial-gradient(ellipse at center,rgba(255,215,0,.65) 0%,rgba(255,130,0,.1) 60%,transparent 80%);
  transition:opacity .07s;
}
#jpFlash.show{opacity:1;}
#jpSpotlight{display:none;}

#repHud{
  position:fixed;top:55px;left:1120px;
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.75);
  border-radius:50px;padding:8px 18px 8px 12px;
  z-index:30;opacity:0;transition:opacity .5s;pointer-events:none;
}
#repHud.normal{border:1px solid rgba(255,208,0,.3);}
#repHud.sub{border:1px solid rgba(255,215,0,.7);box-shadow:0 0 15px rgba(255,215,0,.3),0 0 30px rgba(255,150,0,.15);background:rgba(20,12,0,.85);}
#repHud.show{opacity:1;}
.hud-dot{width:10px;height:10px;border-radius:50%;background:#FFD000;animation:hdot 1.2s infinite;}
@keyframes hdot{0%,100%{opacity:1;}50%{opacity:.2;}}
.hud-crown{font-size:16px;animation:crownBounce 2s infinite;}
@keyframes crownBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.hud-label{font-size:12px;letter-spacing:2px;color:rgba(255,208,0,.6);}
.hud-name{font-size:17px;letter-spacing:2px;color:#FFD000;text-shadow:0 0 10px rgba(255,208,0,.6);}
.hud-name.sub{color:#FFD700;text-shadow:0 0 15px rgba(255,215,0,.8),0 0 30px rgba(255,150,0,.4);}

#ttsMsg{
  position:fixed;top:840px;left:940px;
  background:rgba(0,0,0,0.78);border:1px solid rgba(255,208,0,.25);
  border-radius:12px;padding:12px 20px;width:480px;
  z-index:30;opacity:0;transition:opacity .3s;pointer-events:none;
}
#ttsMsg.sub-rep{border-color:rgba(255,215,0,.5);box-shadow:0 0 12px rgba(255,215,0,.2);}
#ttsMsg.show{opacity:1;}
.tts-user{font-size:15px;letter-spacing:2px;color:rgba(255,208,0,.7);margin-bottom:3px;}
.tts-text{font-family:'Inter',sans-serif;font-size:19px;font-weight:700;color:#fff;letter-spacing:.5px;}
</style>
</head>
<body>

<div id="sirenOverlay">
  <div class="siren-flash"></div>
  <div class="siren-text">🚨 MODO VIP 🚨</div>
  <div class="siren-sub">BUSCANDO REPRESENTANTE</div>
</div>
<div id="bg"></div>
<canvas id="particles"></canvas>
<div id="jpFlash"></div>
<canvas id="jpCanvas" width="1920" height="1080" style="position:fixed;inset:0;z-index:22;display:none;pointer-events:none;background:transparent;"></canvas>

<div id="stage">
  <div class="s-eyebrow">Seleccionando...</div>
  <div class="s-title">REPRESENTANTE<br>DEL STREAM</div>
  <div id="shuffleZone">
    <div class="shuffle-name" id="sh0"></div>
    <div class="shuffle-name active" id="sh1"></div>
    <div class="shuffle-name" id="sh2"></div>
  </div>
  <div id="chosenName"></div>
  <div class="s-badge" id="sBadge">🎤 REPRESENTANTE OFICIAL</div>
</div>

<div id="jackpotStage">
  <div class="jp-eyebrow" id="jpEyebrow">⭐ SELECCIONANDO MIEMBRO VIP ⭐</div>
  <div class="jp-card-scene">
    <div class="jp-card" id="jpCard">
      <!-- Frente -->
      <div class="jp-card-face jp-card-front">
        <div class="jp-card-front-icon">⭐</div>
        <div class="jp-card-scanning" id="jpScanning">---</div>
        <div class="jp-card-vip">MIEMBRO VIP</div>
      </div>
      <!-- Reverso -->
      <div class="jp-card-face jp-card-back">
        <div class="jp-card-back-label">👑 MIEMBRO VIP SELECCIONADO</div>
        <div class="jp-card-name" id="jpCardName">NOMBRE</div>
        <div class="jp-card-back-badge">⭐ REPRESENTANTE OFICIAL ⭐</div>
      </div>
    </div>
  </div>
  <!-- Reels ocultos — mantener para no romper referencias -->
  <div class="jp-slots">
    <div class="jp-reel" id="reel0"><div class="jp-reel-inner" id="reel0inner"></div><div class="jp-reel-line"></div></div>
    <div class="jp-reel" id="reel1"><div class="jp-reel-inner" id="reel1inner"></div><div class="jp-reel-line"></div></div>
    <div class="jp-reel" id="reel2"><div class="jp-reel-inner" id="reel2inner"></div><div class="jp-reel-line"></div></div>
  </div>
</div>

<div id="jpReveal">
  <div class="jp-jackpot-text">👑 MIEMBRO VIP 👑</div>
  <div class="jp-reveal-line"></div>
  <div class="jp-winner-name" id="jpWinnerName">USUARIO</div>
  <div class="jp-sub-badge" id="jpSubBadge">⭐ REPRESENTANTE OFICIAL ⭐</div>
</div>

<div id="repHud" class="normal">
  <span class="hud-dot"></span>
  <span id="hudCrown" style="display:none" class="hud-crown">👑</span>
  <span class="hud-label">REP:</span>
  <span class="hud-name" id="hudName">-</span>
</div>

<div id="ttsMsg">
  <div class="tts-user" id="ttsMsgUser"></div>
  <div class="tts-text" id="ttsMsgText"></div>
</div>

<script>

// ══ JACKPOT — CARTA FLIP ══
let jpScanInterval = null;
let jpScanTimers = [];

function startJackpot(candidates, chosen){
  // Limpiar timers previos
  if(jpScanInterval) clearInterval(jpScanInterval);
  jpScanTimers.forEach(t=>clearTimeout(t)); jpScanTimers=[];

  const stage = document.getElementById('jackpotStage');
  const card  = document.getElementById('jpCard');
  const scanning = document.getElementById('jpScanning');
  const cardName = document.getElementById('jpCardName');

  // Reset visual
  card.classList.remove('flipped');
  cardName.classList.remove('glow');
  document.getElementById('bg').className='jackpot show';
  document.getElementById('jpReveal').classList.remove('show');
  document.getElementById('jpSubBadge').classList.remove('show');
  stage.classList.add('show');

  playJackpotSpin();
  startParticles(false);

  const pool = candidates.length>0 ? [...candidates] : [chosen||'???'];
  let scanCount = 0;
  let delay = 55;
  const FAST_SCANS = 22;
  const SLOW_SCANS = 8;
  const TOTAL_SCANS = FAST_SCANS + SLOW_SCANS;

  function nextScan(){
    scanning.textContent = (pool[scanCount%pool.length]||'???').substring(0,14).toUpperCase();
    scanCount++;
    if(scanCount < FAST_SCANS){
      // Fase rápida — constante
      jpScanTimers.push(setTimeout(nextScan, delay));
    } else if(scanCount < TOTAL_SCANS){
      // Fase de desaceleración exponencial
      delay = Math.min(delay * 1.45, 400);
      jpScanTimers.push(setTimeout(nextScan, delay));
    } else {
      // Freeze en el ganador
      scanning.textContent = (chosen||'???').substring(0,14).toUpperCase();
      jpScanTimers.push(setTimeout(doFlip, 600));
    }
  }

  function doFlip(){
    cardName.textContent = (chosen||'???').substring(0,14).toUpperCase();
    card.classList.add('flipped');
    playJackpotWin();
    jpScanTimers.push(setTimeout(()=>{
      cardName.classList.add('glow');
      startParticles(true);
    }, 800));
  }

  nextScan();

  // FASE 5 — transición al reveal
  jpScanTimers.push(setTimeout(()=>{
    stage.classList.remove('show');
    revealJackpot(chosen);
  }, 7500));
}

function revealJackpot(name){
  const flash=document.getElementById('jpFlash');
  [0,130,260].forEach(d=>setTimeout(()=>{flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),90);},d));

  const reveal=document.getElementById('jpReveal');
  const stage=document.getElementById('jackpotStage');
  stage.classList.remove('show');
  document.getElementById('bg').className='jackpot show';
  document.getElementById('jpWinnerName').textContent=(name||'???').toUpperCase();
  document.getElementById('jpSubBadge').classList.remove('show');
  reveal.style.display='flex'; reveal.style.opacity='1';

let _ac=null;
function getAC(){
  if(!_ac){
    try{ _ac=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(_ac.state!=='running') _ac.resume().catch(()=>{});

}

},1000);

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'es-MX';
  utt.pitch  = profile.pitch;
  utt.rate   = profile.rate;
  utt.volume = 1.0;  // Volumen máximo

  // Seleccionar mejor voz en español disponible
  const voices = window.speechSynthesis.getVoices();
  const esVoices = voices.filter(v => v.lang.startsWith('es'));
  if(esVoices.length > 0){
    // Usar la voz según el índice del perfil para más variedad si hay varias
    const vIdx = VOICE_PROFILES.indexOf(profile) % esVoices.length;
    utt.voice = esVoices[vIdx] || esVoices[0];
  } else if(voices.length > 0){
    utt.voice = voices[0];
  }

  window.speechSynthesis.speak(utt);
}

// ══ Partículas ══
function startParticles(jackpot){
  const canvas=document.getElementById('particles');
  canvas.width=1920; canvas.height=1080;
  const ctx=canvas.getContext('2d');
  const colors=jackpot
    ?['#FFD700','#FFC200','#FFEC00','#FF8C00','#ffffff','#FFD000','#FFA500']
    :['#FFD000','#FF8800','#FFEC00','#ffffff','#FFA500'];

  particles=Array.from({length:jackpot?120:60},()=>({
    x:Math.random()*1920,
    y:jackpot?-20:Math.random()*1080,
    vx:(Math.random()-.5)*(jackpot?3:1.5),
    vy:jackpot?Math.random()*4+2:(Math.random()-.5)*1.5,
    r:jackpot?Math.random()*5+2:Math.random()*3+1,
    color:colors[Math.floor(Math.random()*colors.length)],
    opacity:Math.random()*.7+.3,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-.5)*.2,
    w:jackpot?Math.random()*12+4:0,
  }));

  function loop(){
    ctx.clearRect(0,0,1920,1080);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
      if(jackpot&&p.y>1100){p.y=-20;p.x=Math.random()*1920;}
      else if(!jackpot){if(p.x<0||p.x>1920)p.vx*=-1;if(p.y<0||p.y>1080)p.vy*=-1;}
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.opacity; ctx.shadowColor=p.color; ctx.shadowBlur=jackpot?12:8;
      ctx.fillStyle=p.color;
      if(jackpot&&p.w>0){ctx.fillRect(-p.w/2,-p.r/2,p.w,p.r);}
      else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    pRAF=requestAnimationFrame(loop);
  }
  if(pRAF) cancelAnimationFrame(pRAF);
  loop();
}

function stopParticles(){
  if(pRAF){cancelAnimationFrame(pRAF);pRAF=null;}
  const c=document.getElementById('particles');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

// ══ Audio Engine ══
function makeNoise(duration){
  const ac=getAC(); if(!ac) return null;
  const buf=ac.createBuffer(1,ac.sampleRate*duration,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource();
  src.buffer=buf;
  return src;
}

function makeOsc(type,freq){
  const ac=getAC(); if(!ac) return null;
  const o=ac.createOscillator();
  o.type=type; o.frequency.value=freq;
  return o;
}

function conn(...nodes){
  const ac=getAC(); if(!ac) return;
  for(let i=0;i<nodes.length-1;i++) if(nodes[i]&&nodes[i+1]) nodes[i].connect(nodes[i+1]);
  if(nodes[nodes.length-1]) nodes[nodes.length-1].connect(ac.destination);
}

// ══ FIX: Sonido de sirena real con posibilidad de parar ══
let sirenOscSource=null;
function playSirenSound(){
  const ac=getAC(); if(!ac) return;
  stopSirenSound();
  const t=ac.currentTime;
  const o=ac.createOscillator();
  const g=ac.createGain();
  const f=ac.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=900;

  // Sweep ascendente/descendente × 4 ciclos
  for(let i=0;i<8;i++){
    const st=t+i*0.5;
    o.frequency.setValueAtTime(600,st);
    o.frequency.linearRampToValueAtTime(1200,st+0.25);
    o.frequency.linearRampToValueAtTime(600,st+0.5);
  }
  o.type='sawtooth';
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.28,t+0.15);
  g.gain.setValueAtTime(0.28,t+3.6);
  g.gain.linearRampToValueAtTime(0,t+4.0);

  o.connect(f); f.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+4.0);
  sirenOscSource=o;
}

function stopSirenSound(){
  if(sirenOscSource){
    try{ sirenOscSource.stop(); }catch(e){}
    sirenOscSource=null;
  }
}

// ══ Reel spin sound ══
let reelSpinSource=null;
function startReelSpinSound(){
  const ac=getAC(); if(!ac) return;
  stopReelSpinSound();
  const bufLen=ac.sampleRate*0.5;
  const buf=ac.createBuffer(1,bufLen,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++){
    const pos=i/bufLen;
    d[i]=(Math.random()*2-1)*0.15;
    const clickFreq=12;
    if(Math.sin(pos*Math.PI*2*clickFreq)>0.92){
      d[i]+=(Math.random()*2-1)*0.6*Math.pow(Math.abs(Math.sin(pos*Math.PI*2*clickFreq)),8);
    }
  }
  reelSpinSource=ac.createBufferSource();
  reelSpinSource.buffer=buf;
  reelSpinSource.loop=true;
  const filter=ac.createBiquadFilter();
  filter.type='bandpass'; filter.frequency.value=800; filter.Q.value=1.5;
  const gain=ac.createGain();
  gain.gain.setValueAtTime(0,ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.35,ac.currentTime+0.3);
  reelSpinSource.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  reelSpinSource.start();
}

function stopReelSpinSound(){
  if(reelSpinSource){
    try{ reelSpinSource.stop(); }catch(e){}
    reelSpinSource=null;
  }
}

      const o=makeOsc('sine',freq); if(!o) return;
      const g=ac.createGain();
      g.gain.setValueAtTime(vol*0.08,t+delay); g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.4);
      o.connect(g); g.connect(ac.destination);
      o.start(t+delay); o.stop(t+delay+0.4);
    });
  });

  [2093,2637,3136,3951,4186].forEach((freq,i)=>{
    const o=makeOsc('sine',freq); if(!o) return;
    const g=ac.createGain();
    const st=t+1.0+i*0.12;
    g.gain.setValueAtTime(0.12,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.8);
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.8);
  });
}

let drumRollInterval = null;
let drumRollCount = 0;

function playDrumRoll(){
  const ac = getAC(); if(!ac) return;
  drumRollCount = 0;
  const totalBeats = 40; // igual que count>=40 en startAnimation
  let beatDelay = 140; // ms entre golpes, va acelerando

  function beat(){
    const t = ac.currentTime;
    drumRollCount++;
    // Golpe de caja — ruido corto con filtro
    const bufLen = Math.floor(ac.sampleRate * 0.04);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < bufLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufLen, 1.2);
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.8;
    const g = ac.createGain();
    const vol = 0.15 + (drumRollCount/totalBeats)*0.35; // crece con la racha
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    src.connect(filt); filt.connect(g); g.connect(ac.destination);
    src.start(t);

    // Sub-golpe que se intensifica
    const sub = ac.createOscillator(); sub.type = 'sine';
    sub.frequency.setValueAtTime(90 + drumRollCount*2, t);
    sub.frequency.exponentialRampToValueAtTime(40, t+0.06);
    const subG = ac.createGain();
    subG.gain.setValueAtTime(0.25 + (drumRollCount/totalBeats)*0.5, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    sub.connect(subG); subG.connect(ac.destination);
    sub.start(t); sub.stop(t+0.07);

    // Acelerar progresivamente
    beatDelay = Math.max(35, 140 - drumRollCount*3);
    if(drumRollCount < totalBeats){
      drumRollInterval = setTimeout(beat, beatDelay);
    }
  }
  beat();
}

function stopDrumRoll(){
  if(drumRollInterval){ clearTimeout(drumRollInterval); drumRollInterval = null; }
}

function playRevealFanfare(){
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime;

  // Boom de impacto
  const sub = ac.createOscillator(); sub.type = 'sine';
  const subG = ac.createGain();
  sub.frequency.setValueAtTime(100, t); sub.frequency.exponentialRampToValueAtTime(35, t+0.5);
  subG.gain.setValueAtTime(1.0, t); subG.gain.exponentialRampToValueAtTime(0.001, t+0.55);
  sub.connect(subG); subG.connect(ac.destination);
  sub.start(t); sub.stop(t+0.55);

  // Explosion noise
  const expLen = Math.floor(ac.sampleRate * 0.25);
  const expBuf = ac.createBuffer(1, expLen, ac.sampleRate);
  const expD = expBuf.getChannelData(0);
  for(let i=0;i<expLen;i++) expD[i]=(Math.random()*2-1)*Math.pow(1-i/expLen,0.7);
  const exp = ac.createBufferSource(); exp.buffer = expBuf;
  const expF = ac.createBiquadFilter(); expF.type = 'lowpass'; expF.frequency.value = 500;
  const expG = ac.createGain();
  expG.gain.setValueAtTime(0.7, t); expG.gain.exponentialRampToValueAtTime(0.001, t+0.3);
  exp.connect(expF); expF.connect(expG); expG.connect(ac.destination);
  exp.start(t);

  // Fanfarria 5 notas ascendentes
  const notes   = [523, 659, 784, 1047, 1319];
  const offsets = [0.05, 0.12, 0.19, 0.26, 0.33];
  notes.forEach((freq,i)=>{
    const o = ac.createOscillator(); o.type = 'triangle';
    const g = ac.createGain();
    const st = t + offsets[i];
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.4, st+0.04);
    g.gain.setValueAtTime(0.35, st+0.1); g.gain.exponentialRampToValueAtTime(0.001, st+0.28);
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.3);
  });

  // Acorde final sostenido
  [523, 659, 784, 1047].forEach((freq,i)=>{
    const o = ac.createOscillator(); o.type = 'sine';
    const g = ac.createGain();
    const st = t + 0.45 + i*0.02;
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.18, st+0.1);
    g.gain.setValueAtTime(0.18, st+1.0); g.gain.exponentialRampToValueAtTime(0.001, st+2.0);
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+2.0);
  });

  // Campanitas de brillo
  [2093, 2637, 3136, 4186].forEach((freq,i)=>{
    const o = ac.createOscillator(); o.type = 'sine';
    const g = ac.createGain();
    const st = t + 0.5 + i*0.1;
    g.gain.setValueAtTime(0.12, st); g.gain.exponentialRampToValueAtTime(0.001, st+0.7);
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.7);
  });
}
