<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comodines Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;}

/* ══ SORTEO ══ */
#sorteoStage{
  position:fixed;inset:0;z-index:20;
  background:rgba(0,0,0,.93);
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
#sorteoStage.show{display:flex;}
#sorteoStage.shrinking{animation:stageOut .7s cubic-bezier(.55,0,1,.45) forwards;}
@keyframes stageOut{0%{opacity:1;}100%{opacity:0;}}
.sorteo-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:14px;color:rgba(255,208,0,.7);
  margin-bottom:40px;text-shadow:0 0 20px rgba(255,208,0,.3);
}
#cardRow{display:grid;grid-template-columns:repeat(5,230px);gap:14px 16px;justify-content:center;}

/* ══ CARTA ══ */
.cw{
  width:148px;height:218px;perspective:600px;
  opacity:0;transform:translateY(40px);
  transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1);
}
.cw.visible{opacity:1;transform:translateY(0);}
.cw.sam-c1 .ci,.cw.sam-c2 .ci{border-color:rgba(255,208,0,.9);box-shadow:0 0 25px rgba(255,208,0,.7);}
.cw.chat-c1 .ci,.cw.chat-c2 .ci{border-color:rgba(245,158,11,.9);box-shadow:0 0 25px rgba(245,158,11,.7);}
.cw.flipped .ci{transform:rotateY(180deg);}
.cw.shrink{animation:cardShrink .55s cubic-bezier(.55,0,1,.45) forwards;}
@keyframes cardShrink{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(.2) translateY(30px);}}

.ci{
  width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  border-radius:12px;border:2px solid rgba(255,208,0,.28);
  box-shadow:0 6px 24px rgba(0,0,0,.7);
}
.cb,.cf{
  position:absolute;inset:0;border-radius:11px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.cb{background:linear-gradient(145deg,#08000f,#130020,#08000f);overflow:hidden;}
.cb::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,208,0,.022) 10px,rgba(255,208,0,.022) 11px);}
.cb-num{font-family:'Bebas Neue',sans-serif;font-size:90px;color:rgba(255,208,0,.2);z-index:2;line-height:1;}
.cb-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:5px;color:rgba(255,208,0,.15);z-index:2;margin-top:4px;}
.cf{transform:rotateY(180deg);padding:14px 10px;text-align:center;
  background:linear-gradient(145deg,#0d0900,#1f1400);border:2px solid rgba(255,208,0,.6);}
.cf-emoji{font-size:58px;line-height:1;margin-bottom:12px;}
.cf-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;line-height:1.1;margin-bottom:8px;}
.cf-desc{font-family:'Inter',sans-serif;font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;}

/* ══ HUD COMPACTO — más simple ══ */
#hud{
  position:fixed;top:100px;right:28px;z-index:15;
  display:none;flex-direction:column;gap:8px;
}
#hud.show{display:flex;}
#hud.entering .hud-row{animation:hudIn .5s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;}
#hud.entering .hud-row:nth-child(2){animation-delay:.1s;}
@keyframes hudIn{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}

.hud-row{
  display:flex;align-items:center;gap:8px;
  background:rgba(6,4,0,.85);
  border:1px solid rgba(255,208,0,.35);
  border-radius:10px;padding:7px 10px;
  backdrop-filter:blur(8px);
}
.hud-side{
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;letter-spacing:4px;color:rgba(255,208,0,.7);
  min-width:38px;
}
.hud-cards{display:flex;gap:6px;}
.hud-mini{
  width:38px;height:38px;border-radius:7px;
  border:1px solid rgba(255,208,0,.35);
  background:rgba(255,208,0,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:opacity .3s;
}
.hud-mini.used{opacity:.2;text-decoration:line-through;}
.hud-mini.empty{opacity:.2;}

/* ══ ACTIVACIÓN ══ */
#activation{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
#activation.show{display:flex;}
#actBg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(255,208,0,.07) 0%,transparent 65%);animation:bgP 1.2s infinite alternate;}
@keyframes bgP{from{opacity:.5;}to{opacity:1;}}
#actCard{
  position:relative;z-index:2;width:300px;border-radius:20px;
  padding:28px 24px;text-align:center;
  border:3px solid rgba(255,208,0,.8);
  background:linear-gradient(160deg,#0d0900,#1f1400);
  box-shadow:0 0 70px rgba(255,208,0,.5),0 0 140px rgba(255,180,0,.2);
  opacity:0;transform:scale(0) rotateY(90deg);
  transition:transform .7s cubic-bezier(.34,1.56,.64,1),opacity .3s;
}
#actCard.show{opacity:1;transform:scale(1) rotateY(0deg);}
#actWho{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:8px;color:rgba(255,208,0,.6);margin-bottom:14px;}
#actEmoji{font-size:80px;line-height:1;margin-bottom:14px;}
#actTitle{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:3px;color:#fff;line-height:1;margin-bottom:16px;text-shadow:0 0 20px rgba(255,255,255,.4);}
.act-div{width:80%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,208,0,.4),transparent);margin:0 auto 16px;}
#actDesc{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:rgba(255,255,255,.75);line-height:1.5;font-style:italic;}
#actFlash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:35;background:rgba(255,208,0,.35);transition:opacity .07s;}
</style>
</head>
<body>
<div id="sorteoStage">
  <div class="sorteo-title">🃏 ELIGE TU COMODÍN 🃏</div>
  <div id="cardRow"></div>
</div>

<div id="hud">
  <div class="hud-row" id="hudRowSam">
    <div class="hud-side">SAM</div>
    <div class="hud-cards">
      <div class="hud-mini empty" id="hudSam0">🃏</div>
      <div class="hud-mini empty" id="hudSam1">🃏</div>
    </div>
  </div>
  <div class="hud-row" id="hudRowChat">
    <div class="hud-side">CHAT</div>
    <div class="hud-cards">
      <div class="hud-mini empty" id="hudChat0">🃏</div>
      <div class="hud-mini empty" id="hudChat1">🃏</div>
    </div>
  </div>
</div>

<div id="activation">
  <div id="actBg"></div>
  <div id="actCard">
    <div id="actWho"></div>
    <div id="actEmoji">⭐</div>
    <div id="actTitle">COMODÍN</div>
    <div class="act-div"></div>
    <div id="actDesc"></div>
  </div>
</div>
<div id="actFlash"></div>

<script>
const LS='comodines_state';
const AC=new(window.AudioContext||window.webkitAudioContext)();

const MAZO_BASE=[
  {emoji:'💚',titulo:'Recuperación',    desc:'Si ganas esta ronda recuperas media vida.'},
  {emoji:'🎲',titulo:'Lotería',         desc:'Ganas o pierdes media vida al azar. 50/50.'},
  {emoji:'🔄',titulo:'Inversión Total', desc:'El rival tiene que votar mal para ganar esta ronda.'},
  {emoji:'💀',titulo:'Doble o nada',    desc:'Si el rival pierde esta ronda, pierde 1 vida completa.'},
  {emoji:'🛡️',titulo:'Escudo',          desc:'Tu próximo error no te quita vida. Un fallo gratis.'},
  {emoji:'⚔️',titulo:'Sabotaje',        desc:'Si el rival falla, pierde 1 vida completa en lugar de media.'},
  {emoji:'🩸',titulo:'Robo de vida',    desc:'Le robas media vida al rival y te la sumas.'},
  {emoji:'🔀',titulo:'Ruleta de vidas', desc:'Las vidas de Sam y Chat se intercambian completamente.'},
  {emoji:'✨',titulo:'Resurrección',    desc:'Recuperas TODAS tus vidas de golpe.'},
  {emoji:'🎭',titulo:'Cambiar Personaje',desc:'El representante del chat responde en el personaje que Sam elija al momento.'},
];

let mazo=[];
let samCards=[null,null], chatCards=[null,null];
let samUsed=[false,false], chatUsed=[false,false];
let lastTs=0, actTimer=null;

function showSorteo(mazoData){
  mazo=mazoData||[...MAZO_BASE].sort(()=>Math.random()-.5);
  samCards=[null,null];chatCards=[null,null];
  samUsed=[false,false];chatUsed=[false,false];
  resetHudMinis();
  document.getElementById('sorteoStage').classList.add('show');
  buildCards();
  playSound('appear');
}

function hideSorteo(){
  const stage=document.getElementById('sorteoStage');
  document.querySelectorAll('.cw').forEach((c,i)=>setTimeout(()=>c.classList.add('shrink'),i*35));
  const n=document.querySelectorAll('.cw').length;
  setTimeout(()=>stage.classList.add('shrinking'),n*35);
  setTimeout(()=>{stage.classList.remove('show','shrinking');
    document.querySelectorAll('.cw').forEach(c=>c.classList.remove('shrink'));
  },n*35+750);
}

function showHudAnimated(){
  const hud=document.getElementById('hud');
  hud.classList.add('show','entering');
  setTimeout(()=>hud.classList.remove('entering'),700);
}

function buildCards(){
  const row=document.getElementById('cardRow');
  row.innerHTML='';
  mazo.forEach((c,i)=>{
    const w=document.createElement('div');
    w.className='cw';w.id='cw'+i;
    w.innerHTML=`<div class="ci">
      <div class="cb"><div class="cb-num">${i+1}</div><div class="cb-label">COMODÍN</div></div>
      <div class="cf"><div class="cf-emoji">${c.emoji}</div><div class="cf-title">${c.titulo}</div><div class="cf-desc">${c.desc}</div></div>
    </div>`;
    row.appendChild(w);
    setTimeout(()=>w.classList.add('visible'),i*65+80);
  });
}

function chooseSide(side,slot,idx){
  if(idx<0||idx>=mazo.length)return;
  if(side==='sam')samCards[slot]=mazo[idx];
  else chatCards[slot]=mazo[idx];
  const suffix=side==='sam'?'sam-c':'chat-c';
  const w=document.getElementById('cw'+idx);
  if(w){w.classList.add(suffix+(slot+1));setTimeout(()=>w.classList.add('flipped'),200);}
  playSound('flip');
  setTimeout(()=>updateHudMinis(),1000);
}

function updateHudMinis(){
  samCards.forEach((c,i)=>{
    const el=document.getElementById('hudSam'+i);
    if(!el)return;
    if(c){el.textContent=c.emoji;el.classList.remove('empty');el.classList.toggle('used',samUsed[i]);}
  });
  chatCards.forEach((c,i)=>{
    const el=document.getElementById('hudChat'+i);
    if(!el)return;
    if(c){el.textContent=c.emoji;el.classList.remove('empty');el.classList.toggle('used',chatUsed[i]);}
  });
}

function resetHudMinis(){
  ['Sam','Chat'].forEach(side=>['0','1'].forEach(i=>{
    const el=document.getElementById('hud'+side+i);
    if(el){el.textContent='🃏';el.className='hud-mini empty';}
  }));
}

function activateComodin(side,slot){
  const cards=side==='sam'?samCards:chatCards;
  const used=side==='sam'?samUsed:chatUsed;
  const c=cards[slot];
  if(!c||used[slot])return;
  if(actTimer){clearTimeout(actTimer);actTimer=null;}

  const actCard=document.getElementById('actCard');
  const flash=document.getElementById('actFlash');
  const act=document.getElementById('activation');
  actCard.classList.remove('show');
  document.getElementById('actWho').textContent=side==='sam'?'⚔️ SAM ACTIVA SU COMODÍN':'💬 EL CHAT ACTIVA SU COMODÍN';
  document.getElementById('actWho').style.color=side==='sam'?'rgba(255,208,0,.7)':'rgba(245,158,11,.7)';
  document.getElementById('actEmoji').textContent=c.emoji;
  document.getElementById('actTitle').textContent=c.titulo.toUpperCase();
  document.getElementById('actDesc').textContent=c.desc;

  act.classList.add('show');
  flash.style.opacity='1';setTimeout(()=>flash.style.opacity='0',120);
  setTimeout(()=>{flash.style.opacity='.4';setTimeout(()=>flash.style.opacity='0',100);},280);
  setTimeout(()=>actCard.classList.add('show'),80);
  playSound('activate');
  setTimeout(()=>speakMaleficent(c.titulo+'. '+c.desc),900);

  if(side==='sam')samUsed[slot]=true; else chatUsed[slot]=true;
  updateHudMinis();
  actTimer=setTimeout(()=>closeActivation(),7500);
}

function closeActivation(){
  if(actTimer){clearTimeout(actTimer);actTimer=null;}
  const actCard=document.getElementById('actCard');
  actCard.classList.remove('show');
  setTimeout(()=>{document.getElementById('activation').classList.remove('show');window.speechSynthesis.cancel();},700);
}

function resetAll(){
  closeActivation();hideSorteo();
  document.getElementById('hud').classList.remove('show');
  resetHudMinis();
  samCards=[null,null];chatCards=[null,null];
  samUsed=[false,false];chatUsed=[false,false];
}

function playSound(type){
  AC.resume();const t=AC.currentTime;
  if(type==='appear'){
    [0,.1,.2].forEach((d,i)=>{const o=AC.createOscillator();o.type='sine';o.frequency.value=400+i*180;const g=AC.createGain();g.gain.setValueAtTime(.14,t+d);g.gain.exponentialRampToValueAtTime(.001,t+d+.18);o.connect(g);g.connect(AC.destination);o.start(t+d);o.stop(t+d+.2);});
  }else if(type==='flip'){
    const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(580,t+.14);const g=AC.createGain();g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+.2);
  }else if(type==='activate'){
    const sub=AC.createOscillator();sub.type='sine';sub.frequency.setValueAtTime(110,t);sub.frequency.exponentialRampToValueAtTime(32,t+.5);const sg=AC.createGain();sg.gain.setValueAtTime(.85,t);sg.gain.exponentialRampToValueAtTime(.001,t+.6);sub.connect(sg);sg.connect(AC.destination);sub.start(t);sub.stop(t+.65);
    [523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator();o.type='triangle';const g=AC.createGain();const st=t+.1+i*.12;g.gain.setValueAtTime(.22,st);g.gain.exponentialRampToValueAtTime(.001,st+.32);o.frequency.value=f;o.connect(g);g.connect(AC.destination);o.start(st);o.stop(st+.34);});
  }
}

function speakMaleficent(text){
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance();
  utt.lang='es-MX';utt.pitch=0.25;utt.rate=0.58;utt.volume=1.0;
  utt.text=text.replace(/\./g,'...').replace(/,/g,',,');
  const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));
  if(v)utt.voice=v;
  window.speechSynthesis.speak(utt);
}
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

let lastTs2=0;
setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);if(!raw)return;
    const s=JSON.parse(raw);if(!s.ts||s.ts===lastTs2)return;
    lastTs2=s.ts;const a=s.action;
    if(a==='sorteo')       showSorteo(s.mazo);
    else if(a==='hide')    resetAll();
    else if(a==='compacto'){hideSorteo();setTimeout(showHudAnimated,600);}
    else if(a==='chooseSam0')  chooseSide('sam',0,s.idx);
    else if(a==='chooseSam1')  chooseSide('sam',1,s.idx);
    else if(a==='chooseChat0') chooseSide('chat',0,s.idx);
    else if(a==='chooseChat1') chooseSide('chat',1,s.idx);
    else if(a==='activateSam0')  activateComodin('sam',0);
    else if(a==='activateSam1')  activateComodin('sam',1);
    else if(a==='activateChat0') activateComodin('chat',0);
    else if(a==='activateChat1') activateComodin('chat',1);
    else if(a==='closeAct')   closeActivation();
    else if(a==='reset')      resetAll();
  }catch(e){}
},300);
</script>
</body>
</html>
