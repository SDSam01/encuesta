<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Castigos Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:'Inter',sans-serif;color:#fff;padding:14px;max-width:480px;margin:0 auto;}
h1{font-size:14px;font-weight:700;margin-bottom:2px;}
.sub{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:14px;}
.section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;margin-bottom:10px;}
.sec-title{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.sec-title.sam{color:#4488ff;}
.sec-title.chat{color:#f87171;}
label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);display:block;margin-bottom:3px;margin-top:8px;}
label:first-of-type{margin-top:0;}
input[type=text],textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;color:#fff;font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:vertical;}
textarea{min-height:48px;line-height:1.4;}
input:focus,textarea:focus{border-color:rgba(255,255,255,.25);}
.castigo-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px;margin-bottom:7px;}
.castigo-num{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:6px;}
.btn-girar{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:1px;transition:.15s;border:1px solid;margin-bottom:6px;}
.btn-girar.sam{background:rgba(68,136,255,.15);border-color:rgba(68,136,255,.4);color:#4488ff;}
.btn-girar.sam:hover{background:rgba(68,136,255,.28);}
.btn-girar.chat{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.4);color:#f87171;}
.btn-girar.chat:hover{background:rgba(248,113,113,.28);}
.btn-reset{width:100%;padding:7px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);margin-top:4px;}
.status{font-size:11px;text-align:center;padding:6px;min-height:20px;color:rgba(255,255,255,.35);}
.status.ok{color:#4ade80;}.status.err{color:#f87171;}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);transition:.15s;text-align:center;}
.tab.active-sam{background:rgba(68,136,255,.18);border-color:rgba(68,136,255,.45);color:#4488ff;}
.tab.active-chat{background:rgba(248,113,113,.18);border-color:rgba(248,113,113,.45);color:#f87171;}
.tab-content{display:none;}.tab-content.active{display:block;}
.btn-ocultar{width:100%;padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;background:rgba(255,100,0,.1);border:1px solid rgba(255,100,0,.3);color:rgba(255,140,0,.7);margin-bottom:6px;transition:.15s;}
.btn-ocultar:hover{background:rgba(255,100,0,.2);}
</style>
</head>
<body>
<h1>🎰 Castigos Control</h1>
<div class="sub">3 castigos para Sam — 3 para el Chat — Maléfica los leerá</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active-sam" id="tabSam" onclick="switchTab('sam')">⚔️ Sam</button>
  <button class="tab" id="tabChat" onclick="switchTab('chat')">💬 Chat</button>
</div>

<!-- Pestaña Sam -->
<div class="tab-content active" id="tabContentSam">
  <div class="section">
    <div class="sec-title sam">⚔️ Castigos de Sam</div>
    <div id="samForm"></div>
    <button class="btn-girar sam" onclick="girar('sam')">🎰 Girar tómbola de Sam</button>
  </div>
</div>

<!-- Pestaña Chat -->
<div class="tab-content" id="tabContentChat">
  <div class="section">
    <div class="sec-title chat">💬 Castigos del Chat</div>
    <div id="chatForm"></div>
    <button class="btn-girar chat" onclick="girar('chat')">🎰 Girar tómbola del Chat</button>
  </div>
</div>

<button class="btn-ocultar" onclick="ocultarOverlay()">🙈 Ocultar tómbola del overlay</button>
<button class="btn-reset" onclick="resetTodo()">🔄 Reset completo</button>
<div class="status" id="statusBar"></div>

<script>
const LS='castigos_state';
const COUNT=3;

let data={
  sam: Array.from({length:COUNT},()=>({titulo:'',descripcion:''})),
  chat: Array.from({length:COUNT},()=>({titulo:'',descripcion:''}))
};

function load(){
  try{
    const raw=localStorage.getItem(LS);
    if(raw){ const s=JSON.parse(raw); if(s.sam) data.sam=s.sam; if(s.chat) data.chat=s.chat; }
  }catch(e){}
}

function save(){
  const cur=JSON.parse(localStorage.getItem(LS)||'{}');
  localStorage.setItem(LS,JSON.stringify({...cur,sam:data.sam,chat:data.chat}));
}

function renderForm(side){
  const container=document.getElementById(side+'Form');
  container.innerHTML='';
  data[side].forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='castigo-card';
    div.innerHTML=`
      <div class="castigo-num">CASTIGO ${i+1}</div>
      <label>Título</label>
      <input type="text" placeholder="Ej: Bailar un trend..." value="${c.titulo}"
        oninput="update('${side}',${i},'titulo',this.value)">
      <label>Descripción completa</label>
      <textarea placeholder="Descripción que Maléfica leerá en voz alta..."
        oninput="update('${side}',${i},'descripcion',this.value)">${c.descripcion}</textarea>
    `;
    container.appendChild(div);
  });
}

function update(side,idx,field,val){
  data[side][idx][field]=val;
  save();
}

function girar(side){
  const valid=data[side].filter(c=>c.titulo.trim());
  if(!valid.length){setStatus('⚠️ Ingresa al menos 1 castigo','err');return;}
  const winnerIdx=data[side].indexOf(valid[Math.floor(Math.random()*valid.length)]);
  const cur=JSON.parse(localStorage.getItem(LS)||'{}');
  localStorage.setItem(LS,JSON.stringify({
    ...cur,
    sam:data.sam, chat:data.chat,
    spinning:true, target:side, winner:winnerIdx, ts:Date.now()
  }));
  setStatus(`🎰 Girando tómbola de ${side==='sam'?'Sam':'el Chat'}...`,'ok');
  setTimeout(()=>setStatus('',''),4000);
}

function resetTodo(){
  data={
    sam:Array.from({length:COUNT},()=>({titulo:'',descripcion:''})),
    chat:Array.from({length:COUNT},()=>({titulo:'',descripcion:''}))
  };
  localStorage.setItem(LS,JSON.stringify({sam:data.sam,chat:data.chat,spinning:false,winner:null}));
  renderForm('sam'); renderForm('chat');
  setStatus('Reset completo','');
}

function setStatus(msg,type){
  const el=document.getElementById('statusBar');
  el.textContent=msg; el.className='status '+(type||'');
}

function switchTab(side){
  document.getElementById('tabContentSam').className='tab-content'+(side==='sam'?' active':'');
  document.getElementById('tabContentChat').className='tab-content'+(side==='chat'?' active':'');
  document.getElementById('tabSam').className='tab'+(side==='sam'?' active-sam':'');
  document.getElementById('tabChat').className='tab'+(side==='chat'?' active-chat':'');
}

function ocultarOverlay(){
  const cur=JSON.parse(localStorage.getItem(LS)||'{}');
  localStorage.setItem(LS,JSON.stringify({...cur,spinning:false,hide:true,hideTs:Date.now()}));
  setStatus('Tómbola ocultada','ok');
  setTimeout(()=>setStatus('',''),2000);
}

load(); renderForm('sam'); renderForm('chat');
</script>
</body>
</html>
