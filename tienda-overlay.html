<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trivia Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;}

/* ══ MARCADOR FÚTBOL ══ */
#scoreboard{
  position:fixed;top:0;left:50%;
  transform:translateX(-50%) translateY(-100px);
  transition:transform .7s cubic-bezier(.34,1.56,.64,1);
  z-index:30;
  background:rgba(0,0,0,.8);
  border-radius:0 0 18px 18px;
  padding:8px 40px 12px;
  border:1px solid rgba(255,255,255,.1);border-top:none;
  backdrop-filter:blur(12px);
  display:flex;align-items:center;gap:20px;
}
#scoreboard.show{transform:translateX(-50%) translateY(0);}
.sb-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:6px;color:rgba(255,255,255,.7);}
.sb-score{display:flex;align-items:center;gap:12px;}
.sb-num{
  font-family:'Bebas Neue',sans-serif;font-size:48px;color:#fff;
  display:inline-block;transition:transform .2s;
}
.sb-num.pop{animation:numPop .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes numPop{0%{transform:scale(1);}50%{transform:scale(1.7);}100%{transform:scale(1);}}
.sb-vs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(255,255,255,.25);}

/* Characters hidden by default */
.char-container{
  position:fixed;bottom:0;
  width:300px;height:450px;
  z-index:20;
  opacity:0;
  transition:opacity .5s ease;
}
.char-container.visible{opacity:1;}

/* Hat overlay — mismo tamaño que el sprite, offset para alinear con char-idle */
.char-hat{
  position:absolute;inset:0;
  width:300px;height:450px;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:bottom center;
  pointer-events:none;
  transform:translateY(-134px); /* offset: cabeza de char-idle está 124px más arriba que MODELO_BASE */
}
#char1{left:16px;}
#char2{right:16px;}



/* FRAMES — imagen individual por pose */
.frame-idle      {background-image:url('char-idle.png');}
.frame-talk      {background-image:url('char-talk.png');}
.frame-wave      {background-image:url('char-wave.png');}
.frame-celebrate {background-image:url('char-celebrate.png');}
.frame-victory   {background-image:url('char-victory.png');}
.frame-scared    {background-image:url('char-scared.png');}
.frame-run1      {background-image:url('char-run1.png');}
.frame-run2      {background-image:url('char-run2.png');}
.frame-defeated  {background-image:url('defeated.png');}

/* Flip wrapper — solo char1 se espeja para mirar al centro */
.char-flip{
  width:300px;height:450px;
  transform-origin:center bottom;
}
#flip1{transform:scaleX(-1);}
#flip2{transform:scaleX(1);}

/* char-body — wrapper animado que mueve sprite+hat juntos */
.char-body{
  position:relative;
  width:300px;height:450px;
  transform-origin:bottom center;
}
.char-body.idle-bounce{animation:idleBreath 3s ease-in-out infinite;}
.char-body.jumping{animation:jumpAnim .55s ease-in-out 2;}
.char-body.celebrating{animation:celebrateAnim .5s ease-in-out 4 alternate;}
.char-body.walking{} /* walk: solo cambia frame, sin movimiento de cuerpo */

/* sprite y hat ahora no tienen animación propia */
.char-sprite{
  position:absolute;inset:0;
  width:300px;height:450px;
  background-repeat:no-repeat;
  background-size:contain;
  background-position:bottom center;
}

/* COLORIZACIÓN */
.hue-0   {filter:sepia(1) hue-rotate(0deg) saturate(3) brightness(1.05);}
.hue-30  {filter:sepia(1) hue-rotate(30deg) saturate(3) brightness(1.05);}
.hue-60  {filter:sepia(1) hue-rotate(60deg) saturate(3) brightness(1.05);}
.hue-90  {filter:sepia(1) hue-rotate(90deg) saturate(3) brightness(1.05);}
.hue-120 {filter:sepia(1) hue-rotate(120deg) saturate(3) brightness(1.05);}
.hue-150 {filter:sepia(1) hue-rotate(150deg) saturate(3) brightness(1.05);}
.hue-180 {filter:sepia(1) hue-rotate(180deg) saturate(3) brightness(1.05);}
.hue-210 {filter:sepia(1) hue-rotate(210deg) saturate(3) brightness(1.05);}
.hue-240 {filter:sepia(1) hue-rotate(240deg) saturate(3) brightness(1.05);}
.hue-270 {filter:sepia(1) hue-rotate(270deg) saturate(3) brightness(1.05);}
.hue-300 {filter:sepia(1) hue-rotate(300deg) saturate(3) brightness(1.05);}
.hue-330 {filter:sepia(1) hue-rotate(330deg) saturate(3) brightness(1.05);}

/* ANIMACIONES */
.char-container.enter-l{animation:charEnterL .6s cubic-bezier(.34,1.56,.64,1) forwards;}
.char-container.enter-r{animation:charEnterR .6s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes charEnterL{from{transform:translateX(-320px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes charEnterR{from{transform:translateX(320px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* Idle — respiración sutil, NO flota */

@keyframes idleBreath{0%,100%{transform:scaleY(1) scaleX(1);}50%{transform:scaleY(1.012) scaleX(0.994);}}

/* Walk — alterna run1/run2 */

@keyframes walkAnim{
  0%,49%{background-image:url('char-run1.png');}
  50%,100%{background-image:url('char-run2.png');}
}

/* Jump */

@keyframes jumpAnim{0%{transform:translateY(0) scaleY(1);}40%{transform:translateY(-30px) scaleY(1.04);}80%{transform:translateY(0) scaleY(.93);}100%{transform:translateY(0) scaleY(1);}}

/* Celebrate */

@keyframes celebrateAnim{from{transform:rotate(-3deg);}to{transform:rotate(3deg);}}

/* Burbuja de habla */
/* Burbuja — posición fixed encima del nombre */
.speech{
  position:fixed;z-index:26;
  background:rgba(255,255,255,.95);border-radius:12px;padding:7px 16px;
  font-family:'Inter',sans-serif;font-size:26px;font-weight:900;color:#111;letter-spacing:.3px;
  max-width:320px;word-break:break-word;line-height:1.3;
  opacity:0;transform:scale(.8) translateY(6px);
  transition:opacity .2s,transform .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.speech::after{
  content:'';position:absolute;top:100%;left:24px;
  border:8px solid transparent;
  border-top-color:rgba(255,255,255,.95);border-bottom:none;
}
.speech.show{opacity:1;transform:scale(1) translateY(0);}
/* Posiciones */
#speech1{bottom:500px;left:16px;}
#speech2{bottom:500px;right:16px;}
#speech2::after{left:auto;right:24px;}

/* REP BADGE */
.rep-badge{
  position:fixed;z-index:25;
  font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;font-weight:800;
  background:rgba(0,0,0,.82);border-radius:10px;padding:7px 20px;
  border:1px solid rgba(255,255,255,.12);color:#fff;
  opacity:0;transition:opacity .4s,transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
}
/* Nombre justo encima de la cabeza del personaje */
#rep1{bottom:455px;left:16px;transform:translateX(-10px);}
#rep2{bottom:455px;right:16px;transform:translateX(10px);}
#rep1.show{opacity:1;transform:translateX(0);}
#rep2.show{opacity:1;transform:translateX(0);}

/* ══ PREGUNTA — zona 9:16 abajo ══ */
#qBox{
  position:fixed;bottom:-500px;left:50%;transform:translateX(-50%);
  width:660px;z-index:40;
  background:rgba(5,5,12,.93);border-radius:20px;padding:22px 26px;
  border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(16px);
  transition:bottom .55s cubic-bezier(.34,1.56,.64,1);
}
#qBox.show{bottom:28px;}
.q-cat{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:9px;color:rgba(255,208,0,.8);margin-bottom:10px;opacity:0;transition:opacity .3s .15s;}
#qBox.show .q-cat{opacity:1;}
.q-text{font-family:'Inter',sans-serif;font-size:19px;font-weight:700;color:#fff;line-height:1.45;margin-bottom:14px;opacity:0;transition:opacity .35s .25s,transform .35s .25s;transform:translateY(6px);}
#qBox.show .q-text{opacity:1;transform:translateY(0);}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.q-opt{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  border-radius:10px;padding:9px 13px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,.82);
  opacity:0;transform:translateX(16px);transition:all .3s,opacity .3s,transform .3s;
}
#qBox.show .q-opt:nth-child(1){opacity:1;transform:none;transition-delay:.32s;}
#qBox.show .q-opt:nth-child(2){opacity:1;transform:none;transition-delay:.40s;}
#qBox.show .q-opt:nth-child(3){opacity:1;transform:none;transition-delay:.48s;}
#qBox.show .q-opt:nth-child(4){opacity:1;transform:none;transition-delay:.56s;}
.q-key{width:27px;height:27px;border-radius:6px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;}
.q-opt.correct{background:rgba(74,222,128,.2);border-color:#4ade80;animation:optBounce .4s ease;}
/* Answer selections per team */
.q-opt.sel-t1{border-color:rgba(6,214,160,.8);box-shadow:inset 0 0 0 2px rgba(6,214,160,.4);}
.q-opt.sel-t2{border-color:rgba(255,107,107,.8);box-shadow:inset 0 0 0 2px rgba(255,107,107,.4);}
.q-opt.sel-t1.sel-t2{border-color:rgba(255,208,0,.8);box-shadow:inset 0 0 0 2px rgba(255,208,0,.4);}
.team-marker{font-size:10px;font-weight:900;padding:2px 5px;border-radius:4px;display:inline-flex;align-items:center;gap:2px;}
.tm1{background:rgba(6,214,160,.25);color:#06d6a0;}
.tm2{background:rgba(255,107,107,.25);color:#ff6b6b;}
.q-opt-markers{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
/* Reveal animation per team */
.q-opt .reveal-mark{
  font-size:18px;font-weight:900;margin-left:auto;
  opacity:0;transform:scale(0);
  transition:opacity .3s,transform .4s cubic-bezier(.34,1.56,.64,1);
}
.q-opt.revealed-correct .reveal-mark{opacity:1;transform:scale(1);color:#4ade80;}
.q-opt.revealed-wrong .reveal-mark{opacity:1;transform:scale(1);color:#f87171;}
.q-opt.correct .q-key{background:#4ade80;color:#000;}
.q-opt.wrong{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);}
@keyframes optBounce{0%{transform:scale(1);}50%{transform:scale(1.04);}100%{transform:scale(1);}}

/* ══ FLASH RESULTADO ══ */
#rFlash{position:fixed;inset:0;z-index:60;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;}
#rFlash.show{animation:rIn 2.5s ease forwards;}
@keyframes rIn{0%{opacity:0;}12%{opacity:1;}75%{opacity:1;}100%{opacity:0;}}
#rIcon{font-size:260px;line-height:1;filter:drop-shadow(0 0 50px currentColor);}
#rLabel{font-family:'Bebas Neue',sans-serif;font-size:66px;letter-spacing:16px;margin-top:6px;}
.rc #rIcon,.rc #rLabel{color:#4ade80;}
.rw #rIcon,.rw #rLabel{color:#f87171;}
.rwin #rIcon{font-size:140px;}
.rwin #rLabel{font-size:84px;color:#FFD000;}

/* Resultado sobre el personaje */
.char-result{
  position:fixed;z-index:50;pointer-events:none;
  font-size:100px;line-height:1;text-align:center;
  opacity:0;transform:scale(.5) translateY(20px);
  transition:opacity .2s, transform .3s cubic-bezier(.34,1.56,.64,1);
  filter:drop-shadow(0 0 20px currentColor);
}
.char-result.show{opacity:1;transform:scale(1) translateY(0);}
.char-result.correct{color:#4ade80;}
.char-result.wrong{color:#f87171;}
/* Posición SOBRE el personaje (centrado en el cuerpo) */
#cres1{left:30px;bottom:200px;width:300px;text-align:center;}
#cres2{right:30px;bottom:200px;width:300px;text-align:center;}

/* ══ CATEGORY ROLL ══ */
#catRoll{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  z-index:70;pointer-events:none;
  opacity:0;transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
}
#catRoll.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#catRollLabel{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:12px;
  color:rgba(255,255,255,.6);
  margin-bottom:12px;
}
#catRollValue{
  font-family:'Bebas Neue',sans-serif;
  font-size:72px;letter-spacing:4px;
  color:#FFD000;
  text-shadow:0 0 40px rgba(255,208,0,.8),0 0 80px rgba(255,180,0,.4);
  line-height:1;
  transition:transform .08s;
}
#catRoll.final #catRollValue{
  animation:catFinalPop .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes catFinalPop{
  0%{transform:scale(1);}
  50%{transform:scale(1.25);}
  100%{transform:scale(1.1);}
}
#catRollBg{
  position:absolute;inset:-30px;
  border-radius:24px;
  background:rgba(0,0,0,.88);
  border:2px solid rgba(255,208,0,.3);
  backdrop-filter:blur(12px);
  z-index:-1;
}

/* CONFETTI */
.cfti{position:fixed;width:9px;height:9px;border-radius:2px;z-index:55;pointer-events:none;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(1200px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<div id="scoreboard">
  <div class="sb-name" id="sbn1">EQUIPO 1</div>
  <div class="sb-score">
    <span class="sb-num" id="sbp1">0</span>
    <span class="sb-vs">VS</span>
    <span class="sb-num" id="sbp2">0</span>
  </div>
  <div class="sb-name" id="sbn2">EQUIPO 2</div>
</div>

<div class="rep-badge" id="rep1"></div>
<div class="rep-badge" id="rep2"></div>
<div class="speech" id="speech1"></div>
<div class="speech" id="speech2"></div>

<div class="char-container" id="char1">
  <div class="char-flip" id="flip1">
    <div class="char-body" id="body1">
      <div class="char-sprite frame-idle" id="sprite1"></div>
      <div class="char-hat" id="hat1"></div>
    </div>
  </div>
</div>
<div class="char-container" id="char2">
  <div class="char-flip" id="flip2">
    <div class="char-body" id="body2">
      <div class="char-sprite frame-idle" id="sprite2"></div>
      <div class="char-hat" id="hat2"></div>
    </div>
  </div>
</div>

<div id="qBox">
  <div class="q-cat" id="qCat">🌍 CATEGORÍA</div>
  <div class="q-text" id="qText">Esperando pregunta...</div>
  <div class="q-opts" id="qOpts"></div>
</div>

<!-- Flash central para winner -->
<div id="catRoll">
  <div id="catRollBg"></div>
  <div id="catRollLabel">🎲 CATEGORÍA DEL ROUND</div>
  <div id="catRollValue">???</div>
</div>
<div id="rFlash"><div id="rIcon">✓</div><div id="rLabel">CORRECTO</div></div>
<!-- Resultado por personaje -->
<div class="char-result" id="cres1"></div>
<div class="char-result" id="cres2"></div>

<script>
// ══ AUDIO ══
const AC=new(window.AudioContext||window.webkitAudioContext)();
function n(f,d,v=0.25,t='sine',s=AC.currentTime){const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(AC.destination);o.start(s);o.stop(s+d+0.05);}
function sfxQ(){AC.resume();const t=AC.currentTime;n(350,.06,.12,'sine',t);n(550,.08,.14,'sine',t+.09);n(820,.22,.16,'sine',t+.18);}
function sfxOk(){AC.resume();const t=AC.currentTime;[523,659,784,1047].forEach((f,i)=>n(f,.22,.2,'triangle',t+i*.09));}
function sfxFail(){AC.resume();const t=AC.currentTime;[380,300,240].forEach((f,i)=>n(f,.2,.2,'sawtooth',t+i*.11));}
function sfxPop(){AC.resume();n(900,.08,.15,'sine');setTimeout(()=>n(1100,.12,.18,'sine'),75);}
function sfxEnter(){AC.resume();const t=AC.currentTime;n(280,.05,.1,'sine',t);n(560,.08,.14,'sine',t+.05);n(840,.18,.12,'sine',t+.12);}

// ══ CONFETTI ══
const CFC=['#FFD700','#4ade80','#60a5fa','#f87171','#c084fc','#fb923c','#34d399'];
function confetti(){
  for(let i=0;i<55;i++){
    const el=document.createElement('div');el.className='cfti';
    el.style.cssText=`left:${Math.random()*1920}px;top:-10px;background:${CFC[i%CFC.length]};animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*.7}s;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),3400);
  }
}

// ══ HATS ══
const HATS=[
  'gorro.png',
  'corona.png',
  'casco_seguridad.png',
  'boina.png',
  'gorra_atras.png',
  'gorrra_adelante.png',
  'gorro_fiesta.png',
  'sombrero.png',
];

function randomHat(){ return HATS[Math.floor(Math.random()*HATS.length)]; }

// ══ HUES ══
const HUES=[0,30,60,90,120,150,180,210,240,270,300,330];
function randomHueClass(){return 'hue-'+HUES[Math.floor(Math.random()*HUES.length)];}

// ══ FRAMES ══
const FRAMES={idle:'frame-idle',talk:'frame-talk',wave:'frame-wave',celebrate:'frame-celebrate',victory:'frame-victory',scared:'frame-scared',run1:'frame-run1',run2:'frame-run2',defeated:'frame-defeated'};
const ALL_FRAMES=Object.values(FRAMES);
function setFrame(sprite,frame){
  ALL_FRAMES.forEach(f=>sprite.classList.remove(f));
  sprite.classList.add(FRAMES[frame]||FRAMES.idle);
}

// ══ CHARACTER INIT ══
let hueClasses=['hue-0','hue-0'];
function initChar(idx,hue){
  const sprite=document.getElementById('sprite'+idx);
  const cont=document.getElementById('char'+idx);
  sprite.className='char-sprite';
  void sprite.offsetWidth;
  HUES.forEach(h=>sprite.classList.remove('hue-'+h));
  sprite.classList.add(hue);
  hueClasses[idx-1]=hue;
  setFrame(sprite,'idle');
  const body=document.getElementById('body'+idx);
  if(body){body.classList.remove('idle-bounce','walking','jumping','celebrating');body.classList.add('idle-bounce');}
  // Sombrero aleatorio
  const hat=document.getElementById('hat'+idx);
  if(hat) hat.style.backgroundImage=`url('${randomHat()}')`;
  const wasVisible = cont.classList.contains('visible');
  cont.classList.remove('enter-l','enter-r','visible');
  void cont.offsetWidth;
  cont.classList.add(idx===1?'enter-l':'enter-r');
  // Restaurar visibilidad si ya estaba visible
  if(wasVisible) cont.classList.add('visible');
  sfxEnter();
  scheduleAction(idx);
}

function hideChar(idx){
  const cont=document.getElementById('char'+idx);
  cont.classList.remove('visible');
  if(actionTimers[idx-1]){clearTimeout(actionTimers[idx-1]);actionTimers[idx-1]=null;}
}
function showChars(){
  [1,2].forEach(i=>{
    const cont=document.getElementById('char'+i);
    const body=document.getElementById('body'+i);
    cont.classList.remove('enter-l','enter-r');
    void cont.offsetWidth;
    cont.classList.add(i===1?'enter-l':'enter-r');
    cont.classList.add('visible');
    if(body) body.classList.add('idle-bounce');
    if(!actionTimers[i-1]) scheduleAction(i);
    sfxEnter();
  });
}

// ══ ESTADO MACHINE ══
const IDLE_ACTIONS=['wave','walk','jump','celebrate','idle'];
let actionTimers=[null,null];
function scheduleAction(idx){
  if(actionTimers[idx-1]) clearTimeout(actionTimers[idx-1]);
  const delay=4000+Math.random()*18000;
  actionTimers[idx-1]=setTimeout(()=>doAction(idx),delay);
}
function doAction(idx){
  const sprite=document.getElementById('sprite'+idx);
  const body=document.getElementById('body'+idx);
  const action=IDLE_ACTIONS[Math.floor(Math.random()*IDLE_ACTIONS.length)];
  // Reset
  body.classList.remove('idle-bounce','walking','jumping','celebrating');

  if(action==='wave'){
    setFrame(sprite,'wave');
    setTimeout(()=>{setFrame(sprite,'idle');body.classList.add('idle-bounce');},1800);
  } else if(action==='walk'){
    setFrame(sprite,'run1');
    body.classList.add('walking');
    let step=false;const wiv=setInterval(()=>{step=!step;setFrame(sprite,step?'run2':'run1');},250);
    setTimeout(()=>{clearInterval(wiv);body.classList.remove('walking');setFrame(sprite,'idle');body.classList.add('idle-bounce');},2200);
  } else if(action==='jump'){
    setFrame(sprite,'celebrate');
    body.classList.add('jumping');
    setTimeout(()=>{body.classList.remove('jumping');setFrame(sprite,'idle');body.classList.add('idle-bounce');},1200);
  } else if(action==='celebrate'){
    setFrame(sprite,'victory');
    body.classList.add('celebrating');
    setTimeout(()=>{body.classList.remove('celebrating');setFrame(sprite,'idle');body.classList.add('idle-bounce');},2000);
  } else {
    setFrame(sprite,'idle');body.classList.add('idle-bounce');
  }
  scheduleAction(idx);
}

// ══ RESULTADO ══
function showCharResult(teamIdx, correct){
  const el=document.getElementById('cres'+teamIdx);
  if(!el)return;
  el.className='char-result';void el.offsetWidth;
  el.textContent=correct?'✓':'✗';
  el.classList.add('show',correct?'correct':'wrong');
  setTimeout(()=>el.className='char-result',2500);
}

function showResult(correct,winner='',t1ok=null,t2ok=null){
  const el=document.getElementById('rFlash');
  const ic=document.getElementById('rIcon'),lb=document.getElementById('rLabel');
  el.className='';void el.offsetWidth;
  if(winner){
    ic.textContent='🏆';lb.textContent=winner+' GANA';
    el.classList.add('show','rwin');confetti();
  } else if(correct){
    sfxOk();confetti();
    // Mostrar resultado sobre cada personaje
    if(t1ok!==null) showCharResult(1,t1ok);
    if(t2ok!==null) showCharResult(2,t2ok);
    // Solo flash central si ambos acertaron o ninguno tiene respuesta marcada
    if(t1ok===null&&t2ok===null){ic.textContent='✓';lb.textContent='CORRECTO';el.classList.add('show','rc');}
    // Personajes celebran
    [1,2].forEach(i=>{const s=document.getElementById('sprite'+i);const b=document.getElementById('body'+i);if(b){b.classList.remove('idle-bounce','celebrating');setFrame(s,'victory');b.classList.add('celebrating');setTimeout(()=>{setFrame(s,'idle');b.classList.add('idle-bounce');},3000);}});
  } else {
    sfxFail();
    if(t1ok!==null) showCharResult(1,t1ok);
    if(t2ok!==null) showCharResult(2,t2ok);
    if(t1ok===null&&t2ok===null){ic.textContent='✗';lb.textContent='INCORRECTO';el.classList.add('show','rw');}
    // Personaje que falló → pose triste (scared)
    [1,2].forEach(i=>{
      const ok=i===1?t1ok:t2ok;
      const s=document.getElementById('sprite'+i);
      const b=document.getElementById('body'+i);
      if(!b)return;
      if(ok===false){
        b.classList.remove('idle-bounce','celebrating');
        setFrame(s,'defeated');
        // Sacudida de tristeza
        setTimeout(()=>{setFrame(s,'idle');b.classList.add('idle-bounce');},2500);
      } else if(ok===true){
        b.classList.remove('idle-bounce');
        setFrame(s,'victory');
        b.classList.add('celebrating');
        setTimeout(()=>{b.classList.remove('celebrating');setFrame(s,'idle');b.classList.add('idle-bounce');},3000);
      }
    });
  }
  setTimeout(()=>el.className='',2600);
}

// ══ PREGUNTA ══
function renderQ(q, t1ans=null, t2ans=null, revealed=false){
  document.getElementById('qCat').textContent=q.categoria||'';
  document.getElementById('qText').textContent=q.pregunta||'';
  const opts=document.getElementById('qOpts');opts.innerHTML='';
  ['A','B','C','D'].forEach(k=>{
    const isT1=t1ans===k, isT2=t2ans===k;
    const isCorrect=revealed&&k===q.correcta;
    const isWrong=revealed&&k!==q.correcta&&(isT1||isT2);
    const d=document.createElement('div');
    let cls='q-opt';
    if(isT1&&isT2) cls+=' sel-t1 sel-t2';
    else if(isT1) cls+=' sel-t1';
    else if(isT2) cls+=' sel-t2';
    if(revealed&&isCorrect) cls+=' correct';
    if(revealed&&isWrong&&!isCorrect) cls+=' wrong';
    d.className=cls;

    // Markers de equipo
    let markers='';
    if(isT1) markers+=`<span class="team-marker tm1">E1</span>`;
    if(isT2) markers+=`<span class="team-marker tm2">E2</span>`;

    // Reveal mark
    let revMark='';
    if(revealed&&(isT1||isT2)){
      const correct=k===q.correcta;
      revMark=`<span class="reveal-mark">${correct?'✓':'✗'}</span>`;
    }

    d.innerHTML=`<div class="q-key">${k}</div><span>${q.opciones?.[k]||''}</span><div class="q-opt-markers">${markers}</div>${revMark}`;
    opts.appendChild(d);

    // Animación de reveal con delay
    if(revealed){
      setTimeout(()=>{
        d.classList.add(isCorrect?'revealed-correct':isWrong?'revealed-wrong':'');
      },200);
    }
  });
}

// ══ POLLING ══
const LS='trivia_state';
let lastTs=0,prev={};
setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);if(!raw)return;
    const s=JSON.parse(raw);if(!s.ts||s.ts===lastTs)return;
    lastTs=s.ts;

    // Si no hay juego activo — ocultar todo
    if(!s.active){
      document.getElementById('scoreboard').classList.remove('show');
      document.getElementById('qBox').classList.remove('show');
      document.getElementById('rep1').classList.remove('show');
      document.getElementById('rep2').classList.remove('show');
      hideChar(1);hideChar(2);
      prev=JSON.parse(JSON.stringify(s));return;
    }

    // Marcador
    document.getElementById('scoreboard').classList.add('show');
    document.getElementById('sbn1').textContent=s.team1?.name||'E1';
    document.getElementById('sbn2').textContent=s.team2?.name||'E2';
    const p1=s.team1?.pts||0,p2=s.team2?.pts||0;
    const e1=document.getElementById('sbp1'),e2=document.getElementById('sbp2');
    if(e1.textContent!==String(p1)){e1.textContent=p1;e1.classList.remove('pop');void e1.offsetWidth;e1.classList.add('pop');sfxPop();}
    if(e2.textContent!==String(p2)){e2.textContent=p2;e2.classList.remove('pop');void e2.offsetWidth;e2.classList.add('pop');sfxPop();}
    // Reps y personajes
    const r1=document.getElementById('rep1'),r2=document.getElementById('rep2');
    r1.textContent=s.team1?.repName||'';r1.classList.toggle('show',!!s.team1?.repName);
    r2.textContent=s.team2?.repName||'';r2.classList.toggle('show',!!s.team2?.repName);
    // Chars — visibilidad controlada por showCharacters flag
    const shouldShow = s.showCharacters===true && s.active;
    [1,2].forEach(i=>{
      const cont=document.getElementById('char'+i);
      if(!cont)return;
      const isVisible=cont.classList.contains('visible');
      if(shouldShow&&!isVisible){
        // Mostrar con animación de entrada
        cont.classList.remove('enter-l','enter-r');
        void cont.offsetWidth;
        cont.classList.add(i===1?'enter-l':'enter-r');
        cont.classList.add('visible');
        const body=document.getElementById('body'+i);
        if(body&&!body.classList.contains('idle-bounce')) body.classList.add('idle-bounce');
        if(!actionTimers[i-1]) scheduleAction(i);
      } else if(!shouldShow&&isVisible){
        hideChar(i);
      }
    });
    if(s.hue1&&s.hue1!==prev.hue1&&s.team1?.repName){
      // Nuevo rep — limpiar defeated y restaurar sombrero
      const c1=document.getElementById('char1');
      if(c1) c1.dataset.defeated='';
      const h1=document.getElementById('hat1');
      if(h1) h1.style.opacity='1';
      initChar(1,s.hue1);
    }
    if(s.hue2&&s.hue2!==prev.hue2&&s.team2?.repName){
      const c2=document.getElementById('char2');
      if(c2) c2.dataset.defeated='';
      const h2=document.getElementById('hat2');
      if(h2) h2.style.opacity='1';
      initChar(2,s.hue2);
    }
    // Pregunta
    if(s.showQuestion&&s.question){
      renderQ(s.question, s.answer1||null, s.answer2||null, !!s.revealed);
      document.getElementById('qBox').classList.add('show');
      if(!prev.showQuestion)sfxQ();
    }
    else if(!s.showQuestion){document.getElementById('qBox').classList.remove('show');if(prev.showQuestion){AC.resume();n(400,.05,.1,'sine');setTimeout(()=>n(300,.1,.08,'sine'),60);}}
    // Actualizar respuestas en tiempo real
    if(s.showQuestion&&s.question&&(s.answer1!==prev.answer1||s.answer2!==prev.answer2||s.revealed!==prev.revealed)){
      renderQ(s.question, s.answer1||null, s.answer2||null, !!s.revealed);
    }
    // Resultado
    if(s.result&&s.result!==prev.result){
      if(s.result==='correct')showResult(true,'',(s.answer1&&s.question?.correcta)?s.answer1===s.question.correcta:null,(s.answer2&&s.question?.correcta)?s.answer2===s.question.correcta:null);
      else if(s.result==='wrong')showResult(false,'',s.answer1&&s.question?.correcta?s.answer1===s.question.correcta:null,s.answer2&&s.question?.correcta?s.answer2===s.question.correcta:null);
      else if(s.result==='winner')showResult(false,s.winnerName||'');
    }
    prev=JSON.parse(JSON.stringify(s));
  }catch(e){}
},250);

// ══ TTS ══
let ttsLastMsg='';
function speakRep(text){
  if(!text||text===ttsLastMsg) return;
  ttsLastMsg=text;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance();
  utt.lang='es-MX'; utt.pitch=1.1; utt.rate=0.95; utt.volume=0.85;
  utt.text=text.substring(0,120);
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang.startsWith('es'))||voices[0];
  if(v) utt.voice=v;
  window.speechSynthesis.speak(utt);
}
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ══ HABLA ══
let lastSeen1=0, lastSeen2=0;
setInterval(()=>{
  try{
    const users=JSON.parse(localStorage.getItem('chat_users')||'{}');
    const s=JSON.parse(localStorage.getItem(LS)||'{}');
    const now=Date.now();
    [1,2].forEach(t=>{
      const uid=t===1?s.team1?.repUserId:s.team2?.repUserId;
      const lastSeen=t===1?lastSeen1:lastSeen2;
      if(!uid||!users[uid])return;
      const u=users[uid];
      if(now-u.lastSeen<1800 && u.lastSeen!==lastSeen){
        if(t===1) lastSeen1=u.lastSeen; else lastSeen2=u.lastSeen;
        // Cambiar a pose hablando
        const sp=document.getElementById('sprite'+t);
        const bd=document.getElementById('body'+t);
        setFrame(sp,'talk');
        // Mostrar burbuja con texto
        const bub=document.getElementById('speech'+t);
        bub.textContent=u.text||'...';
        bub.classList.add('show');
        // Deslizar personaje hacia el centro para que se vea la burbuja
        const cont=document.getElementById('char'+t);
        const shift=t===1?'60px':'-60px';
        cont.style.transition='transform .3s ease';
        cont.style.transform=`translateX(${shift})`;
        // TTS
        speakRep(u.text||'');
        // Volver a idle
        const talkDur=Math.max(2000,(u.text||'').length*60);
        setTimeout(()=>{
          bub.classList.remove('show');
          cont.style.transform='translateX(0)';
          setFrame(sp,'idle');
          if(bd){bd.classList.add('idle-bounce');}
        },talkDur);
      }
    });
  }catch(e){}
},400);

// ══ CATEGORY ROLL POLLING ══
let lastCatRollTs=0;
setInterval(()=>{
  try{
    const raw=localStorage.getItem('trivia_cat_roll');
    if(!raw){
      document.getElementById('catRoll').classList.remove('show','final');
      return;
    }
    const d=JSON.parse(raw);
    if(d.ts===lastCatRollTs)return;
    lastCatRollTs=d.ts;
    const el=document.getElementById('catRoll');
    const val=document.getElementById('catRollValue');
    if(d.rolling){
      el.classList.add('show');
      el.classList.remove('final');
      val.textContent=d.label;
      val.style.transform='scale(1.06)';
      setTimeout(()=>val.style.transform='',80);
    } else if(d.final){
      el.classList.add('show','final');
      val.textContent=d.label;
      // Sonido de aterrizaje
      AC.resume();
      [523,659,784,1047].forEach((f,i)=>{
        const o=AC.createOscillator(),g=AC.createGain();
        o.type='triangle';o.frequency.value=f;
        const t=AC.currentTime+i*.1;
        g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
        o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+.35);
      });
      // Ocultar después de 3s
      setTimeout(()=>el.classList.remove('show','final'),3200);
    }
  }catch(e){}
},100);

// No auto-init — personajes se muestran solo cuando hay rep asignado
