<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poll Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f0f;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;padding:20px;max-width:520px;margin:0 auto;}
h1{font-size:16px;font-weight:700;margin-bottom:4px;}
.sub{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:20px;}
.section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:12px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:10px;}
label{display:block;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;margin-top:10px;}
label:first-of-type{margin-top:0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input[type=text]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
input:focus{border-color:rgba(255,185,0,0.4);}
.big-btn{width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.5px;transition:all .15s;border:1px solid;margin-top:6px;}
.btn-start{background:rgba(255,185,0,0.13);border-color:rgba(255,185,0,0.35);color:#FFD000;}
.btn-start:hover{background:rgba(255,185,0,0.22);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;}
.btn-demo{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:12px;padding:9px;}
.btn-demo:hover{background:rgba(255,255,255,0.08);}
.btn-stop{background:rgba(220,30,10,0.1);border-color:rgba(220,30,10,0.3);color:#f87171;}
.btn-reset{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-size:12px;padding:8px;}
.status{margin-top:10px;font-size:11px;text-align:center;min-height:16px;color:rgba(255,255,255,0.3);}
.status.ok{color:#4ade80;}.status.err{color:#f87171;}.status.loading{color:rgba(255,185,0,0.7);}
.vote-row{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;margin-bottom:8px;}
.opt-tag{font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);}
.vbtn{width:32px;height:32px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);border-radius:8px;cursor:pointer;font-size:17px;color:#fff;display:flex;align-items:center;justify-content:center;transition:background .1s;user-select:none;}
.vbtn:hover{background:rgba(255,255,255,0.12);}
.vbtn:active{transform:scale(0.93);}
.vcount{font-size:15px;font-weight:700;min-width:36px;text-align:center;font-variant-numeric:tabular-nums;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.live-bar{display:none;align-items:center;gap:8px;background:rgba(255,185,0,0.08);border:1px solid rgba(255,185,0,0.2);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:rgba(255,185,0,0.8);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#FFD000;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.timer-display{font-size:28px;font-weight:900;text-align:center;font-variant-numeric:tabular-nums;margin:8px 0;letter-spacing:-1px;}
.timer-display.urgent{color:#f87171;animation:tblink 0.5s infinite;}
@keyframes tblink{0%,100%{opacity:1;}50%{opacity:.4;}}
/* Selector de opciones */
.opts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.opt-btn{padding:10px;border-radius:8px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);transition:all .15s;text-align:center;}
.opt-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.opt-btn.active{background:rgba(255,185,0,0.15);border-color:rgba(255,185,0,0.4);color:#FFD000;}
.reader-status{font-size:11px;padding:8px 12px;border-radius:8px;margin-bottom:8px;text-align:center;font-weight:600;}
.reader-ok{background:rgba(68,222,128,0.1);border:1px solid rgba(68,222,128,0.3);color:#4ade80;}
.reader-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;}
.reader-warn{background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.3);color:#FFA500;}
/* Timer fijo */
.timer-fixed{font-size:11px;color:rgba(255,185,0,.5);text-align:center;margin-top:6px;letter-spacing:1px;}
</style>
</head>
<body>

<h1>🎯 Poll Control</h1>
<div class="sub">Panel privado — solo tú lo ves. OBS muestra solo el overlay.</div>

<div id="readerStatus" class="reader-status reader-err">⚠️ Chat Reader no conectado — ábrelo primero</div>

<div class="live-bar" id="liveBar">
  <span class="live-dot"></span>
  <span id="liveText">Encuesta activa</span>
</div>

<div class="section">
  <div class="section-title">Encuesta</div>
  <label>Pregunta</label>
  <input type="text" id="question" value="¿Qué eligen?">

  <!-- Número de opciones -->
  <label style="margin-top:12px;">Número de opciones</label>
  <div class="opts-grid">
    <button class="opt-btn active" onclick="setNumOpts(2,this)">2 opciones</button>
    <button class="opt-btn" onclick="setNumOpts(3,this)">3 opciones</button>
    <button class="opt-btn" onclick="setNumOpts(4,this)">4 opciones</button>
    <button class="opt-btn" onclick="setNumOpts(9,this)" style="background:rgba(255,208,0,.12);border-color:rgba(255,208,0,.4);color:#FFD000;">🃏 Comodines (1-9)</button>
  </div>
  <div class="timer-fixed">⏱ Timer fijo: 30 segundos</div>

  <!-- Opciones A y B siempre visibles -->
  <div class="two-col" style="margin-top:12px;">
    <div>
      <label><span class="dot" style="background:#FF9114;"></span>Opción A</label>
      <input type="text" id="nameA" value="OPCIÓN A">
    </div>
    <div>
      <label><span class="dot" style="background:#3B0202;"></span>Opción B</label>
      <input type="text" id="nameB" value="OPCIÓN B">
    </div>
  </div>

  <!-- Opciones C y D opcionales -->
  <div class="two-col" style="margin-top:10px;" id="rowCD" style="display:none;">
    <div id="colC">
      <label><span class="dot" style="background:#4488ff;"></span>Opción C</label>
      <input type="text" id="nameC" value="OPCIÓN C">
    </div>
    <div id="colD" style="display:none;">
      <label><span class="dot" style="background:#4ade80;"></span>Opción D</label>
      <input type="text" id="nameD" value="OPCIÓN D">
    </div>
  </div>
</div>

<!-- Votos en tiempo real -->
<div class="section" id="votesSection" style="display:none;">
  <div class="section-title">Votos en tiempo real</div>
  <div class="timer-display" id="timerDisp">30s</div>
  <div id="voteRows"></div>
  <button class="big-btn btn-reset" onclick="resetVotes()">↺ Reiniciar votos</button>
</div>

<button class="big-btn btn-start" id="startBtn" onclick="startPoll()">▶ Detectar stream y comenzar</button>
<button class="big-btn btn-demo" onclick="startDemo()">🧪 Modo prueba (sin stream)</button>
<button class="big-btn btn-stop" id="stopBtn" style="display:none;" onclick="stopPoll()">■ Detener y ocultar overlay</button>
<div class="status" id="statusBar">Abre el Chat Reader y conéctalo primero</div>

<script>
const $ = id => document.getElementById(id);
const LS = 'poll_state';
const READER_ALIVE_MS = 15000;
const TIMER_SECS = 30; // siempre 30 segundos

// Colores por opción
const OPT_COLORS = { A:'#FF9114', B:'#3B0202', C:'#4488ff', D:'#4ade80' };

const state = {
  votes:{A:0,B:0,C:0,D:0},
  active:false,
  numOpts:2,
  timerEnd:0, timerInterval:null
};

let lastDeltaTs = 0;

// ══ Reader status ══
setInterval(()=>{
  try{
    const cs=JSON.parse(localStorage.getItem('chat_status')||'{}');
    const el=$('readerStatus');
    const now=Date.now();
    const age=cs.ts?now-cs.ts:Infinity;
    if(cs.ytConnected&&age<READER_ALIVE_MS){
      el.className='reader-status reader-ok';
      el.textContent='🟢 Chat Reader activo — key '+(cs.keyIdx+1)+'/6';
    } else if(cs.ytConnected&&age>=READER_ALIVE_MS){
      el.className='reader-status reader-warn';
      el.textContent=`⚠️ Chat Reader sin actividad (${Math.round(age/1000)}s)`;
    } else {
      el.className='reader-status reader-err';
      el.textContent='⚠️ Chat Reader no conectado — ábrelo primero';
    }
  }catch(e){}
},1000);

// ══ Sync votos desde delta ══
setInterval(()=>{
  if(!state.active) return;
  try{
    const dRaw=localStorage.getItem('poll_vote_delta');
    if(!dRaw) return;
    const delta=JSON.parse(dRaw);
    if(delta.ts&&delta.ts!==lastDeltaTs){
      lastDeltaTs=delta.ts;
      state.votes.A=delta.vA||0;
      state.votes.B=delta.vB||0;
      state.votes.C=delta.vC||0;
      state.votes.D=delta.vD||0;
      renderVoteRows();
      const total=state.votes.A+state.votes.B+state.votes.C+state.votes.D;
      if(total>0) setStatus('🗳️ '+total+' votos — YT + Kick + Twitch','ok');
      // Sync poll_state
      const raw=localStorage.getItem(LS);
      if(raw){
        const ps=JSON.parse(raw);
        if(ps.active){
          ps.vA=state.votes.A;ps.vB=state.votes.B;
          ps.vC=state.votes.C;ps.vD=state.votes.D;
          localStorage.setItem(LS,JSON.stringify(ps));
        }
      }
    }
  }catch(e){}
},200);

function setNumOpts(n, btn){
  state.numOpts=n;
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Mostrar/ocultar fila C/D (solo para 2-4 opciones)
  $('rowCD').style.display=(n>=3&&n<=4)?'grid':'none';
  $('colD').style.display=n>=4?'block':'none';
  // Modo comodines: 9 opciones con números
  if(n===9){
    // Auto-inicializar votos 1-9
    state.votes={};
    for(let i=1;i<=9;i++) state.votes[String(i)]=0;
  }
  if(state.active) renderVoteRows();
}

function renderVoteRows(){
  const isComodin=state.numOpts===9;
  const keys=isComodin
    ? ['1','2','3','4','5','6','7','8','9']
    : ['A','B','C','D'].slice(0,state.numOpts);
  const rows=$('voteRows');
  rows.innerHTML='';
  keys.forEach(k=>{
    const color=isComodin?'#FFD000':(OPT_COLORS[k]||'#888');
    const name=isComodin?('Carta '+k):($(('name'+k))?.value||k).toUpperCase();
    const div=document.createElement('div');
    div.className='vote-row';
    div.innerHTML=`
      <span class="opt-tag"><span class="dot" style="background:${color};"></span><span id="label${k}">${name}</span></span>
      <button class="vbtn" onclick="cv('${k}',-1)">−</button>
      <span class="vcount" id="vc${k}">${state.votes[k]||0}</span>
      <button class="vbtn" onclick="cv('${k}',1)">+</button>
    `;
    rows.appendChild(div);
  });
}

function updateTimerDisplay(sec){
  if(!sec||sec<=0){$('timerDisp').textContent='¡YA!';$('timerDisp').className='timer-display urgent';return;}
  $('timerDisp').textContent=sec+'s';
  $('timerDisp').className='timer-display'+(sec<=5?' urgent':'');
}

function startTimer(){
  state.timerEnd=Date.now()+TIMER_SECS*1000;
  save();
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    const r=Math.max(0,Math.ceil((state.timerEnd-Date.now())/1000));
    updateTimerDisplay(r);
    save();
    if(r===0){
      clearInterval(state.timerInterval);
      $('liveText').textContent='⏱ Tiempo agotado';
      setTimeout(()=>{ if(state.active) stopPoll(); },8000);
    }
  },500);
}

// save() preserva vA/vB/vC/vD escritos por chat-reader
function save(){
  let current={};
  try{ current=JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){}
  localStorage.setItem(LS,JSON.stringify({
    ...current,
    active:state.active,
    question:$('question').value,
    nameA:$('nameA').value,nameB:$('nameB').value,
    nameC:$('nameC').value,nameD:$('nameD').value,
    numOpts:state.numOpts,
    timerEnd:state.timerEnd,
  }));
}

function setLive(on){
  state.active=on;
  $('liveBar').style.display=on?'flex':'none';
  $('stopBtn').style.display=on?'block':'none';
  $('startBtn').style.display=on?'none':'block';
  $('votesSection').style.display=on?'block':'none';
  if(on){
    $('liveText').textContent='Encuesta activa — overlay visible en OBS';
    renderVoteRows();
  }
}

function cv(side,d){
  try{
    const raw=localStorage.getItem(LS);if(!raw)return;
    const ps=JSON.parse(raw);
    const key='v'+side;
    ps[key]=Math.max(0,(ps[key]||0)+d);
    state.votes[side]=ps[key];
    // Actualizar delta también
    const dRaw=localStorage.getItem('poll_vote_delta');
    if(dRaw){
      const delta=JSON.parse(dRaw);
      delta['v'+side]=ps[key];
      delta.ts=Date.now();
      localStorage.setItem('poll_vote_delta',JSON.stringify(delta));
    }
    localStorage.setItem(LS,JSON.stringify(ps));
    $('vc'+side).textContent=ps[key];
  }catch(e){}
}

function resetVotes(){
  state.votes={A:0,B:0,C:0,D:0};
  localStorage.removeItem('poll_voters');
  localStorage.setItem('poll_vote_delta',JSON.stringify({vA:0,vB:0,vC:0,vD:0,ts:Date.now()}));
  lastDeltaTs=0;
  localStorage.setItem(LS,JSON.stringify({
    active:true,
    question:$('question').value,
    nameA:$('nameA').value,nameB:$('nameB').value,
    nameC:$('nameC').value,nameD:$('nameD').value,
    numOpts:state.numOpts,
    vA:0,vB:0,vC:0,vD:0,
    timerEnd:0,
  }));
  renderVoteRows();
  $('liveText').textContent='Encuesta activa — overlay visible en OBS';
  startTimer();
}

function startPoll(){
  const cs=JSON.parse(localStorage.getItem('chat_status')||'{}');
  const age=cs.ts?Date.now()-cs.ts:Infinity;
  if(!cs.ytConnected||age>=READER_ALIVE_MS){
    setStatus('⚠️ Conecta el Chat Reader primero','err');return;
  }
  $('startBtn').disabled=true;
  state.votes={A:0,B:0,C:0,D:0};
  setLive(true);
  localStorage.removeItem('poll_voters');
  localStorage.setItem('poll_vote_delta',JSON.stringify({vA:0,vB:0,vC:0,vD:0,ts:Date.now()}));
  lastDeltaTs=0;
  localStorage.setItem(LS,JSON.stringify({
    active:true,
    question:$('question').value,
    nameA:$('nameA').value,nameB:$('nameB').value,
    nameC:$('nameC').value,nameD:$('nameD').value,
    numOpts:state.numOpts,
    vA:0,vB:0,vC:0,vD:0,timerEnd:0,
  }));
  startTimer();
  setStatus('🟢 Encuesta activa — 30s — votos en tiempo real','ok');
}

function startDemo(){
  $('startBtn').disabled=true;
  state.votes={A:0,B:0,C:0,D:0};
  setLive(true);
  localStorage.removeItem('poll_voters');
  localStorage.setItem('poll_vote_delta',JSON.stringify({vA:0,vB:0,vC:0,vD:0,ts:Date.now()}));
  lastDeltaTs=0;
  localStorage.setItem(LS,JSON.stringify({
    active:true,question:$('question').value,
    nameA:$('nameA').value,nameB:$('nameB').value,
    nameC:$('nameC').value,nameD:$('nameD').value,
    numOpts:state.numOpts,vA:0,vB:0,vC:0,vD:0,timerEnd:0,
  }));
  startTimer();
  setStatus('🧪 Modo prueba activo','ok');
  const opts=['A','B','C','D'].slice(0,state.numOpts);
  let t=0;
  const di=setInterval(()=>{
    if(t>=20){clearInterval(di);return;}
    if(state.timerEnd>0&&Date.now()>state.timerEnd){clearInterval(di);return;}
    cv(opts[t++%opts.length],1);
  },400);
}

function stopPoll(){
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.active=false;state.timerEnd=0;
  localStorage.setItem(LS,JSON.stringify({active:false}));
  localStorage.removeItem('poll_voters');
  localStorage.removeItem('poll_vote_delta');
  lastDeltaTs=0;
  setLive(false);$('startBtn').disabled=false;
  setStatus('Encuesta detenida','');
}

function setStatus(msg,type){const el=$('statusBar');el.textContent=msg;el.className='status '+(type||'');}

// Init — mostrar fila C/D según estado inicial
setNumOpts(2, document.querySelector('.opt-btn.active'));
updateTimerDisplay(TIMER_SECS);
</script>
</body>
</html>
