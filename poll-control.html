<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poll Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f0f;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;padding:20px;max-width:520px;margin:0 auto;}

h1{font-size:16px;font-weight:700;margin-bottom:4px;}
.sub{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:20px;}

.section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:12px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:10px;}

label{display:block;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;margin-top:10px;}
label:first-of-type{margin-top:0;}
input[type=text],input[type=password],input[type=number]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
input:focus{border-color:rgba(255,185,0,0.4);}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}

.big-btn{width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.5px;transition:all .15s;border:1px solid;margin-top:6px;}
.btn-start{background:rgba(255,185,0,0.13);border-color:rgba(255,185,0,0.35);color:#FFD000;}
.btn-start:hover{background:rgba(255,185,0,0.22);}
.btn-demo{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:12px;padding:9px;}
.btn-stop{background:rgba(220,30,10,0.1);border-color:rgba(220,30,10,0.3);color:#f87171;}
.btn-reset{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-size:12px;padding:8px;}

.status{margin-top:10px;font-size:11px;text-align:center;min-height:16px;color:rgba(255,255,255,0.3);}
.status.ok{color:#4ade80;}.status.err{color:#f87171;}.status.loading{color:rgba(255,185,0,0.7);}

.vote-row{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;margin-bottom:8px;}
.opt-tag{font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);}
.vbtn{width:32px;height:32px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);border-radius:8px;cursor:pointer;font-size:17px;color:#fff;display:flex;align-items:center;justify-content:center;transition:background .1s;user-select:none;}
.vbtn:hover{background:rgba(255,255,255,0.12);}
.vbtn:active{transform:scale(0.93);}
.vcount{font-size:15px;font-weight:700;min-width:36px;text-align:center;font-variant-numeric:tabular-nums;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}

.live-bar{display:none;align-items:center;gap:8px;background:rgba(255,185,0,0.08);border:1px solid rgba(255,185,0,0.2);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:rgba(255,185,0,0.8);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#FFD000;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.timer-display{font-size:28px;font-weight:900;text-align:center;font-variant-numeric:tabular-nums;margin:8px 0;letter-spacing:-1px;}
.timer-display.urgent{color:#f87171;animation:tblink 0.5s infinite;}
@keyframes tblink{0%,100%{opacity:1;}50%{opacity:.4;}}

.help-link{color:rgba(255,185,0,0.4);font-size:10px;text-decoration:none;display:inline-block;margin-top:3px;}
.saved-note{font-size:10px;color:rgba(255,185,0,0.5);margin-top:3px;display:none;}

.timer-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);transition:all .15s;}
.timer-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.timer-btn.active{background:rgba(255,185,0,0.15);border-color:rgba(255,185,0,0.4);color:#FFD000;}
</style>
</head>
<body>

<h1>🎯 Poll Control</h1>
<div class="sub">Panel privado — solo tú lo ves. OBS muestra solo el overlay.</div>

<div class="live-bar" id="liveBar">
  <span class="live-dot"></span>
  <span id="liveText">Encuesta activa</span>
</div>

<!-- CREDENCIALES -->
<div class="section">
  <div class="section-title">Credenciales YouTube</div>
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="Rotación automática (3 keys)">
  <div class="saved-note" id="savedApi">✓ Guardada</div>
  <label>Channel ID</label>
  <input type="password" id="channelId" placeholder="UCxxxxxxx...">
  <div class="saved-note" id="savedCh">✓ Guardado</div>
  <a class="help-link" href="https://www.youtube.com/account_advanced" target="_blank">→ Encontrar Channel ID</a>
</div>

<!-- ENCUESTA -->
<div class="section">
  <div class="section-title">Encuesta</div>
  <label>Pregunta</label>
  <input type="text" id="question" value="¿Qué eligen?">
  <div class="two-col" style="margin-top:10px;">
    <div>
      <label><span class="dot" style="background:#FFB800;"></span>Opción 1 (chat escribe 1)</label>
      <input type="text" id="nameA" value="HOMER">
    </div>
    <div>
      <label><span class="dot" style="background:#CC1100;"></span>Opción 2 (chat escribe 2)</label>
      <input type="text" id="nameB" value="BART">
    </div>
  </div>
  <label style="margin-top:12px;">Duración del temporizador</label>
  <div class="three-col">
    <button class="timer-btn" onclick="setDuration(0.5)">30 seg</button>
    <button class="timer-btn" onclick="setDuration(1)">1 min</button>
    <button class="timer-btn active" id="btn2" onclick="setDuration(2)">2 min</button>
    <button class="timer-btn" onclick="setDuration(3)">3 min</button>
    <button class="timer-btn" onclick="setDuration(5)">5 min</button>
    <button class="timer-btn" onclick="setDuration(10)">10 min</button>
    <button class="timer-btn" onclick="setDuration(0)">Sin límite</button>
  </div>
</div>

<!-- VOTOS EN VIVO -->
<div class="section" id="votesSection" style="display:none;">
  <div class="section-title">Votos en tiempo real</div>
  <div class="timer-display" id="timerDisp">2:00</div>
  <div class="vote-row">
    <span class="opt-tag"><span class="dot" style="background:#FFB800;"></span><span id="labelA">HOMER</span></span>
    <button class="vbtn" onclick="cv('A',-1)">−</button>
    <span class="vcount" id="vcA">0</span>
    <button class="vbtn" onclick="cv('A',1)">+</button>
  </div>
  <div class="vote-row">
    <span class="opt-tag"><span class="dot" style="background:#CC1100;"></span><span id="labelB">BART</span></span>
    <button class="vbtn" onclick="cv('B',-1)">−</button>
    <span class="vcount" id="vcB">0</span>
    <button class="vbtn" onclick="cv('B',1)">+</button>
  </div>
  <button class="big-btn btn-reset" onclick="resetVotes()">↺ Reiniciar votos</button>
</div>

<!-- ACCIONES -->
<button class="big-btn btn-start" id="startBtn" onclick="startPoll()">▶ Detectar stream y comenzar</button>
<button class="big-btn btn-demo" onclick="startDemo()">🧪 Modo prueba (sin stream)</button>
<button class="big-btn btn-stop" id="stopBtn" style="display:none;" onclick="stopPoll()">■ Detener y ocultar overlay</button>
<div class="status" id="statusBar">Ingresa tus datos y presiona el botón</div>

<script>
const $ = id => document.getElementById(id);
const KEY = 'poll_state';

// ── Rotación de API Keys ──
const API_KEYS = [
  'AIzaSyCeQDuKLiY8G5GO0Vezm0tfZwsezfLpdME',
  'AIzaSyDqlaHU156M6ilgaFaabHmQort4gMLIzEs',
  'AIzaSyBTaPw7pPv1X78X_Wif6_wMGJDmg8xpi1w'
];
let currentKeyIndex = 0;

function getKey() { return API_KEYS[currentKeyIndex]; }

function rotateKey() {
  currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
  setStatus(`⚠️ Rotando a key ${currentKeyIndex+1} de ${API_KEYS.length}...`, 'loading');
  return getKey();
}

const state = {
  channelId:'',
  liveChatId:'', nextPageToken:'',
  voters:{}, votes:{A:0,B:0},
  interval:null, delay:8000,
  active:false,
  duration: 2,
  timerEnd: 0,
  timerInterval: null
};

function save() {
  localStorage.setItem(KEY, JSON.stringify({
    active: state.active,
    question: $('question').value,
    nameA: $('nameA').value,
    nameB: $('nameB').value,
    vA: state.votes.A,
    vB: state.votes.B,
    timerEnd: state.timerEnd
  }));
}

function loadSaved() {
  const c = localStorage.getItem('yt_channel_id') || '';
  if(c){ $('channelId').value=c; $('savedCh').style.display='block'; }
  // API key field shows which key is active
  $('apiKey').value = '●●●● Rotación automática (3 keys)';
  $('savedApi').style.display='block';
}

function setDuration(min) {
  state.duration = min;
  document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateTimerDisplay(min * 60);
}

function updateTimerDisplay(sec) {
  if(sec > 0 && sec < 60) { $('timerDisp').textContent = sec+'s'; $('timerDisp').className = 'timer-display'+(sec<=5?' urgent':''); return; }
  if(sec <= 0 || !sec) { $('timerDisp').textContent = '∞'; return; }
  const m = Math.floor(sec/60), s = sec%60;
  $('timerDisp').textContent = m+':'+(s<10?'0':'')+s;
  $('timerDisp').className = 'timer-display'+(sec<=10?' urgent':'');
}

function startTimer() {
  if(state.duration === 0) { state.timerEnd = 0; return; }
  state.timerEnd = Date.now() + state.duration * 60 * 1000;
  save();
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((state.timerEnd - Date.now())/1000));
    updateTimerDisplay(remaining);
    save();
    if(remaining === 0) {
      clearInterval(state.timerInterval);
      $('liveText').textContent = '⏱ Tiempo agotado — encuesta finalizada';
    }
  }, 500);
}

function setLive(on) {
  state.active = on;
  $('liveBar').style.display    = on ? 'flex' : 'none';
  $('stopBtn').style.display    = on ? 'block' : 'none';
  $('startBtn').style.display   = on ? 'none' : 'block';
  $('votesSection').style.display = on ? 'block' : 'none';
  if(on) {
    $('labelA').textContent = $('nameA').value.toUpperCase();
    $('labelB').textContent = $('nameB').value.toUpperCase();
    $('liveText').textContent = 'Encuesta activa — overlay visible en OBS';
  }
}

function cv(side, d) {
  state.votes[side] = Math.max(0, state.votes[side]+d);
  $('vc'+side).textContent = state.votes[side];
  save();
}

function resetVotes() {
  state.votes = {A:0, B:0};
  $('vcA').textContent = '0';
  $('vcB').textContent = '0';
  state.timerEnd = 0;
  if(state.timerInterval) clearInterval(state.timerInterval);
  updateTimerDisplay(state.duration * 60);
  $('liveText').textContent = 'Encuesta activa — overlay visible en OBS';
  startTimer();
  save();
}

async function startPoll() {
  const channelId = $('channelId').value.trim();
  if(!channelId){ setStatus('⚠️ Necesitas tu Channel ID','err'); return; }

  $('startBtn').disabled = true;
  currentKeyIndex = 0;
  setStatus('🔍 Buscando tu stream en vivo...','loading');

  try {
    const sRes  = await fetch(`https://www.googleapis.com/youtube/v3/search?part=id&channelId=${channelId}&eventType=live&type=video&key=${getKey()}`);
    const sData = await sRes.json();
    if(sData.error) throw new Error(sData.error.message);
    if(!sData.items?.length) throw new Error('No hay stream en vivo. ¿Ya iniciaste el broadcast?');

    const videoId = sData.items[0].id.videoId;
    setStatus('✅ Stream detectado — conectando chat...','loading');

    const vRes  = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${getKey()}`);
    const vData = await vRes.json();
    if(vData.error) throw new Error(vData.error.message);
    const chatId = vData?.items?.[0]?.liveStreamingDetails?.activeLiveChatId;
    if(!chatId) throw new Error('No se pudo obtener el chat en vivo.');

    localStorage.setItem('yt_channel_id', channelId);

    state.channelId=channelId; state.liveChatId=chatId;
    state.votes={A:0,B:0}; state.voters={}; state.nextPageToken='';

    setLive(true);
    startTimer();
    save();
    setStatus(`🟢 Conectado — key ${currentKeyIndex+1} activa`, 'ok');

    await fetchMessages();
    state.interval = setInterval(fetchMessages, state.delay);

  } catch(e) {
    setStatus('❌ '+e.message,'err');
    $('startBtn').disabled=false;
  }
}

async function fetchMessages() {
  try {
    let url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${state.liveChatId}&part=snippet,authorDetails&maxResults=200&key=${getKey()}`;
    if(state.nextPageToken) url+='&pageToken='+state.nextPageToken;
    const res=await fetch(url); const data=await res.json();

    if(data.error) {
      const reason = data.error.errors?.[0]?.reason || '';
      if(reason === 'quotaExceeded' || data.error.code === 429 || data.error.code === 403) {
        const newKey = rotateKey();
        if(currentKeyIndex === 0) {
          setStatus('❌ Cuota agotada en todas las keys. Intenta mañana.', 'err');
          clearInterval(state.interval);
        }
        return;
      }
      console.error(data.error.message);
      return;
    }

    setStatus(`🟢 Conectado — key ${currentKeyIndex+1} activa`, 'ok');

    if(data.pollingIntervalMillis){
      const nd=Math.max(data.pollingIntervalMillis, 8000);
      if(nd!==state.delay){state.delay=nd;clearInterval(state.interval);state.interval=setInterval(fetchMessages,state.delay);}
    }
    state.nextPageToken=data.nextPageToken||'';
    let updated=false;

    if(state.timerEnd > 0 && Date.now() > state.timerEnd) return;

    (data.items||[]).forEach(item=>{
      const uid=item.authorDetails?.channelId;
      const txt=(item.snippet?.displayMessage||'').trim();
      if(!uid||state.voters[uid])return;
      if(txt==='A'||txt==='a'||txt==='!A'||txt==='!a'){state.voters[uid]='A';state.votes.A++;updated=true;}
      else else if(txt==='B'||txt==='b'||txt==='!B'||txt==='!b'){state.voters[uid]='B';state.votes.B++;updated=true;}
    });
    if(updated){$('vcA').textContent=state.votes.A;$('vcB').textContent=state.votes.B;save();}
  } catch(e){console.error(e);}
}

function startDemo() {
  state.votes={A:0,B:0}; state.voters={};
  setLive(true);
  startTimer();
  save();
  setStatus('🧪 Modo prueba activo','ok');
  let tick=0;
  const dv=['A','B','A','A','B','A','B','B','A','A','B','A','A','B','A','B','A','A','B','A'];
  const di=setInterval(()=>{
    if(tick>=dv.length){clearInterval(di);return;}
    if(state.timerEnd>0&&Date.now()>state.timerEnd){clearInterval(di);return;}
    state.votes[dv[tick++]]++;
    $('vcA').textContent=state.votes.A;
    $('vcB').textContent=state.votes.B;
    save();
  },600);
}

function stopPoll() {
  clearInterval(state.interval);
  clearInterval(state.timerInterval);
  state.active=false; state.timerEnd=0;
  localStorage.setItem(KEY, JSON.stringify({active:false}));
  setLive(false);
  $('startBtn').disabled=false;
  setStatus('Encuesta detenida','');
}

function setStatus(msg,type){const el=$('statusBar');el.textContent=msg;el.className='status '+(type||'');}

loadSaved();
updateTimerDisplay(2*60);
</script>
</body>
</html>
