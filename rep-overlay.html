<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Representante</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:'Bebas Neue',sans-serif;}

#sirenOverlay{
  position:fixed;inset:0;z-index:60;pointer-events:none;
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#sirenOverlay.show{opacity:1;}
.siren-flash{
  position:fixed;inset:0;
  background:rgba(255,20,20,0);
  animation:sirenFlash 0.5s infinite;
}
@keyframes sirenFlash{
  0%,100%{background:rgba(255,20,20,0);}
  50%{background:rgba(255,20,20,0.35);}
}
.siren-text{
  font-size:80px;letter-spacing:10px;
  color:#FF3333;
  text-shadow:0 0 40px rgba(255,0,0,1),0 0 80px rgba(255,0,0,.6);
  animation:sirenText .5s infinite alternate;
  position:relative;z-index:1;
}
@keyframes sirenText{
  from{opacity:.6;transform:scale(.98);}
  to{opacity:1;transform:scale(1.02);}
}
.siren-sub{
  font-size:26px;letter-spacing:6px;
  color:rgba(255,100,100,.8);margin-top:10px;
  position:relative;z-index:1;
  animation:sirenText .5s infinite alternate;
}

#bg{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  transition:background .5s;pointer-events:none;z-index:10;
}
#bg.show{background:rgba(0,0,0,0.85);}
#bg.jackpot{background:rgba(0,0,0,0.92);}

#particles{position:fixed;inset:0;z-index:15;pointer-events:none;}

#stage{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
#stage.show{opacity:1;}
.s-eyebrow{font-size:26px;letter-spacing:8px;color:rgba(255,255,255,.4);margin-bottom:14px;}
.s-title{
  font-size:80px;letter-spacing:6px;color:#FFD000;
  text-shadow:0 0 40px rgba(255,208,0,.8),0 0 80px rgba(255,208,0,.4);
  line-height:1;margin-bottom:36px;text-align:center;
}
#shuffleZone{display:flex;flex-direction:column;align-items:center;gap:10px;min-height:180px;justify-content:center;}
.shuffle-name{font-size:50px;letter-spacing:3px;color:rgba(255,255,255,.22);transition:all .08s;text-align:center;}
.shuffle-name.active{color:#fff;font-size:66px;text-shadow:0 0 25px rgba(255,255,255,.8),0 0 50px rgba(255,255,255,.3);}
#chosenName{
  font-size:108px;letter-spacing:6px;color:#FFD000;
  text-shadow:0 0 50px rgba(255,208,0,1),0 0 100px rgba(255,208,0,.6),0 6px 30px rgba(0,0,0,1);
  text-align:center;line-height:1;
  opacity:0;transform:scale(.7);
  transition:opacity .5s,transform .6s cubic-bezier(.34,1.56,.64,1);display:none;
}
#chosenName.show{opacity:1;transform:scale(1);display:block;}
.s-badge{font-size:20px;letter-spacing:4px;color:rgba(255,208,0,.6);margin-top:14px;opacity:0;transition:opacity .5s;}
.s-badge.show{opacity:1;}

/* ══ JACKPOT GAMING — Esports / Holographic Style ══ */
#jackpotStage{
  position:fixed;inset:0;z-index:22;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .3s;
  background:rgba(0,2,8,.96);
}
#jackpotStage.show{opacity:1;}

/* Scanlines */
#jackpotStage::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,255,.018) 3px,rgba(0,255,255,.018) 4px);
  z-index:0;
}

/* Corner brackets */
.jp-corner{
  position:fixed;width:55px;height:55px;
  border-color:rgba(0,255,255,.8);border-style:solid;border-width:0;
  opacity:0;transition:opacity .4s;z-index:2;
}
.jp-corner.show{opacity:1;animation:cPulse 2s infinite alternate;}
@keyframes cPulse{from{border-color:rgba(0,255,255,.7);}to{border-color:rgba(155,89,182,.9);}}
.jp-corner.tl{top:36px;left:36px;border-top-width:3px;border-left-width:3px;}
.jp-corner.tr{top:36px;right:36px;border-top-width:3px;border-right-width:3px;}
.jp-corner.bl{bottom:36px;left:36px;border-bottom-width:3px;border-left-width:3px;}
.jp-corner.br{bottom:36px;right:36px;border-bottom-width:3px;border-right-width:3px;}

/* Status eyebrow */
.jp-eyebrow{
  font-size:12px;letter-spacing:8px;color:#00FFFF;
  margin-bottom:18px;font-family:'Courier New',monospace;
  text-shadow:0 0 10px rgba(0,255,255,.8);
  animation:eyebrowBlink .9s infinite;z-index:5;position:relative;
}
@keyframes eyebrowBlink{0%,100%{opacity:1;}50%{opacity:.35;}}

/* 3 reels con skin gaming */
.jp-slots{display:flex;gap:16px;margin-bottom:20px;z-index:5;position:relative;}
.jp-reel{
  width:340px;height:160px;
  background:rgba(0,10,25,.95);
  border:2px solid rgba(0,255,255,.55);
  border-radius:6px;overflow:hidden;position:relative;
  box-shadow:0 0 25px rgba(0,255,255,.25),0 0 50px rgba(0,255,255,.08),inset 0 0 30px rgba(0,0,0,.7);
}
.jp-reel::before,.jp-reel::after{content:'';position:absolute;left:0;right:0;height:50px;z-index:2;pointer-events:none;}
.jp-reel::before{top:0;background:linear-gradient(rgba(0,2,8,.95),transparent);}
.jp-reel::after{bottom:0;background:linear-gradient(transparent,rgba(0,2,8,.95));}
.jp-reel-inner{position:absolute;width:100%;transition:transform 0s;display:flex;flex-direction:column;align-items:center;}
.jp-reel-item{
  height:160px;display:flex;align-items:center;justify-content:center;
  font-size:28px;letter-spacing:3px;color:rgba(0,255,255,.4);
  text-align:center;padding:0 12px;
  white-space:nowrap;overflow:hidden;width:100%;
  font-family:'Courier New',monospace;
}
.jp-reel-item.winner{
  color:#00FFFF;font-size:32px;
  text-shadow:0 0 20px rgba(0,255,255,1),0 0 40px rgba(0,255,255,.6);
  animation:winnerGlitch .15s steps(1) 4;
}
@keyframes winnerGlitch{
  0%,100%{transform:translateX(0);color:#00FFFF;}
  25%{transform:translateX(-4px);color:#39FF14;}
  75%{transform:translateX(4px);color:#9B59B6;}
}
.jp-reel-line{
  position:absolute;top:50%;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,255,255,.9),rgba(0,255,255,1),rgba(0,255,255,.9),transparent);
  transform:translateY(-50%);z-index:3;
  box-shadow:0 0 10px rgba(0,255,255,.8),0 0 20px rgba(0,255,255,.4);
}
/* scan bar on reel */
.jp-scan-bar{
  position:absolute;left:0;right:0;height:2px;
  background:rgba(57,255,20,.6);z-index:4;
  animation:reelScan 1s linear infinite;
}
@keyframes reelScan{0%{top:0%;}100%{top:100%;}}

/* Progress bar */
.jp-progress-wrap{width:1040px;z-index:5;position:relative;margin-top:4px;}
.jp-progress-track{height:3px;background:rgba(0,255,255,.12);border-radius:2px;overflow:hidden;}
.jp-progress-fill{height:100%;background:linear-gradient(90deg,#00FFFF,#9B59B6);border-radius:2px;width:0%;transition:width .08s linear;}
.jp-progress-label{font-size:9px;letter-spacing:3px;color:rgba(0,255,255,.4);font-family:'Courier New',monospace;margin-top:4px;text-align:right;}

/* ══ REVEAL SCREEN ══ */
#jpReveal{
  position:fixed;inset:0;z-index:35;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;background:rgba(0,2,8,.97);
  opacity:0;transition:opacity .3s ease;
}
#jpReveal.show{display:flex;opacity:1;}
/* Scanlines on reveal too */
#jpReveal::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,255,.015) 3px,rgba(0,255,255,.015) 4px);
}

.jp-jackpot-text{
  font-size:12px;letter-spacing:12px;color:#00FFFF;
  font-family:'Courier New',monospace;
  text-shadow:0 0 12px rgba(0,255,255,.9);
  margin-bottom:16px;
  animation:fadeSlideUp .4s ease forwards;opacity:0;
}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.jp-winner-name{
  font-size:88px;letter-spacing:6px;color:#fff;line-height:1;
  font-family:'Courier New',monospace;
  text-shadow:0 0 20px rgba(0,255,255,.5),0 0 40px rgba(0,255,255,.2);
  animation:nameReveal .5s ease .3s forwards;opacity:0;
}
@keyframes nameReveal{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.jp-winner-name.glitching{animation:nameGlitch .25s steps(2) 4;}
@keyframes nameGlitch{
  0%,100%{transform:translateX(0);color:#fff;text-shadow:0 0 20px rgba(0,255,255,.5);}
  25%{transform:translateX(-6px);color:#00FFFF;text-shadow:0 0 30px rgba(0,255,255,1);}
  75%{transform:translateX(6px);color:#9B59B6;text-shadow:0 0 30px rgba(155,89,182,1);}
}

.jp-sub-badge{
  font-size:14px;letter-spacing:10px;margin-top:20px;opacity:0;
  transition:opacity .5s, transform .5s cubic-bezier(.34,1.56,.64,1);
  transform:translateY(16px);font-family:'Courier New',monospace;
  color:#39FF14;text-shadow:0 0 12px rgba(57,255,20,.8);
}
.jp-sub-badge.show{opacity:1;transform:translateY(0);}

#jpFlash{
  position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;
  background:rgba(0,255,255,.2);transition:opacity .06s;
}
#jpFlash.show{opacity:1;}

#jpSpotlight{display:none;}

#repHud{
  position:fixed;top:55px;left:1120px;
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.75);
  border-radius:50px;padding:8px 18px 8px 12px;
  z-index:30;opacity:0;transition:opacity .5s;pointer-events:none;
}
#repHud.normal{border:1px solid rgba(255,208,0,.3);}
#repHud.sub{border:1px solid rgba(255,215,0,.7);box-shadow:0 0 15px rgba(255,215,0,.3),0 0 30px rgba(255,150,0,.15);background:rgba(20,12,0,.85);}
#repHud.show{opacity:1;}
.hud-dot{width:10px;height:10px;border-radius:50%;background:#FFD000;animation:hdot 1.2s infinite;}
@keyframes hdot{0%,100%{opacity:1;}50%{opacity:.2;}}
.hud-crown{font-size:16px;animation:crownBounce 2s infinite;}
@keyframes crownBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.hud-label{font-size:12px;letter-spacing:2px;color:rgba(255,208,0,.6);}
.hud-name{font-size:17px;letter-spacing:2px;color:#FFD000;text-shadow:0 0 10px rgba(255,208,0,.6);}
.hud-name.sub{color:#FFD700;text-shadow:0 0 15px rgba(255,215,0,.8),0 0 30px rgba(255,150,0,.4);}

#ttsMsg{
  position:fixed;top:840px;left:940px;
  background:rgba(0,0,0,0.78);border:1px solid rgba(255,208,0,.25);
  border-radius:12px;padding:12px 20px;width:480px;
  z-index:30;opacity:0;transition:opacity .3s;pointer-events:none;
}
#ttsMsg.sub-rep{border-color:rgba(255,215,0,.5);box-shadow:0 0 12px rgba(255,215,0,.2);}
#ttsMsg.show{opacity:1;}
.tts-user{font-size:15px;letter-spacing:2px;color:rgba(255,208,0,.7);margin-bottom:3px;}
.tts-text{font-family:'Inter',sans-serif;font-size:19px;font-weight:700;color:#fff;letter-spacing:.5px;}
</style>
</head>
<body>

<div id="sirenOverlay">
  <div class="siren-flash"></div>
  <div class="siren-text">🚨 MODO VIP 🚨</div>
  <div class="siren-sub">BUSCANDO REPRESENTANTE</div>
</div>
<div id="bg"></div>
<canvas id="particles"></canvas>
<div id="jpFlash"></div>

<div id="stage">
  <div class="s-eyebrow">Seleccionando...</div>
  <div class="s-title">REPRESENTANTE<br>DEL STREAM</div>
  <div id="shuffleZone">
    <div class="shuffle-name" id="sh0"></div>
    <div class="shuffle-name active" id="sh1"></div>
    <div class="shuffle-name" id="sh2"></div>
  </div>
  <div id="chosenName"></div>
  <div class="s-badge" id="sBadge">🎤 REPRESENTANTE OFICIAL</div>
</div>

<!-- Corner HUD brackets -->
<div class="jp-corner tl" id="jpCornerTL"></div>
<div class="jp-corner tr" id="jpCornerTR"></div>
<div class="jp-corner bl" id="jpCornerBL"></div>
<div class="jp-corner br" id="jpCornerBR"></div>

<div id="jackpotStage">
  <div id="jpSpotlight"></div>
  <div class="jp-eyebrow" id="jpEyebrow">[ SCANNING SUBSCRIBER DATABASE ]</div>
  <div class="jp-slots">
    <div class="jp-reel" id="reel0"><div class="jp-reel-inner" id="reel0inner"></div><div class="jp-reel-line"></div><div class="jp-scan-bar"></div></div>
    <div class="jp-reel" id="reel1"><div class="jp-reel-inner" id="reel1inner"></div><div class="jp-reel-line"></div><div class="jp-scan-bar" style="animation-delay:.4s"></div></div>
    <div class="jp-reel" id="reel2"><div class="jp-reel-inner" id="reel2inner"></div><div class="jp-reel-line"></div><div class="jp-scan-bar" style="animation-delay:.7s"></div></div>
  </div>
  <div class="jp-progress-wrap">
    <div class="jp-progress-track"><div class="jp-progress-fill" id="jpProgressFill"></div></div>
    <div class="jp-progress-label" id="jpProgressLabel">ANALYZING... 0%</div>
  </div>
</div>

<div id="jpReveal">
  <div class="jp-jackpot-text" id="jpJackpotText">// VIP MEMBER SELECTED</div>
  <div class="jp-winner-name" id="jpWinnerName">USUARIO</div>
  <div class="jp-sub-badge" id="jpSubBadge">[ REPRESENTATIVE CONFIRMED ]</div>
</div>

<div id="repHud" class="normal">
  <span class="hud-dot"></span>
  <span id="hudCrown" style="display:none" class="hud-crown">👑</span>
  <span class="hud-label">REP:</span>
  <span class="hud-name" id="hudName">-</span>
</div>

<div id="ttsMsg">
  <div class="tts-user" id="ttsMsgUser"></div>
  <div class="tts-text" id="ttsMsgText"></div>
</div>

<script>
const LS = 'rep_state';
let repUserId=null, repUsername=null, repIsSubscriber=false;
let ttsTimeout=null, msgTimeout=null;
let particles=[], pRAF=null;
let lastTrigger=0, lastClear=0, pendingRep=null;
// FIX: estado de la sirena para poder interrumpirla
let sirenTimer=null, lastSirenTs=0;

// ══ FIX: AudioContext lazy con unlock periódico ══
let _ac=null;
function getAC(){
  if(!_ac){
    try{ _ac=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(_ac.state!=='running') _ac.resume().catch(()=>{});
  return _ac;
}
const _audioUnlocker=setInterval(()=>{
  const ac=getAC();
  if(ac&&ac.state==='running') clearInterval(_audioUnlocker);
},1000);

// ══ FIX: Warmup de TTS para OBS ══
// En OBS el speechSynthesis puede estar bloqueado sin interacción previa
// Llamar getVoices() y un utterance silencioso ayuda a desbloquearlo
function warmupTTS(){
  try{
    window.speechSynthesis.getVoices();
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0; u.rate=2;
    window.speechSynthesis.speak(u);
    setTimeout(()=>{ try{ window.speechSynthesis.cancel(); }catch(e){} },200);
  }catch(e){}
}
warmupTTS();
setTimeout(warmupTTS,2000);
setTimeout(warmupTTS,5000);

// ══ FIX: Polling de rep_siren — antes NUNCA se leía en el overlay ══
// rep-control escribe rep_siren al localStorage pero el overlay nunca lo leía
setInterval(()=>{
  try{
    const raw=localStorage.getItem('rep_siren');
    if(!raw) return;
    const s=JSON.parse(raw);
    if(s.ts&&s.ts!==lastSirenTs){
      lastSirenTs=s.ts;
      showSirenAnimation();
    }
  }catch(e){}
},300);

// FIX: mostrar sirena y permitir interrupción
function showSirenAnimation(){
  const so=document.getElementById('sirenOverlay');
  so.classList.add('show');
  playSirenSound();
  if(sirenTimer) clearTimeout(sirenTimer);
  sirenTimer=setTimeout(()=>{
    so.classList.remove('show');
    sirenTimer=null;
  },4000);
}

// FIX: ocultar sirena aunque esté a mitad de animación (para clear inmediato)
function hideSirenAnimation(){
  if(sirenTimer){ clearTimeout(sirenTimer); sirenTimer=null; }
  document.getElementById('sirenOverlay').classList.remove('show');
  stopSirenSound();
}

// ══ Polling principal del estado ══
setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);
    if(!raw) return;
    const s=JSON.parse(raw);
    if(s.trigger&&s.trigger!==lastTrigger){
      lastTrigger=s.trigger;
      pendingRep={userId:s.repUserId,username:s.repUsername,isMember:!!s.repIsMember};
      if(s.repIsMember) startJackpot(s.candidates||[],s.chosen);
      else startAnimation(s.candidates||[],s.chosen);
    }
    if(s.clear&&s.clear!==lastClear){lastClear=s.clear;clearRep();}
  }catch(e){}
},300);

// ══ Escuchar mensajes TTS ══
setInterval(()=>{
  try{
    const raw=localStorage.getItem('rep_message');
    if(!raw) return;
    const m=JSON.parse(raw);
    if(!m.ts||m.ts===window._lastMsgTs) return;
    window._lastMsgTs=m.ts;
    if(repUserId&&m.userId===repUserId) speakMessage(repUsername,m.text,repIsSubscriber);
  }catch(e){}
},250);
window._lastMsgTs=0;

// ══ Voz basada en perfil del rep activo ══
// La variación ya no es por username hash — se asigna al seleccionar el rep
function speakMessage(username,text,isSub){
  if(!text||text.length>200) return;
  window.speechSynthesis.cancel();
  document.getElementById('ttsMsgUser').textContent=(isSub?'⭐ ':'')+username;
  document.getElementById('ttsMsgText').textContent=text;
  const ttsEl=document.getElementById('ttsMsg');
  ttsEl.classList.toggle('sub-rep',!!isSub);
  ttsEl.classList.add('show');
  if(msgTimeout) clearTimeout(msgTimeout);
  msgTimeout=setTimeout(()=>ttsEl.classList.remove('show'),5000);

  const profile = currentVoiceProfile || VOICE_PROFILES[0];
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'es-MX';
  utt.pitch  = profile.pitch;
  utt.rate   = profile.rate;
  utt.volume = 1.0;  // Volumen máximo

  // Seleccionar mejor voz en español disponible
  const voices = window.speechSynthesis.getVoices();
  const esVoices = voices.filter(v => v.lang.startsWith('es'));
  if(esVoices.length > 0){
    // Usar la voz según el índice del perfil para más variedad si hay varias
    const vIdx = VOICE_PROFILES.indexOf(profile) % esVoices.length;
    utt.voice = esVoices[vIdx] || esVoices[0];
  } else if(voices.length > 0){
    utt.voice = voices[0];
  }

  window.speechSynthesis.speak(utt);
}

// ══ ANIMACIÓN NORMAL ══
function startAnimation(candidates,chosen){
  const pool=candidates.length>0?candidates:['???'];
  document.getElementById('bg').className='show';
  const stage=document.getElementById('stage');
  document.getElementById('chosenName').classList.remove('show');
  document.getElementById('chosenName').style.display='none';
  document.getElementById('sBadge').classList.remove('show');
  document.getElementById('shuffleZone').style.display='flex';
  stage.classList.add('show');
  startParticles(false);
  playDrumRoll(); // ← drum roll mientras mezcla nombres
  let count=0;
  const si=setInterval(()=>{
    count++;
    ['sh0','sh1','sh2'].forEach(id=>{
      document.getElementById(id).textContent=pool[Math.floor(Math.random()*pool.length)];
    });
    if(count>=40){clearInterval(si);stopDrumRoll();revealChosen(chosen||pool[0]);}
  },80);
}

function revealChosen(name){
  document.getElementById('shuffleZone').style.display='none';
  const el=document.getElementById('chosenName');
  el.textContent=name.toUpperCase(); el.style.display='block';
  void el.offsetWidth; el.classList.add('show');
  playRevealFanfare(); // ← fanfarria al revelar el ganador
  setTimeout(()=>document.getElementById('sBadge').classList.add('show'),400);
  setTimeout(()=>{
    document.getElementById('bg').className='';
    document.getElementById('stage').classList.remove('show');
    stopParticles();
    activateRep(false);
  },6000);
}

// ══ FIX: JACKPOT MODE — pad pool para evitar undefined en reeles ══
function showCorners(show){
  ['TL','TR','BL','BR'].forEach(c=>{
    const el=document.getElementById('jpCorner'+c);
    if(el) el.className='jp-corner '+c.toLowerCase()+(show?' show':'');
  });
}

function animateProgress(duration,onComplete){
  const fill=document.getElementById('jpProgressFill');
  const label=document.getElementById('jpProgressLabel');
  const start=performance.now();
  function frame(now){
    const pct=Math.min(100,Math.round((now-start)/duration*100));
    if(fill) fill.style.width=pct+'%';
    if(label) label.textContent='ANALYZING... '+pct+'%';
    if(pct<100) requestAnimationFrame(frame);
    else if(onComplete) onComplete();
  }
  requestAnimationFrame(frame);
}

function startJackpot(candidates,chosen){
  let pool=candidates.length>0?[...candidates]:[chosen||'???'];
  while(pool.length<6) pool=[...pool,...pool.slice(0,Math.max(1,6-pool.length))];

  // Reset UI
  document.getElementById('bg').className='jackpot show';
  document.getElementById('jpReveal').classList.remove('show');
  document.getElementById('jpSubBadge').classList.remove('show');
  if(document.getElementById('jpProgressFill')) document.getElementById('jpProgressFill').style.width='0%';
  if(document.getElementById('jpProgressLabel')) document.getElementById('jpProgressLabel').textContent='ANALYZING... 0%';

  // Activar corners con delay para efecto de "power up"
  showCorners(false);
  setTimeout(()=>showCorners(true),200);

  document.getElementById('jackpotStage').classList.add('show');
  startParticles(true);
  playJackpotSpin();

  [0,1,2].forEach(i=>{
    const inner=document.getElementById(`reel${i}inner`);
    inner.innerHTML='';
    const items=[...pool,...pool,...pool,...pool,chosen].sort(()=>Math.random()-.5);
    items.forEach(name=>{
      const div=document.createElement('div');
      div.className='jp-reel-item';
      div.textContent=(name||'???').substring(0,14).toUpperCase();
      inner.appendChild(div);
    });
    inner.style.transition='none';
    inner.style.transform=`translateY(-${Math.floor(Math.random()*items.length)*90}px)`;
  });

  // Progress bar en paralelo con los reels
  animateProgress(3800,null);

  spinReel(0,chosen,pool,()=>{
    setTimeout(()=>spinReel(1,chosen,pool,()=>{
      setTimeout(()=>spinReel(2,chosen,pool,()=>{
        if(document.getElementById('jpProgressFill')) document.getElementById('jpProgressFill').style.width='100%';
        if(document.getElementById('jpProgressLabel')) document.getElementById('jpProgressLabel').textContent='TARGET LOCKED — 100%';
        setTimeout(()=>revealJackpot(chosen),600);
      }),400);
    }),400);
  });
}

function spinReel(reelIdx,winner,pool,onStop){
  const inner=document.getElementById(`reel${reelIdx}inner`);
  const items=inner.querySelectorAll('.jp-reel-item');
  const itemH=160;
  const totalH=items.length*itemH;
  const spinDuration=1200+reelIdx*350;
  const start=performance.now();
  let currentPos=0;
  const velocity=30;

  function animate(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/spinDuration,1);
    const easedVel=velocity*Math.pow(1-progress,2);
    currentPos=(currentPos+Math.max(easedVel,0.5))%totalH;
    inner.style.transition='none';
    inner.style.transform=`translateY(-${currentPos}px)`;
    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      let winnerIdx=0;
      const winnerText=(winner||'???').substring(0,14).toUpperCase();
      Array.from(items).forEach((el,i)=>{ if(el.textContent===winnerText) winnerIdx=i; });
      const targetPos=winnerIdx*itemH;
      inner.style.transition='transform .25s ease-in';
      inner.style.transform=`translateY(-${targetPos+15}px)`;
      setTimeout(()=>{
        inner.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)';
        inner.style.transform=`translateY(-${targetPos}px)`;
        items[winnerIdx].classList.add('winner');
        playReelStop(reelIdx);
        setTimeout(onStop,400);
      },260);
    }
  }
  requestAnimationFrame(animate);
}

// ══ Partículas ══
function startParticles(jackpot){
  const canvas=document.getElementById('particles');
  canvas.width=1920; canvas.height=1080;
  const ctx=canvas.getContext('2d');
  const colors=jackpot
    ?['#FFD700','#FFC200','#FFEC00','#FF8C00','#ffffff','#FFD000','#FFA500']
    :['#FFD000','#FF8800','#FFEC00','#ffffff','#FFA500'];

  particles=Array.from({length:jackpot?120:60},()=>({
    x:Math.random()*1920,
    y:jackpot?-20:Math.random()*1080,
    vx:(Math.random()-.5)*(jackpot?3:1.5),
    vy:jackpot?Math.random()*4+2:(Math.random()-.5)*1.5,
    r:jackpot?Math.random()*5+2:Math.random()*3+1,
    color:colors[Math.floor(Math.random()*colors.length)],
    opacity:Math.random()*.7+.3,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-.5)*.2,
    w:jackpot?Math.random()*12+4:0,
  }));

  function loop(){
    ctx.clearRect(0,0,1920,1080);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
      if(jackpot&&p.y>1100){p.y=-20;p.x=Math.random()*1920;}
      else if(!jackpot){if(p.x<0||p.x>1920)p.vx*=-1;if(p.y<0||p.y>1080)p.vy*=-1;}
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.opacity; ctx.shadowColor=p.color; ctx.shadowBlur=jackpot?12:8;
      ctx.fillStyle=p.color;
      if(jackpot&&p.w>0){ctx.fillRect(-p.w/2,-p.r/2,p.w,p.r);}
      else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    pRAF=requestAnimationFrame(loop);
  }
  if(pRAF) cancelAnimationFrame(pRAF);
  loop();
}

function stopParticles(){
  if(pRAF){cancelAnimationFrame(pRAF);pRAF=null;}
  const c=document.getElementById('particles');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

// ══ Audio Engine ══
function makeNoise(duration){
  const ac=getAC(); if(!ac) return null;
  const buf=ac.createBuffer(1,ac.sampleRate*duration,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource();
  src.buffer=buf;
  return src;
}

function makeOsc(type,freq){
  const ac=getAC(); if(!ac) return null;
  const o=ac.createOscillator();
  o.type=type; o.frequency.value=freq;
  return o;
}

function conn(...nodes){
  const ac=getAC(); if(!ac) return;
  for(let i=0;i<nodes.length-1;i++) if(nodes[i]&&nodes[i+1]) nodes[i].connect(nodes[i+1]);
  if(nodes[nodes.length-1]) nodes[nodes.length-1].connect(ac.destination);
}

// ══ FIX: Sonido de sirena real con posibilidad de parar ══
let sirenOscSource=null;
function playSirenSound(){
  const ac=getAC(); if(!ac) return;
  stopSirenSound();
  const t=ac.currentTime;
  const o=ac.createOscillator();
  const g=ac.createGain();
  const f=ac.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=900;

  // Sweep ascendente/descendente × 4 ciclos
  for(let i=0;i<8;i++){
    const st=t+i*0.5;
    o.frequency.setValueAtTime(600,st);
    o.frequency.linearRampToValueAtTime(1200,st+0.25);
    o.frequency.linearRampToValueAtTime(600,st+0.5);
  }
  o.type='sawtooth';
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.28,t+0.15);
  g.gain.setValueAtTime(0.28,t+3.6);
  g.gain.linearRampToValueAtTime(0,t+4.0);

  o.connect(f); f.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+4.0);
  sirenOscSource=o;
}

function stopSirenSound(){
  if(sirenOscSource){
    try{ sirenOscSource.stop(); }catch(e){}
    sirenOscSource=null;
  }
}

// ══ Reel spin sound ══
let reelSpinSource=null;
function startReelSpinSound(){
  const ac=getAC(); if(!ac) return;
  stopReelSpinSound();
  const bufLen=ac.sampleRate*0.5;
  const buf=ac.createBuffer(1,bufLen,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++){
    const pos=i/bufLen;
    d[i]=(Math.random()*2-1)*0.15;
    const clickFreq=12;
    if(Math.sin(pos*Math.PI*2*clickFreq)>0.92){
      d[i]+=(Math.random()*2-1)*0.6*Math.pow(Math.abs(Math.sin(pos*Math.PI*2*clickFreq)),8);
    }
  }
  reelSpinSource=ac.createBufferSource();
  reelSpinSource.buffer=buf;
  reelSpinSource.loop=true;
  const filter=ac.createBiquadFilter();
  filter.type='bandpass'; filter.frequency.value=800; filter.Q.value=1.5;
  const gain=ac.createGain();
  gain.gain.setValueAtTime(0,ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.35,ac.currentTime+0.3);
  reelSpinSource.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  reelSpinSource.start();
}

function stopReelSpinSound(){
  if(reelSpinSource){
    try{ reelSpinSource.stop(); }catch(e){}
    reelSpinSource=null;
  }
}

function playReelStop(idx){
  const ac=getAC(); if(!ac) return;
  const t=ac.currentTime;
  const impactBuf=ac.createBuffer(1,ac.sampleRate*0.08,ac.sampleRate);
  const id=impactBuf.getChannelData(0);
  for(let i=0;i<id.length;i++) id[i]=(Math.random()*2-1)*Math.pow(1-i/id.length,1.5);
  const impact=ac.createBufferSource(); impact.buffer=impactBuf;
  const impF=ac.createBiquadFilter(); impF.type='lowpass'; impF.frequency.value=500;
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0.7,t); impG.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  impact.connect(impF); impF.connect(impG); impG.connect(ac.destination);
  impact.start(t);

  const tones=[[392,523],[523,659],[659,784]];
  const[f1,f2]=tones[idx];
  const metal=makeOsc('triangle',f1); if(!metal) return;
  const metalG=ac.createGain();
  const metalF=ac.createBiquadFilter(); metalF.type='peaking'; metalF.frequency.value=2000; metalF.gain.value=6;
  metal.frequency.setValueAtTime(f1,t); metal.frequency.exponentialRampToValueAtTime(f2,t+0.08);
  metalG.gain.setValueAtTime(0.5,t); metalG.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  metal.connect(metalF); metalF.connect(metalG); metalG.connect(ac.destination);
  metal.start(t); metal.stop(t+0.25);

  const bell=makeOsc('sine',f2*2); if(!bell) return;
  const bellG=ac.createGain();
  bellG.gain.setValueAtTime(0.15,t+0.05); bellG.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  bell.connect(bellG); bellG.connect(ac.destination);
  bell.start(t+0.05); bell.stop(t+0.6);

  if(idx===2) setTimeout(stopReelSpinSound,200);
}

function playJackpotSpin(){
  const ac=getAC(); if(!ac) return;
  const t=ac.currentTime;
  [[146,0],[174,0.1],[220,0.2],[261,0.3]].forEach(([freq,delay])=>{
    const o=makeOsc('sine',freq); if(!o) return;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0,t+delay);
    g.gain.linearRampToValueAtTime(0.2,t+delay+0.15);
    g.gain.setValueAtTime(0.2,t+delay+0.8);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+1.5);
    o.connect(g); g.connect(ac.destination);
    o.start(t+delay); o.stop(t+delay+1.5);
  });
  const rollDuration=2.5;
  for(let i=0;i<40;i++){
    const st=t+0.3+(i/40)*rollDuration;
    const intensity=Math.pow(i/40,2);
    const nBuf=ac.createBuffer(1,ac.sampleRate*0.03,ac.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let j=0;j<nd.length;j++) nd[j]=(Math.random()*2-1)*Math.pow(1-j/nd.length,2);
    const ns=ac.createBufferSource(); ns.buffer=nBuf;
    const nf=ac.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=200+intensity*400;
    const ng=ac.createGain();
    ng.gain.setValueAtTime(0.1+intensity*0.4,st); ng.gain.exponentialRampToValueAtTime(0.001,st+0.04);
    ns.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    ns.start(st);
  }
  setTimeout(startReelSpinSound,400);
}

function playJackpotWin(){
  const ac=getAC(); if(!ac) return;
  stopReelSpinSound();
  const t=ac.currentTime;

  const sub=makeOsc('sine',80); if(!sub) return;
  const subG=ac.createGain();
  sub.frequency.setValueAtTime(80,t); sub.frequency.exponentialRampToValueAtTime(30,t+0.6);
  subG.gain.setValueAtTime(1.0,t); subG.gain.exponentialRampToValueAtTime(0.001,t+0.7);
  sub.connect(subG); subG.connect(ac.destination);
  sub.start(t); sub.stop(t+0.7);

  const expBuf=ac.createBuffer(1,ac.sampleRate*0.3,ac.sampleRate);
  const expD=expBuf.getChannelData(0);
  for(let i=0;i<expD.length;i++) expD[i]=(Math.random()*2-1)*Math.pow(1-i/expD.length,0.8);
  const exp=ac.createBufferSource(); exp.buffer=expBuf;
  const expF=ac.createBiquadFilter(); expF.type='lowpass'; expF.frequency.value=300;
  const expG=ac.createGain();
  expG.gain.setValueAtTime(0.8,t); expG.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  exp.connect(expF); expF.connect(expG); expG.connect(ac.destination);
  exp.start(t);

  const trumpetNotes=[523,659,784,1047,1319,1047,784,1047,1319,1568];
  const trumpetTimes=[0.1,0.17,0.24,0.31,0.38,0.52,0.59,0.66,0.73,0.80];
  trumpetNotes.forEach((freq,i)=>{
    const o1=makeOsc('sawtooth',freq); if(!o1) return;
    const o2=makeOsc('square',freq*2);
    const mix=ac.createGain(); mix.gain.value=0.5;
    const mix2=ac.createGain(); mix2.gain.value=0.15;
    const filter=ac.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=freq*3;
    const env=ac.createGain();
    const st=t+trumpetTimes[i];
    env.gain.setValueAtTime(0,st); env.gain.linearRampToValueAtTime(0.35,st+0.04);
    env.gain.setValueAtTime(0.3,st+0.08); env.gain.exponentialRampToValueAtTime(0.001,st+0.18);
    o1.connect(mix); o2.connect(mix2);
    mix.connect(filter); mix2.connect(filter);
    filter.connect(env); env.connect(ac.destination);
    o1.start(st); o1.stop(st+0.2);
    o2.start(st); o2.stop(st+0.2);
  });

  [[523,0.95],[659,0.85],[784,0.9],[1047,0.75],[1319,0.6]].forEach(([freq,vol],i)=>{
    const o=makeOsc('sine',freq); if(!o) return;
    const g=ac.createGain();
    const st=t+0.9+i*0.02;
    g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(vol*0.18,st+0.1);
    g.gain.setValueAtTime(vol*0.18,st+1.2); g.gain.exponentialRampToValueAtTime(0.001,st+2.5);
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+2.5);
  });

  for(let i=0;i<25;i++){
    const st=t+0.5+i*0.06+Math.random()*0.03;
    const coinFreq=1200+i*80+Math.random()*200;
    const coin=makeOsc('sine',coinFreq); if(!coin) return;
    const coinG=ac.createGain();
    coinG.gain.setValueAtTime(0.12,st); coinG.gain.exponentialRampToValueAtTime(0.001,st+0.08);
    coin.connect(coinG); coinG.connect(ac.destination);
    coin.start(st); coin.stop(st+0.1);
  }

  [[0.15,0.6],[0.3,0.4],[0.5,0.25],[0.8,0.15]].forEach(([delay,vol])=>{
    [523,784,1047].forEach(freq=>{
      const o=makeOsc('sine',freq); if(!o) return;
      const g=ac.createGain();
      g.gain.setValueAtTime(vol*0.08,t+delay); g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.4);
      o.connect(g); g.connect(ac.destination);
      o.start(t+delay); o.stop(t+delay+0.4);
    });
  });

  [2093,2637,3136,3951,4186].forEach((freq,i)=>{
    const o=makeOsc('sine',freq); if(!o) return;
    const g=ac.createGain();
    const st=t+1.0+i*0.12;
    g.gain.setValueAtTime(0.12,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.8);
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.8);
  });
}

let drumRollInterval = null;
let drumRollCount = 0;

function playDrumRoll(){
  const ac = getAC(); if(!ac) return;
  drumRollCount = 0;
  const totalBeats = 40; // igual que count>=40 en startAnimation
  let beatDelay = 140; // ms entre golpes, va acelerando

  function beat(){
    const t = ac.currentTime;
    drumRollCount++;
    // Golpe de caja — ruido corto con filtro
    const bufLen = Math.floor(ac.sampleRate * 0.04);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < bufLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufLen, 1.2);
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.8;
    const g = ac.createGain();
    const vol = 0.15 + (drumRollCount/totalBeats)*0.35; // crece con la racha
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    src.connect(filt); filt.connect(g); g.connect(ac.destination);
    src.start(t);

    // Sub-golpe que se intensifica
    const sub = ac.createOscillator(); sub.type = 'sine';
    sub.frequency.setValueAtTime(90 + drumRollCount*2, t);
    sub.frequency.exponentialRampToValueAtTime(40, t+0.06);
    const subG = ac.createGain();
    subG.gain.setValueAtTime(0.25 + (drumRollCount/totalBeats)*0.5, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    sub.connect(subG); subG.connect(ac.destination);
    sub.start(t); sub.stop(t+0.07);

    // Acelerar progresivamente
    beatDelay = Math.max(35, 140 - drumRollCount*3);
    if(drumRollCount < totalBeats){
      drumRollInterval = setTimeout(beat, beatDelay);
    }
  }
  beat();
}

function stopDrumRoll(){
  if(drumRollInterval){ clearTimeout(drumRollInterval); drumRollInterval = null; }
}

function playRevealFanfare(){
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime;

  // Boom de impacto
  const sub = ac.createOscillator(); sub.type = 'sine';
  const subG = ac.createGain();
  sub.frequency.setValueAtTime(100, t); sub.frequency.exponentialRampToValueAtTime(35, t+0.5);
  subG.gain.setValueAtTime(1.0, t); subG.gain.exponentialRampToValueAtTime(0.001, t+0.55);
  sub.connect(subG); subG.connect(ac.destination);
  sub.start(t); sub.stop(t+0.55);

  // Explosion noise
  const expLen = Math.floor(ac.sampleRate * 0.25);
  const expBuf = ac.createBuffer(1, expLen, ac.sampleRate);
  const expD = expBuf.getChannelData(0);
  for(let i=0;i<expLen;i++) expD[i]=(Math.random()*2-1)*Math.pow(1-i/expLen,0.7);
  const exp = ac.createBufferSource(); exp.buffer = expBuf;
  const expF = ac.createBiquadFilter(); expF.type = 'lowpass'; expF.frequency.value = 500;
  const expG = ac.createGain();
  expG.gain.setValueAtTime(0.7, t); expG.gain.exponentialRampToValueAtTime(0.001, t+0.3);
  exp.connect(expF); expF.connect(expG); expG.connect(ac.destination);
  exp.start(t);

  // Fanfarria 5 notas ascendentes
  const notes   = [523, 659, 784, 1047, 1319];
  const offsets = [0.05, 0.12, 0.19, 0.26, 0.33];
  notes.forEach((freq,i)=>{
    const o = ac.createOscillator(); o.type = 'triangle';
    const g = ac.createGain();
    const st = t + offsets[i];
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.4, st+0.04);
    g.gain.setValueAtTime(0.35, st+0.1); g.gain.exponentialRampToValueAtTime(0.001, st+0.28);
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.3);
  });

  // Acorde final sostenido
  [523, 659, 784, 1047].forEach((freq,i)=>{
    const o = ac.createOscillator(); o.type = 'sine';
    const g = ac.createGain();
    const st = t + 0.45 + i*0.02;
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.18, st+0.1);
    g.gain.setValueAtTime(0.18, st+1.0); g.gain.exponentialRampToValueAtTime(0.001, st+2.0);
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+2.0);
  });

  // Campanitas de brillo
  [2093, 2637, 3136, 4186].forEach((freq,i)=>{
    const o = ac.createOscillator(); o.type = 'sine';
    const g = ac.createGain();
    const st = t + 0.5 + i*0.1;
    g.gain.setValueAtTime(0.12, st); g.gain.exponentialRampToValueAtTime(0.001, st+0.7);
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.7);
  });
}
</script>
