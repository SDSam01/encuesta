<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vida Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;}

#flashRed{
  position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;
  background:radial-gradient(ellipse at center, rgba(255,0,0,0) 15%, rgba(255,0,0,0.85) 100%);
  transition:opacity .05s;
}
#flashRed.show{opacity:1;}

#flashGreen{
  position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;
  background:radial-gradient(ellipse at center, rgba(0,255,0,0) 20%, rgba(0,255,0,0.65) 100%);
  transition:opacity .07s;
}
#flashGreen.show{opacity:1;}

/* ══ QUIZ — Paloma y X en el centro ══ */
#quizResult{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#quizResult.show{animation:quizFadeInOut 2s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes quizFadeInOut{
  0%{opacity:0;transform:scale(.5);}
  20%{opacity:1;transform:scale(1.1);}
  40%{transform:scale(1);}
  75%{opacity:1;}
  100%{opacity:0;transform:scale(.95);}
}
#quizIcon{
  font-size:260px;line-height:1;
  filter:drop-shadow(0 0 40px currentColor);
}
#quizLabel{
  font-family:'Bebas Neue',sans-serif;
  font-size:52px;letter-spacing:16px;
  margin-top:10px;
}
#quizResult.correct #quizIcon{ color:#4ade80; }
#quizResult.correct #quizLabel{ color:#4ade80; text-shadow:0 0 30px rgba(74,222,128,.7); }
#quizResult.wrong #quizIcon{ color:#f87171; }
#quizResult.wrong #quizLabel{ color:#f87171; text-shadow:0 0 30px rgba(248,113,113,.7); }

@keyframes chatShake{
  0%,100%{transform:translate(0,0);}
  15%{transform:translate(12px,-8px) rotate(1deg);}
  30%{transform:translate(-14px,10px) rotate(-1deg);}
  45%{transform:translate(10px,-6px);}60%{transform:translate(-8px,8px);}
  75%{transform:translate(6px,-4px);}85%{transform:translate(-3px,3px);}
}
body.shake{animation:chatShake .5s cubic-bezier(.36,.07,.19,.97);}

#widget{
  position:fixed;top:60px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  opacity:0;transform:translateY(-20px);
  transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;z-index:50;
}
#widget.visible{opacity:1;transform:translateY(0);}

.w-bg{
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;padding:20px 48px 18px;backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.w-label{
  font-family:'Courier New',monospace;font-size:18px;font-weight:700;letter-spacing:6px;
  color:rgba(255,255,255,.55);text-transform:uppercase;text-shadow:0 0 12px rgba(255,50,50,.4);
}
.hearts-row{
  display:flex;gap:20px;
  filter:drop-shadow(0 4px 16px rgba(255,0,0,.6)) drop-shadow(0 0 30px rgba(255,0,0,.25));
}
.heart-wrap{width:120px;height:120px;}
.heart-wrap.hit{animation:heartHit .55s cubic-bezier(.36,.07,.19,.97);}
@keyframes heartHit{
  0%{transform:scale(1.6) rotate(12deg);}25%{transform:scale(0.75) rotate(-8deg);}
  50%{transform:scale(1.15) rotate(4deg);}100%{transform:scale(1) rotate(0);}
}
.heart-wrap.heal{animation:heartHeal .5s ease-out;}
@keyframes heartHeal{
  0%{transform:scale(1);}40%{transform:scale(1.5);}70%{transform:scale(0.9);}100%{transform:scale(1);}
}
#widget.shake{animation:wShake .5s ease-out;}
@keyframes wShake{
  0%,100%{transform:translateY(0) translateX(0);}
  15%{transform:translateY(0) translateX(16px) rotate(1deg);}
  30%{transform:translateY(0) translateX(-16px) rotate(-1deg);}
  50%{transform:translateY(0) translateX(10px);}
  70%{transform:translateY(0) translateX(-10px);}
  85%{transform:translateY(0) translateX(5px);}
}
#deadScreen{
  position:fixed;inset:0;pointer-events:none;z-index:99;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .6s;
}
#deadScreen.show{opacity:1;}
.dead-text{
  font-family:'Courier New',monospace;font-size:100px;font-weight:900;
  color:#FF0000;letter-spacing:8px;
  text-shadow:0 0 40px rgba(255,0,0,.9),0 0 80px rgba(255,0,0,.5),0 6px 30px rgba(0,0,0,1);
  animation:dp .9s infinite alternate;
}
@keyframes dp{from{opacity:.5;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div id="flashRed"></div>
<div id="flashGreen"></div>
<div id="quizResult">
  <div id="quizIcon">✓</div>
  <div id="quizLabel">CORRECTO</div>
</div>
<div id="deadScreen"><div class="dead-text">CHAT MUERTO</div></div>
<div id="widget">
  <div class="w-bg">
    <div class="w-label">Chat</div>
    <div class="hearts-row" id="heartsRow"></div>
  </div>
</div>
<script>
const LS='battle_state';
let lastHit=0,lastHeal=0,lastHp=6,lastDead=false,hideTimeout=null;
let lastQuizTs=0;

function showQuizResult(correct){
  const el=document.getElementById('quizResult');
  const icon=document.getElementById('quizIcon');
  const label=document.getElementById('quizLabel');
  el.classList.remove('show','correct','wrong');
  void el.offsetWidth;
  if(correct){
    icon.textContent='✓'; label.textContent='CORRECTO';
    el.classList.add('show','correct');
  } else {
    icon.textContent='✗'; label.textContent='INCORRECTO';
    el.classList.add('show','wrong');
  }
  setTimeout(()=>el.classList.remove('show','correct','wrong'),2100);
}
const AC=new (window.AudioContext||window.webkitAudioContext)();

function playHit(){
  AC.resume();const t=AC.currentTime;
  const sub=AC.createOscillator(),subG=AC.createGain();
  sub.connect(subG);subG.connect(AC.destination);sub.type='sine';
  sub.frequency.setValueAtTime(150,t);sub.frequency.exponentialRampToValueAtTime(50,t+.3);
  subG.gain.setValueAtTime(.7,t);subG.gain.exponentialRampToValueAtTime(.001,t+.35);
  sub.start(t);sub.stop(t+.35);
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type='sawtooth';
  o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(80,t+.1);
  g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
  o.start(t);o.stop(t+.12);
  const buf=AC.createBuffer(1,AC.sampleRate*.12,AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const ns=AC.createBufferSource(),nf=AC.createBiquadFilter(),ng=AC.createGain();
  nf.type='bandpass';nf.frequency.value=1000;
  ns.buffer=buf;ns.connect(nf);nf.connect(ng);ng.connect(AC.destination);
  ng.gain.setValueAtTime(.35,t);ng.gain.exponentialRampToValueAtTime(.001,t+.15);
  ns.start(t);
}

function playHeal(){
  AC.resume();
  [392,523,659,784].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);o.type='sine';const t=AC.currentTime+i*.09;
    o.frequency.value=f;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.start(t);o.stop(t+.15);
  });
}

function playDeath(){
  AC.resume();
  [280,250,210,180,140,110].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);o.type='square';const t=AC.currentTime+i*.15;
    o.frequency.value=f;g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o.start(t);o.stop(t+.18);
  });
}

function doFlash(id){
  const el=document.getElementById(id);
  el.classList.add('show');
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>{el.classList.add('show');setTimeout(()=>el.classList.remove('show'),90);},110);},90);
}

// ══ FIX: heartSVG con media vida correctamente dividida en x=8 ══
function heartSVG(filled){
  const red='#FF2222', dark='#1a1a1a', hi='#FF7777', dhi='#2a2a2a';
  const lc  = filled>=1 ? red  : dark;
  const rc  = filled===2 ? red  : dark;
  const lhi = filled>=1 ? hi   : dhi;
  const rhi = filled===2 ? hi   : dhi;
  return `<svg viewBox="0 0 16 14" xmlns="http://www.w3.org/2000/svg" width="120" height="120" style="display:block;image-rendering:pixelated">
    <rect x="1"  y="0" width="3" height="2" fill="${lhi}"/>
    <rect x="4"  y="0" width="4" height="1" fill="${lc}"/>
    <rect x="8"  y="0" width="4" height="1" fill="${rc}"/>
    <rect x="12" y="0" width="3" height="2" fill="${rhi}"/>
    <rect x="0"  y="1" width="8" height="4" fill="${lc}"/>
    <rect x="8"  y="1" width="8" height="4" fill="${rc}"/>
    <rect x="0"  y="5" width="8" height="3" fill="${lc}"/>
    <rect x="8"  y="5" width="8" height="3" fill="${rc}"/>
    <rect x="1"  y="8" width="7" height="2" fill="${lc}"/>
    <rect x="8"  y="8" width="7" height="2" fill="${rc}"/>
    <rect x="2"  y="10" width="6" height="2" fill="${lc}"/>
    <rect x="8"  y="10" width="6" height="2" fill="${rc}"/>
    <rect x="4"  y="12" width="4" height="1" fill="${lc}"/>
    <rect x="8"  y="12" width="4" height="1" fill="${rc}"/>
    <rect x="6"  y="13" width="2" height="1" fill="${lc}"/>
    <rect x="8"  y="13" width="2" height="1" fill="${rc}"/>
  </svg>`;
}

function renderHearts(hp){
  const row=document.getElementById('heartsRow');row.innerHTML='';
  for(let i=0;i<3;i++){
    const base=i*2,filled=hp>=base+2?2:hp>=base+1?1:0;
    const w=document.createElement('div');w.className='heart-wrap';w.id='heart_'+i;
    w.innerHTML=heartSVG(filled);row.appendChild(w);
  }
}

function showWidget(animClass,heartIdx,newHp){
  const widget=document.getElementById('widget');widget.classList.add('visible');
  renderHearts(lastHp);
  widget.classList.remove('shake');void widget.offsetWidth;
  widget.classList.add('shake');setTimeout(()=>widget.classList.remove('shake'),500);
  const el=document.getElementById('heart_'+heartIdx);
  if(el){el.classList.remove('hit','heal');void el.offsetWidth;el.classList.add(animClass);setTimeout(()=>el.classList.remove(animClass),550);}
  setTimeout(()=>renderHearts(newHp),380);
  if(hideTimeout)clearTimeout(hideTimeout);
  hideTimeout=setTimeout(()=>widget.classList.remove('visible'),3500);
}

setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);if(!raw)return;const s=JSON.parse(raw);
    if(s.chatHit&&s.chatHit!==lastHit&&s.chatHp<lastHp){
      const old=lastHp;lastHit=s.chatHit;
      if(s.chatHp<=0){playDeath();renderHearts(0);document.getElementById('widget').classList.add('visible');if(hideTimeout)clearTimeout(hideTimeout);}
      else{playHit();const idx=Math.min(2,Math.floor((old-1)/2));showWidget('hit',idx,s.chatHp);}
      lastHp=s.chatHp;
    }
    if(s.chatHeal&&s.chatHeal!==lastHeal&&s.chatHp>lastHp){
      lastHeal=s.chatHeal;lastHp=s.chatHp;
      doFlash('flashGreen');playHeal();
      const idx=Math.max(0,Math.min(2,Math.floor((s.chatHp-1)/2)));showWidget('heal',idx,s.chatHp);
    }
    if(s.chatHp!==lastHp&&s.chatHit===lastHit&&s.chatHeal===lastHeal){
      lastHp=s.chatHp;renderHearts(s.chatHp);
      if(hideTimeout)clearTimeout(hideTimeout);document.getElementById('widget').classList.remove('visible');
    }
    // Quiz result detection
    if(s.quizTs&&s.quizTs!==lastQuizTs){
      lastQuizTs=s.quizTs;
      showQuizResult(s.quizCorrect);
    }
    if(s.chatHidden){document.getElementById('widget').classList.remove('visible');document.getElementById('deadScreen').classList.remove('show');return;}
    if(s.chatDead&&!lastDead){lastDead=true;document.getElementById('deadScreen').classList.add('show');document.getElementById('widget').classList.add('visible');if(hideTimeout)clearTimeout(hideTimeout);}
    else if(!s.chatDead&&lastDead){lastDead=false;document.getElementById('deadScreen').classList.remove('show');}
  }catch(e){}
},200);

renderHearts(6);
</script>
</body>
</html>
