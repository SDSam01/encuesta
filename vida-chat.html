<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vida Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:100vw;height:100vh;}

#widget{
  position:fixed;
  top:20px;right:20px;
  display:flex;flex-direction:column;align-items:flex-end;
  gap:6px;
}

.w-label{
  font-family:'Courier New',monospace;
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:rgba(255,255,255,.5);text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,1);
}

.hearts-row{
  display:flex;gap:5px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.9));
}

.heart-wrap{
  width:40px;height:40px;position:relative;
  transition:transform .1s;
}
.heart-wrap.hit{animation:heartHit .5s ease-out;}
.heart-wrap.dead{animation:heartDead .6s ease-out forwards;}

@keyframes heartHit{
  0%{transform:scale(1.4) rotate(10deg);}
  40%{transform:scale(0.85) rotate(-5deg);}
  100%{transform:scale(1) rotate(0deg);}
}
@keyframes heartDead{
  0%{transform:scale(1.3);opacity:1;}
  50%{transform:scale(0.5) rotate(-20deg);opacity:.5;}
  100%{transform:scale(0) rotate(-45deg);opacity:0;}
}

#widget.shake{animation:widgetShake .4s ease-out;}
@keyframes widgetShake{
  0%{transform:translateX(0);}
  15%{transform:translateX(8px) rotate(1deg);}
  30%{transform:translateX(-8px) rotate(-1deg);}
  45%{transform:translateX(6px);}
  60%{transform:translateX(-6px);}
  75%{transform:translateX(3px);}
  100%{transform:translateX(0);}
}

/* Chat usa corazones azules */
.chat-heart-color{filter:hue-rotate(200deg) saturate(1.5);}
</style>
</head>
<body>

<div id="widget">
  <div class="w-label">Chat</div>
  <div class="hearts-row" id="heartsRow"></div>
</div>

<script>
const LS   = 'battle_state';
let lastHit  = 0;
let lastHp   = 6;
let lastDead = false;

// ══ Audio — sonido diferente al de Danny ══
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playHit() {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(440, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(220, AC.currentTime + 0.15);
  g.gain.setValueAtTime(0.25, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.2);
  o.start(); o.stop(AC.currentTime + 0.2);
}

function playDeath() {
  [330,294,247,220,165].forEach((freq, i) => {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'triangle';
    o.frequency.value = freq;
    const t = AC.currentTime + i * 0.12;
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  });
}

// ══ SVG corazón azul para el chat ══
function heartSVG(filled) {
  const c  = filled === 2 ? '#2288FF' : filled === 1 ? '#2288FF' : '#2a2a2a';
  const cr = filled === 2 ? '#2288FF' : '#2a2a2a';
  const sh = filled >= 1  ? '#66AAFF' : '#3a3a3a';
  return `<svg viewBox="0 0 16 14" xmlns="http://www.w3.org/2000/svg" width="40" height="40" style="display:block">
    <rect x="1" y="0" width="3" height="2" fill="${sh}"/>
    <rect x="4" y="0" width="4" height="1" fill="${c}"/>
    <rect x="8" y="0" width="4" height="1" fill="${cr}"/>
    <rect x="12" y="0" width="3" height="2" fill="${filled===2?sh:(filled===1?cr:'#3a3a3a')}"/>
    <rect x="0" y="1" width="8" height="4" fill="${c}"/>
    <rect x="8" y="1" width="8" height="4" fill="${cr}"/>
    <rect x="0" y="5" width="16" height="3" fill="${filled>=1?'#2288FF':'#2a2a2a'}"/>
    <rect x="1" y="8" width="14" height="2" fill="${filled>=1?'#2288FF':'#2a2a2a'}"/>
    <rect x="2" y="10" width="12" height="2" fill="${filled>=1?'#2288FF':'#2a2a2a'}"/>
    <rect x="4" y="12" width="8" height="1" fill="${filled>=1?'#2288FF':'#2a2a2a'}"/>
    <rect x="6" y="13" width="4" height="1" fill="${filled>=1?'#2288FF':'#2a2a2a'}"/>
  </svg>`;
}

function renderHearts(hp) {
  const row = document.getElementById('heartsRow');
  row.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const base   = i * 2;
    const filled = hp >= base + 2 ? 2 : hp >= base + 1 ? 1 : 0;
    const wrap   = document.createElement('div');
    wrap.className = 'heart-wrap';
    wrap.id = 'heart_' + i;
    wrap.innerHTML = heartSVG(filled);
    row.appendChild(wrap);
  }
}

function triggerDamage(oldHp, newHp) {
  AC.resume();

  // Shake widget
  const widget = document.getElementById('widget');
  widget.classList.remove('shake');
  void widget.offsetWidth;
  widget.classList.add('shake');
  setTimeout(() => widget.classList.remove('shake'), 500);

  // Animar corazón afectado
  const affectedIdx = Math.min(2, Math.floor(oldHp / 2) > 0 ? Math.floor((oldHp-1) / 2) : 0);
  const heartEl = document.getElementById('heart_' + affectedIdx);
  if (heartEl) {
    heartEl.classList.remove('hit');
    void heartEl.offsetWidth;
    heartEl.classList.add('hit');
    setTimeout(() => heartEl.classList.remove('hit'), 500);
  }

  if (newHp <= 0) playDeath();
  else playHit();

  setTimeout(() => renderHearts(newHp), 300);
}

setInterval(() => {
  try {
    const raw = localStorage.getItem(LS);
    if (!raw) return;
    const s = JSON.parse(raw);

    if (s.chatHit && s.chatHit !== lastHit && s.chatHp < lastHp) {
      lastHit = s.chatHit;
      const oldHp = lastHp;
      lastHp = s.chatHp;
      triggerDamage(oldHp, s.chatHp);
    } else if (s.chatHp !== lastHp) {
      lastHp = s.chatHp;
      renderHearts(s.chatHp);
    }

    if (s.chatHit !== lastHit && s.chatHp >= lastHp) {
      lastHit = s.chatHit;
      lastHp  = s.chatHp;
      renderHearts(s.chatHp);
    }

  } catch(e) {}
}, 200);

renderHearts(6);
</script>
</body>
</html>
