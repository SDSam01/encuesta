<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;}

/* ══ Tienda Panel ══ */
#tienda{
  position:fixed;
  top:50%;left:40px;
  transform:translateY(-50%) translateX(-120%);
  width:340px;
  background:rgba(6,4,0,.92);
  border:1px solid rgba(255,208,0,.35);
  border-radius:20px;
  padding:20px;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 60px rgba(255,208,0,.15), 0 20px 60px rgba(0,0,0,.8);
}
#tienda.open{transform:translateY(-50%) translateX(0);}

.tienda-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:4px;
  color:#FFD000;
  text-align:center;
  margin-bottom:4px;
  text-shadow:0 0 20px rgba(255,208,0,.5);
}
.tienda-sub{
  font-family:'Inter',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:2px;
  color:rgba(255,208,0,.35);
  text-align:center;
  margin-bottom:16px;
  text-transform:uppercase;
}
.tienda-bote{
  text-align:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:2px;
  color:rgba(255,255,255,.4);
  margin-bottom:16px;
}
.tienda-bote span{color:#FFD000;}

/* Items */
.item-list{display:flex;flex-direction:column;gap:8px;}

.shop-item{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:10px 12px;
  transition:all .3s;
  position:relative;
  overflow:hidden;
}
.shop-item.sold{
  opacity:.35;
  border-color:rgba(255,255,255,.04);
}
.shop-item.sold::after{
  content:'COMPRADO';
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;
  color:rgba(255,255,255,.3);
}

.item-icon{font-size:22px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;letter-spacing:1px;color:#fff;line-height:1;
}
.item-price{
  font-family:'Inter',sans-serif;
  font-size:10px;font-weight:700;color:rgba(255,208,0,.6);
  margin-top:2px;
}

/* ══ Animaciones de compra ══ */
#purchaseAnim{
  position:fixed;inset:0;pointer-events:none;z-index:50;
}

/* Medio corazon */
.anim-half{animation:halfHeart .1s ease forwards;}

/* Animacion de corazon normal */
@keyframes heartBurst{
  0%{transform:scale(0) rotate(-15deg);opacity:1;}
  60%{transform:scale(1.4) rotate(5deg);opacity:1;}
  100%{transform:scale(1) rotate(0deg);opacity:0;}
}

/* Full refill */
@keyframes refillWave{
  0%{opacity:0;transform:scale(.5);}
  40%{opacity:1;transform:scale(1.1);}
  70%{transform:scale(.95);}
  100%{opacity:0;transform:scale(1);}
}

/* Rellenar todas — épico */
@keyframes megaFlash{
  0%{opacity:0;}
  10%{opacity:.8;}
  30%{opacity:.4;}
  50%{opacity:.9;}
  70%{opacity:.3;}
  100%{opacity:0;}
}

.purchase-text{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:80px;letter-spacing:8px;
  text-align:center;
  pointer-events:none;
  opacity:0;
  z-index:55;
}
.purchase-subtext{
  font-family:'Bebas Neue',sans-serif;
  font-size:24px;letter-spacing:4px;
  color:rgba(255,255,255,.6);
  display:block;
  margin-top:8px;
}

/* Canvas para partículas */
#animCanvas{position:fixed;inset:0;pointer-events:none;z-index:52;}

/* Buyer badge */
#buyerBadge{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:rgba(0,0,0,.85);
  border-radius:50px;
  padding:10px 28px;
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:3px;
  color:#FFD000;
  opacity:0;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  white-space:nowrap;
  z-index:56;
  border:1px solid rgba(255,208,0,.3);
}
#buyerBadge.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
</style>
</head>
<body>

<canvas id="animCanvas"></canvas>

<div id="tienda">
  <div class="tienda-title">🛒 TIENDA</div>
  <div class="tienda-sub">Escribe !comprar [ítem] en el chat</div>
  <div class="tienda-bote">BOTE: <span id="boteDisplay">0</span> 🪙</div>
  <div class="item-list" id="itemList"></div>
</div>

<div class="purchase-text" id="purchaseText"></div>
<div id="buyerBadge"></div>

<script>
// ══ Items de la tienda ══
const ITEMS = [
  { id:'halfchat',  icon:'💛', name:'+½ Vida Chat',      priceCoins:600,  priceMXN:90,   priceUSD:4.50,  priceBits:450,  color:'#FFD000', side:'chat',  amount:.5 },
  { id:'halfsam',   icon:'🤍', name:'+½ Vida Sam',       priceCoins:600,  priceMXN:90,   priceUSD:4.50,  priceBits:450,  color:'#ffffff', side:'sam',   amount:.5 },
  { id:'onechat',   icon:'❤️',  name:'+1 Vida Chat',      priceCoins:1100, priceMXN:170,  priceUSD:8.50,  priceBits:850,  color:'#ff4444', side:'chat',  amount:1  },
  { id:'onesam',    icon:'💙', name:'+1 Vida Sam',       priceCoins:1100, priceMXN:170,  priceUSD:8.50,  priceBits:850,  color:'#4488ff', side:'sam',   amount:1  },
  { id:'fillchat',  icon:'💖', name:'Rellenar Chat',     priceCoins:2000, priceMXN:350,  priceUSD:17.50, priceBits:1750, color:'#ff4444', side:'chat',  amount:'full' },
  { id:'fillsam',   icon:'🔷', name:'Rellenar Sam',      priceCoins:2000, priceMXN:350,  priceUSD:17.50, priceBits:1750, color:'#4488ff', side:'sam',   amount:'full' },
  { id:'fillall',   icon:'👑', name:'Rellenar TODAS',    priceCoins:0,    priceMXN:650,  priceUSD:32.50, priceBits:3250, color:'#FFD000', side:'all',   amount:'full', realOnly:true },
];

let shopState = {};
let lastPurchaseTs = 0;

function renderItems(state) {
  const list = document.getElementById('itemList');
  list.innerHTML = '';
  ITEMS.forEach(item => {
    const sold = state.sold?.[item.id];
    const div = document.createElement('div');
    div.className = 'shop-item' + (sold ? ' sold' : '');
    div.innerHTML = `
      <span class="item-icon">${item.icon}</span>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">
          ${item.realOnly ? '' : `🪙 ${item.priceCoins.toLocaleString()} coins`}
        </div>
        <div class="item-price" style="margin-top:2px;">
          ▶ $${item.priceUSD} USD / $${item.priceMXN} MXN  •  🟣 ${item.priceBits.toLocaleString()} bits
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

// ══ Animaciones por ítem ══
function playPurchaseAnim(itemId, buyerName) {
  const item = ITEMS.find(i => i.id === itemId);
  if(!item) return;

  // Badge del comprador
  const badge = document.getElementById('buyerBadge');
  badge.textContent = `🛒 ${buyerName} compró: ${item.name}`;
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 5000);

  if(itemId === 'fillall') {
    soundModoDios();
    screenFlash('#FFD000', 400);
    playMegaAnim(buyerName);
  } else if(itemId === 'fillchat' || itemId === 'fillsam') {
    soundRefill(item.color);
    screenFlash(item.color, 300);
    playRefillAnim(item.color, item.name, buyerName);
  } else if(item.amount === 1) {
    soundOne(item.color);
    screenFlash(item.color, 250);
    playHeartAnim(item.color, false, item.name);
  } else {
    soundHalf(item.color);
    screenFlash(item.color, 180);
    playHeartAnim(item.color, true, item.name);
  }
}

function playHeartAnim(color, isHalf, label) {
  const canvas = document.getElementById('animCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1920; canvas.height = 1080;

  const count = isHalf ? 15 : 30;
  const particles = Array.from({length:count}, () => ({
    x: 960 + (Math.random()-.5)*400,
    y: 540 + (Math.random()-.5)*300,
    vx: (Math.random()-.5)*8,
    vy: -(Math.random()*6+3),
    size: Math.random()*30+15,
    opacity: 1,
    rot: Math.random()*Math.PI*2,
  }));

  // Texto central
  const txt = document.getElementById('purchaseText');
  txt.style.color = color;
  txt.style.textShadow = `0 0 40px ${color}`;
  txt.innerHTML = label + `<span class="purchase-subtext">¡COMPRADO!</span>`;
  txt.style.animation = 'none';
  void txt.offsetWidth;
  txt.style.animation = 'refillWave 2.5s ease forwards';

  let frame = 0;
  function loop() {
    ctx.clearRect(0,0,1920,1080);
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.opacity-=.015; p.rot+=.05;
      if(p.opacity<=0) return;
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.opacity;
      ctx.fillStyle=color;
      ctx.shadowColor=color; ctx.shadowBlur=20;
      drawHeart(ctx, 0, 0, p.size);
      ctx.restore();
    });
    frame++;
    if(frame<120) requestAnimationFrame(loop);
    else ctx.clearRect(0,0,1920,1080);
  }
  loop();
}

function playRefillAnim(color, label, buyer) {
  const canvas = document.getElementById('animCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width=1920; canvas.height=1080;

  const particles = Array.from({length:60},()=>({
    x:Math.random()*1920, y:Math.random()*1080,
    vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6,
    size:Math.random()*20+8, opacity:1, rot:Math.random()*Math.PI*2,
  }));

  const txt = document.getElementById('purchaseText');
  txt.style.color = color;
  txt.style.textShadow = `0 0 60px ${color}, 0 0 100px ${color}`;
  txt.innerHTML = label + `<span class="purchase-subtext">¡RELLENO!</span>`;
  txt.style.animation = 'none';
  void txt.offsetWidth;
  txt.style.animation = 'refillWave 3s ease forwards';

  let frame=0;
  function loop(){
    ctx.clearRect(0,0,1920,1080);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.opacity-=.012; p.rot+=.04;
      if(p.opacity<=0) return;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.opacity;
      ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=15;
      drawHeart(ctx,0,0,p.size); ctx.restore();
    });
    frame++;
    if(frame<150) requestAnimationFrame(loop);
    else ctx.clearRect(0,0,1920,1080);
  }
  loop();
}

function playMegaAnim(buyer) {
  const canvas = document.getElementById('animCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width=1920; canvas.height=1080;

  const colors=['#FFD000','#ff4444','#4488ff','#4ade80','#fff'];
  const particles=Array.from({length:120},()=>({
    x:960+(Math.random()-.5)*800,
    y:540+(Math.random()-.5)*600,
    vx:(Math.random()-.5)*12,
    vy:(Math.random()-.5)*12,
    size:Math.random()*35+10,
    opacity:1,
    rot:Math.random()*Math.PI*2,
    color:colors[Math.floor(Math.random()*colors.length)],
  }));

  const txt = document.getElementById('purchaseText');
  txt.style.color = '#FFD000';
  txt.style.textShadow = '0 0 60px #FFD000, 0 0 120px #FF8800';
  txt.innerHTML = '👑 MODO DIOS 👑' + `<span class="purchase-subtext">VIDAS RELLENADAS</span>`;
  txt.style.animation='none'; void txt.offsetWidth;
  txt.style.animation='megaFlash 4s ease forwards';

  // Flash de fondo
  document.body.style.background='rgba(255,208,0,.08)';
  setTimeout(()=>document.body.style.background='transparent',500);

  let frame=0;
  function loop(){
    ctx.clearRect(0,0,1920,1080);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.opacity-=.008; p.rot+=.06;
      if(p.opacity<=0) return;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.opacity;
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=20;
      drawHeart(ctx,0,0,p.size); ctx.restore();
    });
    frame++;
    if(frame<200) requestAnimationFrame(loop);
    else ctx.clearRect(0,0,1920,1080);
  }
  loop();
}

function drawHeart(ctx, x, y, size) {
  const s = size/10;
  ctx.beginPath();
  ctx.moveTo(x, y - s*2);
  ctx.bezierCurveTo(x+s*3, y-s*5, x+s*8, y-s*1, x, y+s*4);
  ctx.bezierCurveTo(x-s*8, y-s*1, x-s*3, y-s*5, x, y-s*2);
  ctx.fill();
}

// ══ Audio Engine ══
let _ac = null;
function getAC() {
  if(!_ac) { try{ _ac = new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(_ac.state !== 'running') _ac.resume().catch(()=>{});
  return _ac;
}
const _unlock = setInterval(()=>{ const ac=getAC(); if(ac&&ac.state==='running') clearInterval(_unlock); }, 1000);

function makeOsc(type, freq) {
  const ac = getAC(); if(!ac) return null;
  const o = ac.createOscillator(); o.type=type; o.frequency.value=freq; return o;
}
function conn(...nodes) {
  const ac = getAC(); if(!ac) return;
  for(let i=0;i<nodes.length-1;i++) if(nodes[i]&&nodes[i+1]) nodes[i].connect(nodes[i+1]);
  if(nodes[nodes.length-1]) nodes[nodes.length-1].connect(ac.destination);
}

// Sonido +½ vida — 2 coin tings rápidos
function soundHalf(color) {
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime;
  const isChat = color === '#FFD000' || color === '#ff4444';
  const baseFreq = isChat ? 1200 : 1000;
  [0, 0.12].forEach((delay, i) => {
    const o = makeOsc('sine', baseFreq + i*200); if(!o) return;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.3, t+delay);
    g.gain.exponentialRampToValueAtTime(0.001, t+delay+0.18);
    conn(o, g); o.start(t+delay); o.stop(t+delay+0.2);
  });
  // Sub click
  const sub = makeOsc('sine', 80); if(!sub) return;
  const sg = ac.createGain();
  sg.gain.setValueAtTime(0.25, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.1);
  conn(sub, sg); sub.start(t); sub.stop(t+0.1);
}

// Sonido +1 vida — 3 tings + acorde cálido
function soundOne(color) {
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime;
  const isChat = color === '#ff4444';
  const freqs = isChat ? [880, 1100, 1320] : [660, 880, 1050];
  freqs.forEach((freq, i) => {
    const o = makeOsc('sine', freq); if(!o) return;
    const g = ac.createGain();
    const st = t + i*0.1;
    g.gain.setValueAtTime(0.28, st);
    g.gain.exponentialRampToValueAtTime(0.001, st+0.35);
    conn(o, g); o.start(st); o.stop(st+0.4);
  });
  // Acorde suave debajo
  [220, 330, 440].forEach((freq, i) => {
    const o = makeOsc('sine', freq); if(!o) return;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, t+0.1); g.gain.linearRampToValueAtTime(0.12, t+0.2);
    g.gain.exponentialRampToValueAtTime(0.001, t+1.2);
    conn(o, g); o.start(t+0.1); o.stop(t+1.2);
  });
  // Bass punch
  const sub = makeOsc('sine', 60); if(!sub) return;
  const sg = ac.createGain();
  sg.gain.setValueAtTime(0.5, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.25);
  conn(sub, sg); sub.start(t); sub.stop(t+0.3);
}

// Sonido rellenar un lado — cascada de monedas + fanfarria
function soundRefill(color) {
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime;
  // Cascada de coins (8 tings ascendentes)
  for(let i=0; i<8; i++) {
    const freq = 800 + i*120 + Math.random()*60;
    const o = makeOsc('sine', freq); if(!o) return;
    const g = ac.createGain();
    const st = t + i*0.07;
    g.gain.setValueAtTime(0.22, st); g.gain.exponentialRampToValueAtTime(0.001, st+0.2);
    conn(o, g); o.start(st); o.stop(st+0.22);
  }
  // Fanfarria 3 notas
  const isChat = color === '#ff4444';
  const base = isChat ? 523 : 392;
  [base, base*1.25, base*1.5].forEach((freq, i) => {
    const o = makeOsc('triangle', freq); if(!o) return;
    const g = ac.createGain();
    const st = t + 0.3 + i*0.15;
    g.gain.setValueAtTime(0.3, st); g.gain.exponentialRampToValueAtTime(0.001, st+0.5);
    conn(o, g); o.start(st); o.stop(st+0.55);
  });
  // Sub boom
  const sub = makeOsc('sine', 50); if(!sub) return;
  const sg = ac.createGain();
  sg.gain.setValueAtTime(0.7, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  conn(sub, sg); sub.start(t); sub.stop(t+0.45);
}

// Sonido Modo Dios — épico completo
function soundModoDios() {
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime;
  // BOOM sub-bass
  const sub = makeOsc('sine', 55); if(!sub) return;
  const sg = ac.createGain();
  sub.frequency.setValueAtTime(55, t); sub.frequency.exponentialRampToValueAtTime(25, t+0.8);
  sg.gain.setValueAtTime(1.0, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.9);
  conn(sub, sg); sub.start(t); sub.stop(t+0.9);
  // Explosion noise
  const bufLen = ac.sampleRate * 0.35;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length, 0.7);
  const ns = ac.createBufferSource(); ns.buffer=buf;
  const nf = ac.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=400;
  const ng = ac.createGain();
  ng.gain.setValueAtTime(0.7, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  ns.connect(nf); nf.connect(ng); ng.connect(ac.destination); ns.start(t);
  // Cascada de coins épica (15 tings)
  for(let i=0;i<15;i++) {
    const freq = 600 + i*100 + Math.random()*80;
    const o = makeOsc('sine', freq); if(!o) return;
    const g = ac.createGain();
    const st = t + 0.2 + i*0.06 + Math.random()*0.03;
    g.gain.setValueAtTime(0.18, st); g.gain.exponentialRampToValueAtTime(0.001, st+0.15);
    conn(o, g); o.start(st); o.stop(st+0.18);
  }
  // Fanfarria de trompetas (7 notas)
  const notes = [523, 659, 784, 1047, 1319, 1047, 1568];
  const times = [0.15, 0.22, 0.29, 0.36, 0.43, 0.58, 0.65];
  notes.forEach((freq, i) => {
    const o = makeOsc('sawtooth', freq); if(!o) return;
    const g = ac.createGain();
    const f = ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq*3;
    const st = t + times[i];
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.28, st+0.04);
    g.gain.setValueAtTime(0.25, st+0.1); g.gain.exponentialRampToValueAtTime(0.001, st+0.22);
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(st); o.stop(st+0.25);
  });
  // Acorde final sostenido
  [523, 659, 784, 1047].forEach((freq, i) => {
    const o = makeOsc('sine', freq); if(!o) return;
    const g = ac.createGain();
    const st = t + 0.8 + i*0.02;
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.15, st+0.1);
    g.gain.setValueAtTime(0.15, st+1.5); g.gain.exponentialRampToValueAtTime(0.001, st+3.0);
    conn(o, g); o.start(st); o.stop(st+3.0);
  });
  // Shimmer campanas
  [2093, 2637, 3136, 4186].forEach((freq, i) => {
    const o = makeOsc('sine', freq); if(!o) return;
    const g = ac.createGain();
    const st = t + 1.0 + i*0.14;
    g.gain.setValueAtTime(0.14, st); g.gain.exponentialRampToValueAtTime(0.001, st+1.0);
    conn(o, g); o.start(st); o.stop(st+1.0);
  });
}

// ══ Flash de pantalla por color ══
function screenFlash(color, duration=300) {
  const flash = document.createElement('div');
  flash.style.cssText = `
    position:fixed;inset:0;z-index:60;pointer-events:none;
    background:${color};opacity:.18;
    transition:opacity ${duration}ms ease;
  `;
  document.body.appendChild(flash);
  void flash.offsetWidth;
  flash.style.opacity='0';
  setTimeout(()=>flash.remove(), duration+50);
}

// ══ Polling ══
setInterval(()=>{
  try{
    // Bote
    const bRaw=localStorage.getItem('stream_bote');
    if(bRaw){
      const b=JSON.parse(bRaw);
      document.getElementById('boteDisplay').textContent=(b.amount||0).toLocaleString('es-MX');
    }

    // Estado tienda
    const sRaw=localStorage.getItem('shop_state');
    if(!sRaw) return;
    const state=JSON.parse(sRaw);

    // Abrir/cerrar
    const tienda=document.getElementById('tienda');
    if(state.open) tienda.classList.add('open');
    else tienda.classList.remove('open');

    // Renderizar items si cambió
    renderItems(state);

    // Detectar compra nueva
    const pRaw=localStorage.getItem('shop_purchase');
    if(pRaw){
      const p=JSON.parse(pRaw);
      if(p.ts && p.ts!==lastPurchaseTs){
        lastPurchaseTs=p.ts;
        playPurchaseAnim(p.itemId, p.buyer);
      }
    }
  }catch(e){}
},300);
</script>
</body>
</html>
