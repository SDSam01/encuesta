<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Representante</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:'Bebas Neue',sans-serif;}

/* ══ Overlay fondo ══ */
#bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0);
  transition:background .5s;
  pointer-events:none;z-index:10;
}
#bg.show{background:rgba(0,0,0,0.82);}

/* ══ Contenido central ══ */
#stage{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  opacity:0;transition:opacity .4s;
}
#stage.show{opacity:1;}

.s-eyebrow{
  font-size:28px;letter-spacing:8px;color:rgba(255,255,255,.45);
  margin-bottom:16px;text-transform:uppercase;
}

.s-title{
  font-size:90px;letter-spacing:6px;color:#FFD000;
  text-shadow:0 0 40px rgba(255,208,0,.8), 0 0 80px rgba(255,208,0,.4), 0 4px 20px rgba(0,0,0,1);
  line-height:1;margin-bottom:40px;text-align:center;
}

/* Zona de shuffle */
#shuffleZone{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  min-height:200px;justify-content:center;
}

.shuffle-name{
  font-size:52px;letter-spacing:3px;color:rgba(255,255,255,.25);
  transition:all .08s;text-align:center;
}
.shuffle-name.active{
  color:#fff;font-size:68px;
  text-shadow:0 0 25px rgba(255,255,255,.8), 0 0 50px rgba(255,255,255,.3);
}

/* Nombre elegido final */
#chosenName{
  font-size:110px;letter-spacing:6px;color:#FFD000;
  text-shadow:0 0 50px rgba(255,208,0,1), 0 0 100px rgba(255,208,0,.6), 0 6px 30px rgba(0,0,0,1);
  text-align:center;line-height:1;
  opacity:0;transform:scale(.7);
  transition:opacity .5s, transform .6s cubic-bezier(.34,1.56,.64,1);
  display:none;
}
#chosenName.show{opacity:1;transform:scale(1);display:block;}

.s-badge{
  font-size:22px;letter-spacing:4px;
  color:rgba(255,208,0,.6);margin-top:16px;
  opacity:0;transition:opacity .5s;
}
.s-badge.show{opacity:1;}

/* ══ HUD rep activo — círculo arriba ══ */
#repHud{
  position:fixed;top:45px;left:940px;
  display:flex;align-items:center;gap:12px;
  background:rgba(0,0,0,0.7);border:1px solid rgba(255,208,0,.3);
  border-radius:50px;padding:8px 20px 8px 12px;
  z-index:30;opacity:0;transition:opacity .5s;pointer-events:none;
}
#repHud.show{opacity:1;}
.hud-dot{width:10px;height:10px;border-radius:50%;background:#FFD000;animation:hdot 1.2s infinite;}
@keyframes hdot{0%,100%{opacity:1;}50%{opacity:.2;}}
.hud-label{font-size:13px;letter-spacing:2px;color:rgba(255,208,0,.6);}
.hud-name{font-size:18px;letter-spacing:2px;color:#FFD000;
  text-shadow:0 0 10px rgba(255,208,0,.6);}

/* ══ Mensaje TTS — círculo abajo ══ */
#ttsMsg{
  position:fixed;top:840px;left:940px;
  background:rgba(0,0,0,0.75);border:1px solid rgba(255,208,0,.25);
  border-radius:12px;padding:12px 20px;
  max-width:480px;
  z-index:30;opacity:0;transition:opacity .3s;pointer-events:none;
}
#ttsMsg.show{opacity:1;}
.tts-user{font-size:16px;letter-spacing:2px;color:rgba(255,208,0,.7);margin-bottom:4px;}
.tts-text{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.5px;}

/* Partículas */
#particles{position:fixed;inset:0;z-index:15;pointer-events:none;}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="particles"></canvas>

<div id="stage">
  <div class="s-eyebrow">Seleccionando...</div>
  <div class="s-title">REPRESENTANTE<br>DEL STREAM</div>
  <div id="shuffleZone">
    <div class="shuffle-name" id="sh0"></div>
    <div class="shuffle-name active" id="sh1"></div>
    <div class="shuffle-name" id="sh2"></div>
  </div>
  <div id="chosenName"></div>
  <div class="s-badge" id="sBadge">🎤 REPRESENTANTE OFICIAL</div>
</div>

<div id="repHud">
  <span class="hud-dot"></span>
  <span class="hud-label">REP:</span>
  <span class="hud-name" id="hudName">-</span>
</div>

<div id="ttsMsg">
  <div class="tts-user" id="ttsMsgUser"></div>
  <div class="tts-text" id="ttsMsgText"></div>
</div>

<script>
const LS = 'rep_state';
let repUserId = null, repUsername = null;
let ttsTimeout = null, msgTimeout = null;
let particles = [], pRAF = null;

// ══ Leer estado del localStorage ══
let lastTrigger = 0, lastClear = 0;

setInterval(() => {
  try {
    const raw = localStorage.getItem(LS);
    if (!raw) return;
    const s = JSON.parse(raw);

    // Nuevo representante
    if (s.trigger && s.trigger !== lastTrigger) {
      lastTrigger = s.trigger;
      startAnimation(s.candidates || [], s.chosen);
    }

    // Limpiar rep
    if (s.clear && s.clear !== lastClear) {
      lastClear = s.clear;
      clearRep();
    }

    // Actualizar rep activo
    if (s.repUserId && s.repUserId !== repUserId) {
      repUserId   = s.repUserId;
      repUsername = s.repUsername;
      document.getElementById('hudName').textContent = repUsername;
      document.getElementById('repHud').classList.add('show');
    }

  } catch(e) {}
}, 300);

// ══ Escuchar mensajes del chat desde el control (via localStorage) ══
setInterval(() => {
  try {
    const raw = localStorage.getItem('rep_message');
    if (!raw) return;
    const m = JSON.parse(raw);
    if (!m.ts || m.ts === window._lastMsgTs) return;
    window._lastMsgTs = m.ts;
    if (repUserId && m.userId === repUserId) {
      speakMessage(repUsername, m.text);
    }
  } catch(e) {}
}, 250);
window._lastMsgTs = 0;

// ══ Voz única por username (hash simple) ══
function voiceFingerprint(username) {
  // Genera un número consistente del username
  let hash = 0;
  for (let i = 0; i < username.length; i++) {
    hash = ((hash << 5) - hash) + username.charCodeAt(i);
    hash |= 0;
  }
  const n = Math.abs(hash);
  // pitch: 0.75 a 1.25 (claro y entendible, no robótico)
  const pitch = 0.75 + (n % 50) / 100;
  // rate: 0.9 a 1.15 (natural)
  const rate  = 0.9  + (n % 25) / 100;
  return { pitch, rate };
}

// ══ TTS ══
function speakMessage(username, text) {
  if (!text || text.length > 200) return;
  window.speechSynthesis.cancel();

  // Mostrar mensaje
  document.getElementById('ttsMsgUser').textContent = username;
  document.getElementById('ttsMsgText').textContent = text;
  document.getElementById('ttsMsg').classList.add('show');
  if (msgTimeout) clearTimeout(msgTimeout);
  msgTimeout = setTimeout(() => document.getElementById('ttsMsg').classList.remove('show'), 5000);

  // Voz con fingerprint del usuario
  const { pitch, rate } = voiceFingerprint(username);
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'es-MX';
  utt.pitch = pitch;
  utt.rate  = rate;

  // Voz española
  const voices  = window.speechSynthesis.getVoices();
  const esVoice = voices.find(v => v.lang.startsWith('es')) || voices[0];
  if (esVoice) utt.voice = esVoice;

  window.speechSynthesis.speak(utt);
}

// ══ Animación de selección ══
function startAnimation(candidates, chosen) {
  const bg    = document.getElementById('bg');
  const stage = document.getElementById('stage');
  const chosen_el = document.getElementById('chosenName');
  const badge = document.getElementById('sBadge');

  chosen_el.classList.remove('show');
  chosen_el.style.display = 'none';
  badge.classList.remove('show');
  document.getElementById('shuffleZone').style.display = 'flex';

  bg.classList.add('show');
  stage.classList.add('show');
  startParticles();

  // Shuffle rápido
  let count = 0;
  const total = 40;
  const pool = candidates.length > 0 ? candidates : ['???'];

  const shuffleInterval = setInterval(() => {
    count++;
    const speed = count < 25 ? 80 : count < 35 ? 150 : 250;

    const names = [
      pool[Math.floor(Math.random() * pool.length)],
      pool[Math.floor(Math.random() * pool.length)],
      pool[Math.floor(Math.random() * pool.length)],
    ];
    document.getElementById('sh0').textContent = names[0];
    document.getElementById('sh1').textContent = names[1];
    document.getElementById('sh2').textContent = names[2];

    if (count >= total) {
      clearInterval(shuffleInterval);
      revealChosen(chosen || pool[Math.floor(Math.random() * pool.length)]);
    }
  }, 80);
}

function revealChosen(name) {
  document.getElementById('shuffleZone').style.display = 'none';

  const el = document.getElementById('chosenName');
  el.textContent = name.toUpperCase();
  el.style.display = 'block';
  void el.offsetWidth;
  el.classList.add('show');

  setTimeout(() => {
    document.getElementById('sBadge').classList.add('show');
  }, 400);

  // Ocultar stage después de 4s, dejar HUD
  setTimeout(() => {
    document.getElementById('bg').classList.remove('show');
    document.getElementById('stage').classList.remove('show');
    stopParticles();
  }, 4000);
}

function clearRep() {
  repUserId = null; repUsername = null;
  window.speechSynthesis.cancel();
  document.getElementById('repHud').classList.remove('show');
  document.getElementById('ttsMsg').classList.remove('show');
  document.getElementById('bg').classList.remove('show');
  document.getElementById('stage').classList.remove('show');
  stopParticles();
}

// ══ Partículas neón ══
function startParticles() {
  const canvas = document.getElementById('particles');
  canvas.width  = 1920; canvas.height = 1080;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFD000','#FF8800','#FFEC00','#ffffff','#FFA500'];

  particles = Array.from({length:60}, () => ({
    x: Math.random()*1920, y: Math.random()*1080,
    vx:(Math.random()-.5)*1.5, vy:(Math.random()-.5)*1.5,
    r: Math.random()*3+1,
    color: colors[Math.floor(Math.random()*colors.length)],
    opacity: Math.random()*.6+.3,
  }));

  function loop() {
    ctx.clearRect(0,0,1920,1080);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x<0||p.x>1920) p.vx*=-1;
      if (p.y<0||p.y>1080) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fill();
    });
    pRAF = requestAnimationFrame(loop);
  }
  if (pRAF) cancelAnimationFrame(pRAF);
  loop();
}

function stopParticles() {
  if (pRAF) { cancelAnimationFrame(pRAF); pRAF = null; }
  const canvas = document.getElementById('particles');
  canvas.getContext('2d').clearRect(0,0,1920,1080);
}

// Cargar voces al iniciar
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
