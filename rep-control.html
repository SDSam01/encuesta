<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rep Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f0f;font-family:'Inter',sans-serif;color:#fff;padding:16px;max-width:460px;margin:0 auto;}
h1{font-size:15px;font-weight:700;margin-bottom:3px;}
.sub{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:14px;}
.section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:10px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px;}
.rep-card{background:rgba(255,208,0,.06);border:1px solid rgba(255,208,0,.2);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:none;}
.rep-card.show{display:block;}
.rep-name{font-size:22px;font-weight:900;color:#FFD000;letter-spacing:1px;margin-bottom:2px;}
.rep-src{font-size:11px;color:rgba(255,208,0,.5);letter-spacing:1px;}
.rep-last{font-size:12px;color:rgba(255,255,255,.4);margin-top:6px;font-style:italic;max-height:36px;overflow:hidden;}
.reader-status{font-size:11px;padding:8px 12px;border-radius:8px;margin-bottom:10px;text-align:center;font-weight:600;}
.reader-ok{background:rgba(68,222,128,0.1);border:1px solid rgba(68,222,128,0.3);color:#4ade80;}
.reader-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;}
.conn-row{display:flex;gap:6px;margin-top:8px;}
.cbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;opacity:.25;transition:.3s;}
.cbadge.on{opacity:1;}
.cb-yt{background:rgba(255,0,0,.12);color:#ff5555;border:1px solid rgba(255,85,85,.2);}
.cb-kick{background:rgba(83,252,83,.07);color:#53fc53;border:1px solid rgba(83,252,83,.18);}
.candidates{margin-top:6px;}
.cand-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:5px;}
.cand-list{display:flex;flex-wrap:wrap;gap:4px;max-height:60px;overflow:hidden;}
.cand-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);}
.cand-tag.yt{border-left:2px solid #ff5555;}
.cand-tag.kick{border-left:2px solid #53fc53;}
.cand-count{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px;}
.window-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.window-label{font-size:10px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.window-btns{display:flex;gap:4px;}
.wbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);transition:.15s;font-family:'Inter',sans-serif;}
.wbtn:hover,.wbtn.on{background:rgba(255,185,0,.15);border-color:rgba(255,185,0,.35);color:#FFD000;}
.btn-main{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid;transition:.15s;font-family:'Inter',sans-serif;margin-bottom:6px;}
.btn-buscar{background:rgba(255,208,0,.15);border-color:rgba(255,208,0,.4);color:#FFD000;}
.btn-buscar:hover{background:rgba(255,208,0,.28);}
.btn-buscar:disabled{opacity:.35;cursor:not-allowed;}
.btn-row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.btn-sm{padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid;transition:.15s;font-family:'Inter',sans-serif;}
.btn-nuevo{background:rgba(100,200,255,.08);border-color:rgba(100,200,255,.2);color:#66CCFF;}
.btn-nuevo:hover{background:rgba(100,200,255,.18);}
.btn-silenciar{background:rgba(255,100,100,.08);border-color:rgba(255,100,100,.2);color:#FF8888;}
.btn-silenciar:hover{background:rgba(255,100,100,.18);}
.btn-reset-all{width:100%;padding:9px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,100,100,.25);background:rgba(255,100,100,.07);color:rgba(255,100,100,.6);transition:.15s;font-family:'Inter',sans-serif;margin-bottom:6px;}
.btn-reset-all:hover{color:#ff8888;background:rgba(255,100,100,.15);}
.btn-limpiar{width:100%;padding:9px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.35);transition:.15s;font-family:'Inter',sans-serif;}
.btn-limpiar:hover{color:#fff;background:rgba(255,255,255,.1);}
.btn-siren{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(255,50,50,.5);background:rgba(255,30,30,.15);color:#FF5555;transition:.15s;font-family:'Inter',sans-serif;margin-bottom:6px;letter-spacing:.5px;}
.btn-siren:hover{background:rgba(255,30,30,.28);}
.btn-siren:disabled{opacity:.35;cursor:not-allowed;}
.btn-demo{width:100%;padding:9px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(100,200,100,.2);background:rgba(100,200,100,.07);color:rgba(100,200,100,.6);transition:.15s;font-family:'Inter',sans-serif;margin-top:8px;}
.btn-demo:hover{color:#8eff8e;background:rgba(100,200,100,.15);}
.tts-test-row{display:flex;gap:6px;margin-top:8px;}
.tts-test-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;color:#fff;font-size:12px;font-family:'Inter',sans-serif;outline:none;}
.tts-test-row input:focus{border-color:rgba(255,208,0,.4);}
.btn-tts{padding:7px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,208,0,.3);background:rgba(255,208,0,.1);color:#FFD000;white-space:nowrap;font-family:'Inter',sans-serif;transition:.15s;}
.btn-tts:hover{background:rgba(255,208,0,.2);}
.status{font-size:11px;text-align:center;margin-top:8px;min-height:16px;color:rgba(255,255,255,.3);}
.status.ok{color:#4ade80;}.status.err{color:#f87171;}.status.loading{color:rgba(255,185,0,.7);}
</style>
</head>
<body>

<h1>🎤 Representante del Stream</h1>
<div class="sub">Selecciona un representante del chat y activa su TTS</div>

<!-- Estado Chat Reader -->
<div id="readerStatus" class="reader-status reader-err">⚠️ Chat Reader no conectado</div>

<!-- REP ACTIVO -->
<div class="rep-card" id="repCard">
  <div class="rep-name" id="repName">—</div>
  <div class="rep-src" id="repSrc">YOUTUBE</div>
  <div class="rep-last" id="repLast">Esperando mensaje...</div>
</div>

<!-- CANDIDATOS -->
<div class="section">
  <div class="section-title">Candidatos activos</div>
  <div class="window-row">
    <span class="window-label">Ventana:</span>
    <div class="window-btns">
      <button class="wbtn" onclick="setWindow(5,this)">5s</button>
      <button class="wbtn on" onclick="setWindow(10,this)">10s</button>
      <button class="wbtn" onclick="setWindow(20,this)">20s</button>
      <button class="wbtn" onclick="setWindow(30,this)">30s</button>
    </div>
  </div>
  <div class="window-row" style="margin-top:8px;">
    <span class="window-label">Candidatos:</span>
    <div class="window-btns">
      <button class="wbtn" id="btnTodos" onclick="setSubs(false,this)" style="background:rgba(255,185,0,.15);border-color:rgba(255,185,0,.35);color:#FFD000;">Todos</button>
      <button class="wbtn" id="btnSubs" onclick="setSubs(true,this)">⭐ Solo suscritos</button>
    </div>
  </div>
  <div class="conn-row">
    <span class="cbadge cb-yt" id="dotYT">▶ YouTube</span>
    <span class="cbadge cb-kick" id="dotKick">⚡ Kick</span>
  </div>
  <div class="candidates">
    <div class="cand-count" id="candCount">0 personas activas en el chat</div>
    <div class="cand-list" id="candList"></div>
  </div>
</div>

<!-- CONTROLES -->
<button class="btn-siren" id="btnSiren" onclick="activarModVip()">🚨 ACTIVAR MODO VIP — Representante Suscriptor</button>
<button class="btn-main btn-buscar" id="btnBuscar" onclick="buscarRep()">🎲 BUSCAR REPRESENTANTE</button>
<div class="btn-row2">
  <button class="btn-sm btn-nuevo" onclick="buscarRep()">🔄 Nuevo rep</button>
  <button class="btn-sm btn-silenciar" onclick="silenciarTTS()">🔇 Silenciar TTS</button>
</div>
<button class="btn-reset-all" onclick="resetTodo()">🔄 Reset completo — limpiar todo</button>
<button class="btn-limpiar" onclick="limpiarRep()">✕ Quitar representante</button>
<button class="btn-demo" onclick="modoDemo()">🧪 Modo prueba (sin stream)</button>
<div class="tts-test-row">
  <input type="text" id="ttsTestInput" placeholder="Escribe un mensaje de prueba..." />
  <button class="btn-tts" onclick="testTTS()">🔊 Probar voz</button>
</div>
<div class="status" id="statusBar">Abre el Chat Reader primero</div>

<script>
const LS_REP = 'rep_state';
const LS_MSG = 'rep_message';

// ══ SIN NINGUNA LLAMADA A YOUTUBE API ══
// Todo se lee del localStorage que escribe chat-reader.html

let windowSecs = 10;
let soloSubs   = false;
let currentRep = null;
let recentUsers = {};
window._lastRepMsgTs = 0;

// ══ Monitorear Chat Reader ══
setInterval(()=>{
  const cs = JSON.parse(localStorage.getItem('chat_status')||'{}');
  const el = document.getElementById('readerStatus');
  if(cs.ytConnected){
    el.className='reader-status reader-ok';
    el.textContent='🟢 Chat Reader activo — key '+(cs.keyIdx+1||1)+'/6';
    document.getElementById('dotYT').classList.add('on');
    if(cs.kickConnected) document.getElementById('dotKick').classList.add('on');
  } else {
    el.className='reader-status reader-err';
    el.textContent='⚠️ Chat Reader no conectado — ábrelo primero';
  }
}, 1000);

// ══ Leer usuarios del chat-reader ══
setInterval(()=>{
  try{
    const raw = localStorage.getItem('chat_users');
    if(!raw) return;
    recentUsers = JSON.parse(raw);
  }catch(e){}
}, 500);

// ══ Escuchar mensajes del rep — 100ms para tiempo real ══
setInterval(()=>{
  try{
    if(!currentRep) return; // Solo cuando hay rep activo
    const rawMsg = localStorage.getItem('chat_messages');
    if(!rawMsg) return;
    const msg = JSON.parse(rawMsg);
    if(!msg.ts||msg.ts===window._lastRepMsgTs) return;
    window._lastRepMsgTs = msg.ts;
    if(msg.userId === currentRep.userId){
      relayMessage(msg.userId, msg.username, msg.text);
    }
  }catch(e){}
}, 100);

// ══ Actualizar candidatos ══
setInterval(()=>{
  const now = Date.now();
  const active = Object.entries(recentUsers)
    .filter(([_,u]) => now - u.lastSeen <= windowSecs * 1000)
    .sort((a,b) => b[1].lastSeen - a[1].lastSeen);

  document.getElementById('candCount').textContent =
    active.length + ' persona' + (active.length===1?'':'s') + ' activas en el chat';

  const list = document.getElementById('candList');
  list.innerHTML = active.slice(0,12).map(([_,u]) =>
    `<span class="cand-tag ${u.src}">${u.isMember?'⭐ ':''}${u.username}</span>`
  ).join('');
}, 1000);

function setWindow(s, btn){
  windowSecs=s;
  document.querySelectorAll('.wbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function setSubs(val, btn){
  soloSubs=val;
  document.querySelectorAll('#btnTodos, #btnSubs').forEach(b=>{
    b.style.background='';b.style.borderColor='';b.style.color='';
  });
  btn.style.background='rgba(255,185,0,.15)';
  btn.style.borderColor='rgba(255,185,0,.35)';
  btn.style.color='#FFD000';
}

function buscarRep(){
  const now=Date.now();
  const active=Object.entries(recentUsers)
    .filter(([_,u])=>now-u.lastSeen<=windowSecs*1000&&(!soloSubs||u.isMember));
  if(active.length===0){setStatus('⚠️ No hay usuarios activos','err');return;}

  const [userId,user]=active[Math.floor(Math.random()*active.length)];
  currentRep={userId,username:user.username,src:user.src};

  document.getElementById('repCard').classList.add('show');
  document.getElementById('repName').textContent=user.username;
  document.getElementById('repSrc').textContent=user.src==='yt'?'▶ YOUTUBE':'⚡ KICK';
  document.getElementById('repLast').textContent='Esperando mensaje...';

  const candidates=Object.entries(recentUsers)
    .filter(([_,u])=>now-u.lastSeen<=windowSecs*1000)
    .map(([_,u])=>u.username).slice(0,20);

  localStorage.setItem(LS_REP, JSON.stringify({
    trigger:Date.now(), candidates,
    chosen:user.username,
    repUserId:userId, repUsername:user.username,
    repIsMember:false, // Normal = sin jackpot
    clear:0,
  }));
  setStatus(`🎤 ${user.username} es el nuevo representante`,'ok');
}

function activarModVip(){
  const now=Date.now();
  const activeSubs=Object.entries(recentUsers)
    .filter(([_,u])=>now-u.lastSeen<=windowSecs*1000&&u.isMember);
  if(activeSubs.length===0){setStatus('⚠️ No hay suscriptores activos','err');return;}

  const btn=document.getElementById('btnSiren');
  btn.disabled=true;btn.textContent='🚨 Activando...';

  localStorage.setItem('rep_siren',JSON.stringify({ts:Date.now()}));
  setStatus('🚨 Sirena activada — buscando suscriptor...','loading');

  setTimeout(()=>{
    const [userId,user]=activeSubs[Math.floor(Math.random()*activeSubs.length)];
    currentRep={userId,username:user.username,src:user.src};

    document.getElementById('repCard').classList.add('show');
    document.getElementById('repName').textContent='⭐ '+user.username;
    document.getElementById('repSrc').textContent=user.src==='yt'?'▶ YOUTUBE':'⚡ KICK';
    document.getElementById('repLast').textContent='Esperando mensaje...';

    const candidates=Object.entries(recentUsers)
      .filter(([_,u])=>now-u.lastSeen<=windowSecs*1000)
      .map(([_,u])=>u.username).slice(0,20);

    localStorage.setItem(LS_REP, JSON.stringify({
      trigger:Date.now(), candidates,
      chosen:user.username,
      repUserId:userId, repUsername:user.username,
      repIsMember:true, // Jackpot!
      clear:0,
    }));

    btn.disabled=false;
    btn.textContent='🚨 ACTIVAR MODO VIP — Representante Suscriptor';
    setStatus('⭐ '+user.username+' es el representante VIP','ok');
  },4200);
}

function relayMessage(userId,username,text){
  if(!text)return;
  localStorage.setItem(LS_MSG,JSON.stringify({userId,username,text,ts:Date.now()}));
  document.getElementById('repLast').textContent='"'+text.substring(0,80)+'"';
}

function silenciarTTS(){
  localStorage.setItem(LS_MSG,JSON.stringify({userId:'__mute__',text:'',ts:Date.now()}));
  setStatus('🔇 TTS silenciado','ok');
  setTimeout(()=>setStatus('',''),2000);
}

function limpiarRep(){
  currentRep=null;
  document.getElementById('repCard').classList.remove('show');
  const prev=JSON.parse(localStorage.getItem(LS_REP)||'{}');
  localStorage.setItem(LS_REP,JSON.stringify({...prev,repUserId:null,repUsername:null,clear:Date.now()}));
  setStatus('Representante eliminado','');
}

function testTTS(){
  if(!currentRep){setStatus('⚠️ Primero elige un representante','err');return;}
  const text=document.getElementById('ttsTestInput').value.trim();
  if(!text){setStatus('⚠️ Escribe algo para probar','err');return;}
  localStorage.setItem(LS_MSG,JSON.stringify({userId:currentRep.userId,username:currentRep.username,text,ts:Date.now()}));
  setStatus('🔊 Reproduciendo con voz de '+currentRep.username,'ok');
  setTimeout(()=>setStatus('',''),3000);
}

function modoDemo(){
  const fakeUsers=[
    {id:'yt_demo1',name:'Pizzaboy_99',src:'yt',isMember:false},
    {id:'yt_demo2',name:'ElGamerVisitante',src:'yt',isMember:false},
    {id:'kick_d1',name:'sigma_proaidem',src:'kick',isMember:false},
    {id:'kick_d2',name:'javvo77',src:'kick',isMember:false},
    {id:'yt_sub1',name:'Lorena_Ramirez',src:'yt',isMember:true},
    {id:'kick_s1',name:'Team_Canguro',src:'kick',isMember:true},
    {id:'yt_sub2',name:'Alex_God',src:'yt',isMember:true},
    {id:'kick_s2',name:'MR_ARBOLERO',src:'kick',isMember:true},
  ];
  const now=Date.now();
  const users={};
  fakeUsers.forEach(u=>{
    users[u.id]={username:u.name,src:u.src,lastSeen:now,text:'',isMember:!!u.isMember};
  });
  localStorage.setItem('chat_users',JSON.stringify(users));
  localStorage.setItem('chat_status',JSON.stringify({ytConnected:true,kickConnected:true,keyIdx:0}));
  setStatus('🧪 Modo prueba activo — '+fakeUsers.length+' usuarios cargados','ok');
}

function setStatus(msg,type){
  const el=document.getElementById('statusBar');
  el.textContent=msg;el.className='status '+(type||'');
}
</script>
</body>
</html>
