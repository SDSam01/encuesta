<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Reader</title>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:'Inter',sans-serif;color:#fff;padding:14px;max-width:460px;margin:0 auto;}
h1{font-size:13px;font-weight:700;margin-bottom:2px;}
.sub{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:12px;}
.section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:8px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px;}
label{display:block;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:3px;}
input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:.2s;margin-bottom:3px;}
input:focus{border-color:rgba(255,185,0,.4);}
.saved{font-size:10px;color:rgba(255,185,0,.5);display:none;}
.btn-connect{width:100%;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(255,185,0,.35);background:rgba(255,185,0,.12);color:#FFD000;transition:.15s;font-family:'Inter',sans-serif;margin-top:4px;}
.btn-connect:hover{background:rgba(255,185,0,.22);}
.btn-connect:disabled{opacity:.35;cursor:not-allowed;}
.conn-row{display:flex;gap:6px;margin-top:6px;}
.cbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;opacity:.25;transition:.3s;}
.cbadge.on{opacity:1;}
.cb-yt{background:rgba(255,0,0,.12);color:#ff5555;border:1px solid rgba(255,85,85,.2);}
.cb-kick{background:rgba(83,252,83,.07);color:#53fc53;border:1px solid rgba(83,252,83,.18);}
.cb-twitch{background:rgba(145,70,255,.1);color:#9146FF;border:1px solid rgba(145,70,255,.25);}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;}
.stat{background:rgba(255,255,255,.04);border-radius:8px;padding:8px;text-align:center;}
.stat-num{font-size:20px;font-weight:900;color:#FFD000;}
.stat-lbl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.log{max-height:100px;overflow-y:auto;margin-top:8px;}
.log-item{font-size:10px;color:rgba(255,255,255,.4);padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.src-yt{color:#ff5555;}.src-kick{color:#53fc53;}.src-twitch{color:#9146FF;}
.status-bar{font-size:11px;text-align:center;margin-top:8px;min-height:16px;padding:6px;border-radius:8px;}
.status-bar.ok{color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);}
.status-bar.err{color:#f87171;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);}
.status-bar.loading{color:rgba(255,185,0,.8);background:rgba(255,185,0,.06);border:1px solid rgba(255,185,0,.2);}
.btn-row{display:flex;gap:6px;margin-top:6px;}
.power-btn{
  width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:8px;
}
.power-btn.on{
  background:rgba(74,222,128,.15);border:2px solid rgba(74,222,128,.5);color:#4ade80;
  box-shadow:0 0 20px rgba(74,222,128,.2);
}
.power-btn.off{
  background:rgba(248,113,113,.12);border:2px solid rgba(248,113,113,.4);color:#f87171;
  box-shadow:0 0 20px rgba(248,113,113,.15);
  animation:powerPulse 1.5s infinite;
}
@keyframes powerPulse{0%,100%{box-shadow:0 0 20px rgba(248,113,113,.15);}50%{box-shadow:0 0 30px rgba(248,113,113,.4);}}
.btn-sm{flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;}
.btn-pause{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);}
.btn-pause:hover{background:rgba(255,255,255,.08);}
.btn-force{border:1px solid rgba(74,222,128,.3);background:rgba(74,222,128,.08);color:#4ade80;}
.btn-force:hover{background:rgba(74,222,128,.15);}
#bigStatus{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;
  padding:8px 12px;border-radius:8px;text-align:center;margin-bottom:8px;
  display:none;}
#bigStatus.ok{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);color:#4ade80;display:block;}
#bigStatus.err{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);color:#f87171;display:block;animation:flash .8s infinite;}
@keyframes flash{0%,100%{opacity:1;}50%{opacity:.4;}}
</style>
</head>
<body>

<h1>📡 Chat Reader — Fuente única</h1>
<div class="sub">Lee YouTube + Kick. Todos los widgets leen de aquí.</div>

<div id="bigStatus"></div>

<div class="section">
  <div class="sec-title">YouTube</div>
  <label>Channel ID</label>
  <input type="password" id="channelId" placeholder="UCxxxxxxx...">
  <div class="saved" id="savedCh">✓ Guardado</div>
  <div class="conn-row">
    <span class="cbadge cb-yt" id="dotYT">▶ YouTube</span>
    <span class="cbadge cb-kick" id="dotKick">⚡ Kick</span>
    <span class="cbadge cb-twitch" id="dotTwitch">🟣 Twitch</span>
  </div>
  <button class="power-btn off" id="powerBtn" onclick="togglePower()">
    <span id="powerIcon">⏻</span>
    <span id="powerText">DESCONECTADO — Toca para conectar</span>
  </button>
  <button class="btn-connect" id="btnConnect" onclick="connect()" style="display:none;">▶ Conectar chats</button>
  <div class="btn-row">
    <button class="btn-sm btn-force" onclick="forceReconnect()">↺ Reconectar</button>
  </div>
</div>

<div class="section">
  <div class="sec-title">Actividad</div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="statMsg">0</div><div class="stat-lbl">Mensajes</div></div>
    <div class="stat"><div class="stat-num" id="statUsers">0</div><div class="stat-lbl">Usuarios</div></div>
    <div class="stat"><div class="stat-num" id="statKey">1</div><div class="stat-lbl">API Key</div></div>
  </div>
  <div class="log" id="logEl"></div>
</div>

<div class="status-bar" id="statusBar">Ingresa tu Channel ID y conecta</div>

<script>
const API_KEYS = [
  'AIzaSyCeQDuKLiY8G5GO0Vezm0tfZwsezfLpdME',
  'AIzaSyDqlaHU156M6ilgaFaabHmQort4gMLIzEs',
  'AIzaSyBTaPw7pPv1X78X_Wif6_wMGJDmg8xpi1w',
  'AIzaSyBQEc3IlQHgemp1-wX8TwRnmIU0s4Ti004',
  'AIzaSyD51Nwd1mMiLo8RfrQBiPdXi1J0ejNkHOQ',
  'AIzaSyAivMGIzQtJozYnrdRpfOMZaAtcAQP0BaE'
  // Nuevas keys se agregan aquí
];
const KICK_ROOM_ID = '6043540';
const TWITCH_CHANNEL = 'sdsam'; // canal hardcoded, nunca mostrar en UI

let twitchWs = null;
let twitchReconnectTimer = null;

// ══ localStorage keys ══
const LS_CHAT   = 'chat_messages';
const LS_USERS  = 'chat_users';
const LS_STATUS = 'chat_status';
const LS_QUEUE  = 'chat_queue';
const LS_CHATID = 'yt_chat_id'; // cache del liveChatId {id, ts}

// FIX 1: caché expira a las 8 horas para evitar usar el ID del stream anterior
const CACHE_TTL = 8 * 60 * 60 * 1000;

let keyIdx = 0;
let ytChatId = null;
let ytNextToken = '';
let totalMsg = 0;
let connected = false;
let pollTimer = null;
let reconnectTimer = null;
let lastPollSuccess = 0;

// FIX 2: timestamp ISO del último mensaje procesado — evita duplicados al reconectar
let lastMsgPublishedAt = '';

// ══ pushMessage — para mensajes individuales (Kick) ══
function pushMessage(userId, username, text, src, isMember) {
  if(!text) return;
  const msg = { userId, username, text, src, isMember: !!isMember, ts: Date.now() };
  batchPushMessages([msg]);
}

// ══ batchPushMessages — para lotes de YouTube (N mensajes, 1 sola escritura a queue) ══
// ANTES: pushMessage × 200 = 200 read-modify-write de localStorage → cola saturada
// AHORA: 1 lectura + append de todos + 1 escritura → 0 pérdidas
function batchPushMessages(msgs) {
  if(!msgs.length) return;
  const now = Date.now();

  // ── Actualizar último mensaje (para rep-overlay/control) ──
  const last = msgs[msgs.length - 1];
  localStorage.setItem(LS_CHAT, JSON.stringify(last));

  // ── Queue: una sola lectura + append + una sola escritura ──
  let queue = [];
  try { queue = JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); } catch(e) {}
  queue.push(...msgs);
  if(queue.length > 500) queue = queue.slice(-500); // FIX: 100 → 500
  localStorage.setItem(LS_QUEUE, JSON.stringify(queue));

  // ── Usuarios activos: una sola lectura + update todos + una sola escritura ──
  let users = {};
  try { users = JSON.parse(localStorage.getItem(LS_USERS) || '{}'); } catch(e) {}
  for(const msg of msgs) {
    users[msg.userId] = { username:msg.username, src:msg.src, lastSeen:now, text:msg.text, isMember:msg.isMember };
  }
  // FIX 4: limpiar usuarios que no se han visto en más de 24h
  const cutoff = now - 24 * 60 * 60 * 1000;
  for(const uid in users) { if(users[uid].lastSeen < cutoff) delete users[uid]; }
  localStorage.setItem(LS_USERS, JSON.stringify(users));

  // ── UI ──
  totalMsg += msgs.length;
  document.getElementById('statMsg').textContent = totalMsg;
  document.getElementById('statUsers').textContent = Object.keys(users).length;
  addLog(last.username, last.text, last.src);
  saveStatus(true);
}

function addLog(username, text, src) {
  const el = document.getElementById('logEl');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `<span class="src-${src}">${src.toUpperCase()}</span> <b>${username}:</b> ${text.substring(0,40)}`;
  el.insertBefore(item, el.firstChild);
  if(el.children.length > 20) el.removeChild(el.lastChild);
}

function saveStatus(ytOn) {
  localStorage.setItem(LS_STATUS, JSON.stringify({
    ytConnected: ytOn,
    kickConnected: document.getElementById('dotKick').classList.contains('on'),
    twitchConnected: document.getElementById('dotTwitch').classList.contains('on'),
    keyIdx,
    ts: Date.now()
  }));
}

// ══════════════════════════════════════════════════════
//  findChatId — ÚNICA función que llama a search (100u)
//  Solo se ejecuta cuando no hay chatId cacheado,
//  o cuando el polling falla con liveChatNotFound.
//  Auto-rota keys si encuentra 403, sin requerir click manual.
// ══════════════════════════════════════════════════════
async function findChatId(channelId) {
  let attempts = 0;
  while(attempts < API_KEYS.length) {
    setStatus(`🔍 Buscando stream... (key ${keyIdx+1}/${API_KEYS.length})`, 'loading');
    try {
      const sRes = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=id&channelId=${channelId}&eventType=live&type=video&key=${API_KEYS[keyIdx]}`
      );
      const sData = await sRes.json();

      if(sData.error) {
        if(sData.error.code === 403 || sData.error.code === 429) {
          // Key agotada — rotar y reintentar automáticamente
          rotateKey();
          attempts++;
          continue;
        }
        throw new Error(sData.error.message);
      }

      if(!sData.items?.length) throw new Error('No hay stream en vivo activo');

      const videoId = sData.items[0].id.videoId;
      const vRes = await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEYS[keyIdx]}`
      );
      const vData = await vRes.json();
      const chatId = vData?.items?.[0]?.liveStreamingDetails?.activeLiveChatId;
      if(!chatId) throw new Error('No se pudo obtener el chat ID');

      // FIX 1: guardar con timestamp para detectar caché viejo al día siguiente
      localStorage.setItem(LS_CHATID, JSON.stringify({ id: chatId, ts: Date.now() }));
      return chatId;

    } catch(e) {
      if(attempts >= API_KEYS.length - 1) throw e;
      attempts++;
    }
  }
  throw new Error('Todas las keys agotadas al buscar stream');
}

// ══ connect — usa caché si existe, solo llama findChatId si es necesario ══
async function connect() {
  const channelId = document.getElementById('channelId').value.trim();
  if(!channelId) { setStatus('⚠️ Necesitas el Channel ID', 'err'); return; }

  document.getElementById('btnConnect').disabled = true;
  setBigStatus('', '');

  try {
    // ── FIX 1: Caché con TTL de 8h — evita usar el chatId del stream anterior ──
    let cachedId = null;
    try {
      const raw = localStorage.getItem(LS_CHATID);
      if(raw) {
        // Soporta formato viejo (string plano) y nuevo ({id, ts})
        const parsed = JSON.parse(raw);
        const id = parsed?.id || parsed;
        const ts = parsed?.ts || 0;
        const age = Date.now() - ts;
        if(typeof id === 'string' && id && age < CACHE_TTL) {
          cachedId = id;
        } else if(age >= CACHE_TTL) {
          localStorage.removeItem(LS_CHATID);
          setStatus('⚠️ Caché expirado (>8h) — buscando stream nuevo...', 'loading');
        }
      }
    } catch(e) { localStorage.removeItem(LS_CHATID); }

    if(cachedId) {
      ytChatId = cachedId;
      setStatus(`⚡ Chat ID en caché — key ${keyIdx+1}/${API_KEYS.length}`, 'loading');
    } else {
      // Primera vez o caché expirado: buscar stream (cuesta 100u)
      ytChatId = await findChatId(channelId);
    }

    localStorage.setItem('yt_channel_id', channelId);
    document.getElementById('savedCh').style.display = 'block';
    document.getElementById('dotYT').classList.add('on');
    connected = true;
    lastPollSuccess = Date.now();
    setBigStatus('🟢 CONECTADO — EN VIVO', 'ok');
    setConnectedUI();
    saveStatus(true);

    startPolling();
    connectKick();
    connectTwitch();
    startWatchdog();

  } catch(e) {
    setStatus('❌ ' + e.message, 'err');
    setBigStatus('❌ ' + e.message, 'err');
    document.getElementById('btnConnect').disabled = false;
  }
}

// ══ Polling — solo liveChat/messages (5u por llamada) ══
function startPolling() {
  if(pollTimer) clearTimeout(pollTimer);
  pollYouTube();
}

async function pollYouTube() {
  if(!ytChatId) return;
  try {
    const url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${ytChatId}&part=snippet,authorDetails&maxResults=2000&key=${API_KEYS[keyIdx]}${ytNextToken ? '&pageToken='+ytNextToken : ''}`;
    const res  = await fetch(url);
    const data = await res.json();

    if(data.error) {
      const reason = data.error.errors?.[0]?.reason || '';

      if(reason === 'quotaExceeded' || data.error.code === 403 || data.error.code === 429) {
        // Key agotada durante polling — rotar y reintentar en 2s
        rotateKey();
        pollTimer = setTimeout(pollYouTube, 2000);
        return;
      }

      if(reason === 'liveChatNotFound' || reason === 'liveChatEnded') {
        // Stream terminó — limpiar caché y detener
        localStorage.removeItem(LS_CHATID);
        lastMsgPublishedAt = ''; // FIX 2: resetear dedup al terminar stream
        ytChatId = null;
        connected = false;
        setConnectedUI(false);
        setBigStatus('⏹ Stream terminado', 'err');
        setStatus('⏹ Stream terminado — chat ID inválido', 'err');
        return;
      }

      // Otro error transitorio — reintentar en 5s
      pollTimer = setTimeout(pollYouTube, 5000);
      return;
    }

    // ── Éxito ──
    lastPollSuccess = Date.now();
    ytNextToken = data.nextPageToken || ytNextToken;
    document.getElementById('statKey').textContent = keyIdx + 1;
    setStatus(`🟢 YouTube activo — key ${keyIdx+1}/${API_KEYS.length}`, 'ok');
    setBigStatus('🟢 CONECTADO — EN VIVO', 'ok');
    setConnectedUI(true);
    saveStatus(true);

    // ── Procesar lote completo → un solo batch write ──
    const batch = [];
    for(const item of (data.items || [])) {
      const uid      = item.authorDetails?.channelId;
      const name     = item.authorDetails?.displayName || 'Usuario';
      const text     = item.snippet?.displayMessage || '';
      const isMember = !!(
        item.authorDetails?.isChatSponsor ||
        item.authorDetails?.isChatModerator ||
        item.authorDetails?.isChatOwner
      );
      if(!uid || !text) continue;

      // FIX 2: saltar mensajes ya procesados (duplicados por reconexión)
      const publishedAt = item.snippet?.publishedAt || '';
      if(publishedAt && publishedAt <= lastMsgPublishedAt) continue;
      if(publishedAt > lastMsgPublishedAt) lastMsgPublishedAt = publishedAt;

      batch.push({ userId:uid, username:name, text, src:'yt', isMember:!!isMember, ts:Date.now() });
    }
    if(batch.length) batchPushMessages(batch);

    // Respetar el intervalo que pide YouTube (mínimo 3s)
    const interval = Math.max(3000, data.pollingIntervalMillis || 3000);
    pollTimer = setTimeout(pollYouTube, interval);

  } catch(e) {
    pollTimer = setTimeout(pollYouTube, 5000);
  }
}

function rotateKey() {
  const prev = keyIdx;
  keyIdx = (keyIdx + 1) % API_KEYS.length;
  document.getElementById('statKey').textContent = keyIdx + 1;
  setStatus(`⚠️ Key ${prev+1} agotada → rotando a key ${keyIdx+1}`, 'loading');
  saveStatus(connected);
}

// ══ Watchdog — reconexión LIGERA (sin llamar search) ══
function startWatchdog() {
  if(reconnectTimer) clearInterval(reconnectTimer);
  reconnectTimer = setInterval(() => {
    if(!connected) return;
    const elapsed = Date.now() - lastPollSuccess;
    if(elapsed > 60000) {
      setBigStatus('⚠️ Sin actividad — reconectando...', 'err');
      setStatus('⚠️ Reconectando automáticamente...', 'loading');
      // Reconexión ligera: no llama a search, solo reinicia el polling
      lightReconnect();
    }
  }, 15000);
}

// lightReconnect — solo reinicia el poll con el chatId existente (0 unidades extra)
function lightReconnect() {
  if(pollTimer) clearTimeout(pollTimer);
  ytNextToken = '';
  lastPollSuccess = Date.now(); // resetear para evitar loop de watchdog
  if(ytChatId) {
    setStatus('🔄 Reiniciando polling...', 'loading');
    pollYouTube();
  } else {
    // No hay chatId, necesitamos búsqueda completa
    forceReconnect();
  }
}

// forceReconnect — botón manual ↺, borra caché y busca stream de nuevo
function forceReconnect() {
  if(pollTimer) clearTimeout(pollTimer);
  ytNextToken = '';
  ytChatId = null;
  lastMsgPublishedAt = ''; // FIX 2: nuevo stream = reset dedup
  localStorage.removeItem(LS_CHATID); // forzar nueva búsqueda
  document.getElementById('btnConnect').disabled = false;
  connect();
}

function togglePower() {
  if(connected) {
    connected = false;
    ytChatId = null;
    if(pollTimer) clearTimeout(pollTimer);
    if(reconnectTimer) clearInterval(reconnectTimer);
    if(twitchWs) { try{ twitchWs.close(); }catch(e){} twitchWs = null; }
    if(twitchReconnectTimer) { clearTimeout(twitchReconnectTimer); twitchReconnectTimer = null; }
    document.getElementById('dotYT').classList.remove('on');
    document.getElementById('dotKick').classList.remove('on');
    document.getElementById('dotTwitch').classList.remove('on');
    setConnectedUI(false);
    setBigStatus('', '');
    setStatus('Desconectado', '');
    localStorage.setItem(LS_STATUS, JSON.stringify({
      ytConnected: false, kickConnected: false, twitchConnected: false, keyIdx, ts: Date.now()
    }));
    // NO borramos LS_CHATID al desconectar — lo reutilizamos al reconectar
  } else {
    connect();
  }
}

function setConnectedUI(on = true) {
  const btn  = document.getElementById('powerBtn');
  const text = document.getElementById('powerText');
  if(on) {
    btn.className  = 'power-btn on';
    text.textContent = 'CONECTADO — Toca para desconectar';
  } else {
    btn.className  = 'power-btn off';
    text.textContent = 'DESCONECTADO — Toca para conectar';
  }
}

// ══ Kick ══
function connectKick() {
  try {
    Pusher.logToConsole = false;
    const pusher  = new Pusher('32cbd69e4b950bf97679', { cluster:'us2', forceTLS:true, disableStats:true });
    const channel = pusher.subscribe(`chatrooms.${KICK_ROOM_ID}.v2`);
    channel.bind('pusher:subscription_succeeded', () => {
      document.getElementById('dotKick').classList.add('on');
      saveStatus(connected);
    });
    channel.bind('App\\Events\\ChatMessageEvent', (data) => {
      const uid   = 'kick_' + (data?.sender?.id || '');
      const name  = data?.sender?.username || 'Usuario';
      const text  = data?.content || '';
      const isSub = !!(data?.sender?.subscribed_for > 0 || data?.sender?.is_subscribed);
      pushMessage(uid, name, text, 'kick', isSub);
    });
  } catch(e) {}
}

// ══ Twitch IRC (WebSocket anónimo — no requiere API key ni OAuth) ══
function connectTwitch() {
  if(twitchReconnectTimer){ clearTimeout(twitchReconnectTimer); twitchReconnectTimer=null; }
  if(twitchWs){ try{ twitchWs.close(); }catch(e){} }

  try {
    const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
    twitchWs = ws;

    ws.onopen = () => {
      // Solicitar tags para obtener info de suscriptores
      ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
      // Login anónimo — no requiere cuenta ni token
      ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
      ws.send(`JOIN #${TWITCH_CHANNEL}`);
    };

    ws.onmessage = (e) => {
      const raw = e.data.trim();

      // Responder PING para mantener la conexión viva
      if(raw.startsWith('PING')) {
        ws.send('PONG :tmi.twitch.tv');
        return;
      }

      // Confirmar que el JOIN fue exitoso
      if(raw.includes(`JOIN #${TWITCH_CHANNEL}`)) {
        document.getElementById('dotTwitch').classList.add('on');
        saveStatus(connected);
        return;
      }

      // Solo procesar PRIVMSG (mensajes del chat)
      if(!raw.includes('PRIVMSG')) return;

      // Parsear tags de Twitch (subscriber, badges, etc.)
      let tags = {};
      if(raw.startsWith('@')) {
        const tagEnd = raw.indexOf(' ');
        raw.slice(1, tagEnd).split(';').forEach(tag => {
          const eq = tag.indexOf('=');
          if(eq > -1) tags[tag.slice(0,eq)] = tag.slice(eq+1);
        });
      }

      // Extraer username y mensaje
      // Formato: @tags :username!username@username.tmi.twitch.tv PRIVMSG #canal :mensaje
      const match = raw.match(/:(\w+)!\w+@\w+\.tmi\.twitch\.tv PRIVMSG #\w+ :(.+)$/);
      if(!match) return;

      const username = match[1];
      const text     = match[2].trim();
      if(!text || !username) return;

      // Detectar suscriptores por tags
      const isSub = tags['subscriber'] === '1' ||
                    (tags['badges'] || '').includes('subscriber') ||
                    (tags['badges'] || '').includes('founder');

      pushMessage('twitch_' + username, username, text, 'twitch', isSub);
    };

    ws.onclose = () => {
      document.getElementById('dotTwitch').classList.remove('on');
      saveStatus(connected);
      // Reconectar automáticamente si seguimos conectados
      if(connected) {
        twitchReconnectTimer = setTimeout(connectTwitch, 5000);
      }
    };

    ws.onerror = () => { ws.close(); };

  } catch(e) {
    if(connected) twitchReconnectTimer = setTimeout(connectTwitch, 8000);
  }
}

function setBigStatus(msg, type) {
  const el = document.getElementById('bigStatus');
  el.textContent = msg;
  el.className   = type || '';
}

function setStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className   = 'status-bar ' + (type || '');
}

// ══ Init ══
(function() {
  keyIdx = 0; // siempre empezar desde key 1
  const c = localStorage.getItem('yt_channel_id') || '';
  if(c) {
    document.getElementById('channelId').value = c;
    document.getElementById('savedCh').style.display = 'block';
  }
  // FIX 1: mostrar estado real del caché al cargar
  try {
    const raw = localStorage.getItem(LS_CHATID);
    if(raw) {
      const parsed = JSON.parse(raw);
      const ts  = parsed?.ts || 0;
      const age = Date.now() - ts;
      if(age < CACHE_TTL) {
        const mins = Math.round(age / 60000);
        setStatus(`⚡ Chat ID en caché (hace ${mins}min) — toca para conectar`, 'loading');
      } else {
        setStatus('⚠️ Caché expirado — se buscará stream nuevo al conectar', 'loading');
      }
    }
  } catch(e) { localStorage.removeItem(LS_CHATID); }
})();
</script>
