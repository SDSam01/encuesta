<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poll Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:100vw;height:100vh;}

#widget{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(10px);
  width:440px;
  opacity:0;
  transition:opacity .5s ease, transform .5s ease;
  pointer-events:none;
}
#widget.visible{opacity:1;transform:translateX(-50%) translateY(0);}

.w-header{text-align:center;margin-bottom:8px;}
.w-timer{
  font-family:'Bebas Neue',sans-serif;
  font-size:38px;color:#fff;letter-spacing:3px;line-height:1;
  text-shadow:0 0 20px rgba(255,255,255,.8),0 0 40px rgba(255,255,255,.3);
  display:none;
}
.w-timer.urgent{color:#ff3333;text-shadow:0 0 20px rgba(255,50,50,1),0 0 50px rgba(255,50,50,.6);animation:tblink .45s infinite;}
@keyframes tblink{0%,100%{opacity:1;}50%{opacity:.2;}}
.w-question{
  font-family:'Bebas Neue',sans-serif;
  font-size:17px;color:rgba(255,255,255,.6);
  letter-spacing:2px;margin-top:4px;
}

.w-box{
  position:relative;height:120px;border-radius:14px;
  overflow:hidden;
  background:rgba(6,6,10,0.65);
  box-shadow:0 12px 48px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.05);
}

#fillB{
  position:absolute;inset:0;
  background:rgba(55,2,2,0.98);
  box-shadow:inset -60px 0 100px rgba(80,0,0,.5), 0 0 40px rgba(60,0,0,.3);
  z-index:1;
}
#fillA{
  position:absolute;top:0;left:0;bottom:0;
  background:rgba(255,145,20,0.74);
  transition:width 1.4s cubic-bezier(.25,.46,.45,.94);
  will-change:width;
  transform:translateZ(0);
  z-index:2;
}

#glowOverlay{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:transparent;
  transition:box-shadow 1s ease;
}

.w-box.winner-mode #fillA,
.w-box.winner-mode #fillB{opacity:0;transition:opacity .5s;}
.w-box.winner-mode #glowOverlay{opacity:0;}

.w-content{
  position:absolute;inset:0;display:flex;z-index:2;
  transition:opacity .5s;
}
.w-box.winner-mode .w-content{opacity:0;}

.w-side{
  flex:1;display:flex;flex-direction:column;
  justify-content:center;padding:10px 18px;min-width:0;
}
.w-side-b{align-items:flex-end;text-align:right;}

.w-label{
  font-family:'Bebas Neue',sans-serif;font-size:12px;
  letter-spacing:2px;color:rgba(255,255,255,.45);margin-bottom:2px;
}
.w-name{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;color:#fff;line-height:1;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
  transition:text-shadow .5s;
}
.w-name.win{text-shadow:0 0 20px rgba(255,255,255,.7),0 0 40px rgba(255,255,255,.3);}

.w-pct{
  font-family:'Bebas Neue',sans-serif;font-size:56px;
  color:#fff;letter-spacing:-1px;line-height:1;
  transition:font-size .5s ease,opacity .5s,text-shadow .5s;
}
.w-pct.win{
  font-size:64px;
  text-shadow:0 0 24px rgba(255,255,255,.8),0 0 50px rgba(255,255,255,.35);
}
.w-pct.lose{font-size:42px;opacity:.5;}

.w-votes-txt{
  font-size:11px;color:rgba(255,255,255,.4);
  font-weight:700;letter-spacing:.5px;margin-top:3px;
  font-family:'Inter',sans-serif;
}

.w-total{
  text-align:center;font-size:11px;
  color:rgba(255,255,255,.3);font-weight:700;
  letter-spacing:1px;margin-top:6px;
  font-family:'Inter',sans-serif;
}

/* ══ Multi-option layout (3-4 opciones) ══ */
#wBoxMulti{
  position:relative;border-radius:14px;overflow:hidden;
  background:rgba(6,6,10,0.65);
  box-shadow:0 12px 48px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.05);
  display:none;
}
.w-multi-bar{height:50px;display:flex;width:100%;overflow:hidden;border-radius:14px 14px 0 0;}
.w-multi-seg{height:100%;transition:width 1.2s cubic-bezier(.25,.46,.45,.94);will-change:width;}
.w-multi-labels{display:flex;width:100%;}
.w-multi-label{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border-right:1px solid rgba(255,255,255,.04);}
.w-multi-label:last-child{border-right:none;}
.w-multi-key{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:1px;}
.w-multi-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;text-align:center;line-height:1;}
.w-multi-pct{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#fff;letter-spacing:-1px;line-height:1;margin-top:2px;transition:font-size .4s,text-shadow .4s;}
.w-multi-pct.win{font-size:38px;text-shadow:0 0 20px rgba(255,255,255,.8);}
.w-multi-pct.lose{font-size:22px;opacity:.4;}
.w-multi-votes{font-size:10px;color:rgba(255,255,255,.35);font-family:'Inter',sans-serif;font-weight:700;}

.w-remontada{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.85);
  background:rgba(4,4,8,.95);border:1px solid rgba(255,208,0,.5);
  border-radius:10px;padding:7px 20px;text-align:center;z-index:10;
  opacity:0;transition:opacity .35s,transform .35s;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 0 20px rgba(255,208,0,.2);
}
.w-remontada.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.w-rem-title{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  color:#FFD000;letter-spacing:2px;
  text-shadow:0 0 12px rgba(255,208,0,.8);
}
.w-rem-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:1px;text-transform:uppercase;}

.w-winner-overlay{
  position:absolute;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  opacity:0;transition:opacity .6s;pointer-events:none;
}
.w-winner-overlay.show{opacity:1;}
#confettiCanvas{
  position:absolute;inset:0;z-index:0;width:100%;height:100%;
  opacity:0;transition:opacity .5s;
}
.w-winner-overlay.show #confettiCanvas{opacity:1;}
.w-winner-bg{
  position:absolute;inset:0;z-index:1;
  opacity:0;transition:opacity .7s;
}
.w-winner-overlay.show .w-winner-bg{opacity:.65;}
.w-winner-content{position:relative;z-index:2;text-align:center;}
.w-winner-label{
  font-family:'Bebas Neue',sans-serif;font-size:12px;
  letter-spacing:4px;color:rgba(255,255,255,.5);
}
.w-winner-name{
  font-family:'Bebas Neue',sans-serif;font-size:60px;
  letter-spacing:3px;color:#fff;line-height:1;
  text-shadow:0 0 40px rgba(255,255,255,.5),0 2px 20px rgba(0,0,0,.8);
  animation:winPulse 1.4s ease-in-out infinite alternate;
}
@keyframes winPulse{from{transform:scale(1);}to{transform:scale(1.04);}}
.w-winner-pct{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  color:rgba(255,255,255,.6);letter-spacing:2px;margin-top:2px;
}
@keyframes comodinWin{
  from{box-shadow:0 0 0 rgba(255,208,0,0);border-color:rgba(255,208,0,.55);}
  to{box-shadow:0 0 18px rgba(255,208,0,.6),0 0 6px rgba(255,208,0,.4);border-color:rgba(255,208,0,.9);}
}
</style>
</head>
<body>

<div id="widget">
  <div class="w-header">
    <div class="w-timer" id="wTimer">30s</div>
    <div class="w-question" id="wQuestion">¿Qué eligen?</div>
  </div>

  <div class="w-box" id="wBox">
    <div id="fillA"></div>
    <div id="fillB"></div>
    <div id="glowOverlay"></div>

    <div class="w-content">
      <div class="w-side">
        <div class="w-label">A</div>
        <div class="w-name" id="wNameA">HOMER</div>
        <div class="w-pct" id="wPctA">50%</div>
        <div class="w-votes-txt" style="display:none"><span id="wVotesA">0</span> votos</div>
      </div>
      <div class="w-side w-side-b">
        <div class="w-label">B</div>
        <div class="w-name" id="wNameB">BART</div>
        <div class="w-pct" id="wPctB">50%</div>
        <div class="w-votes-txt" style="display:none"><span id="wVotesB">0</span> votos</div>
      </div>
    </div>

    <div class="w-remontada" id="wRemontada">
      <div class="w-rem-title">⚡ REMONTADA</div>
      <div class="w-rem-sub" id="wRemSub">A ESTÁ SUBIENDO</div>
    </div>

    <div class="w-winner-overlay" id="wWinner">
      <canvas id="confettiCanvas"></canvas>
      <div class="w-winner-bg" id="wWinnerBg"></div>
      <div class="w-winner-content">
        <div class="w-winner-label">GANADOR</div>
        <div class="w-winner-name" id="wWinnerName">HOMER</div>
        <div class="w-winner-pct" id="wWinnerPct">56%</div>
      </div>
    </div>
  </div>

  <div class="w-total" id="wTotal" style="display:none">0 votos totales</div>

  <!-- Layout multi-opción (3-4 opciones) -->
  <div id="wBoxMulti">
    <div class="w-multi-bar" id="wMultiBar"></div>
    <div class="w-multi-labels" id="wMultiLabels"></div>
  </div>
</div>

<script>
const LS='poll_state';
let prevLeader=null, prevDiff=0, lastPA=-1;
let remTimeout=null, winnerShown=false, lastTimerEnd=0;
let confettiRAF=null, confettiParticles=[];
let confettiStopTimer=null;
let lastVoteCount=0, lastTimerSec=999;
// FIX: primera render sin animación (evita flash de 0% → X% al recargar en OBS)
let firstRender=true;
// FIX: cooldown para remontada (evita spam del popup)
let remCooldown=false;

// ══ FIX: AudioContext lazy con unlock periódico ══
// Problema: en el CEF de OBS, AudioContext arranca suspendido sin click del usuario
// Solución: crearlo lazy y llamar resume() periódicamente hasta que esté running
let _pac=null;
function getAC(){
  if(!_pac){
    try{ _pac=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(_pac.state!=='running'){
    _pac.resume().catch(()=>{});
  }
  return _pac;
}
// Intentar desbloquear cada 1s hasta que esté running
const _audioUnlocker=setInterval(()=>{
  const ac=getAC();
  if(ac&&ac.state==='running') clearInterval(_audioUnlocker);
}, 1000);

function startConfetti(color){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
  const colors=color==='#FF9114'
    ?['#FF9114','#FFB800','#FF7A00','#FFD000','#ffffff','#FF5500']
    :['#3B0202','#6B0000','#8B0000','#FF2200','#ffffff','#CC0000'];
  confettiParticles=Array.from({length:80},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
    w:Math.random()*8+3, h:Math.random()*4+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    speed:Math.random()*2+1, angle:Math.random()*Math.PI*2,
    spin:(Math.random()-.5)*.15, wobble:Math.random()*.05,
    opacity:Math.random()*.5+.5,
  }));
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettiParticles.forEach(p=>{
      p.y+=p.speed; p.angle+=p.spin;
      p.x+=Math.sin(p.angle*3)*p.wobble*20;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.globalAlpha=p.opacity; ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      if(p.y>canvas.height+10){ p.y=-10; p.x=Math.random()*canvas.width; }
    });
    confettiRAF=requestAnimationFrame(loop);
  }
  if(confettiRAF) cancelAnimationFrame(confettiRAF);
  loop();

  // FIX: auto-detener confeti después de 30s para no quemar GPU indefinidamente
  if(confettiStopTimer) clearTimeout(confettiStopTimer);
  confettiStopTimer=setTimeout(stopConfetti, 30000);
}

function stopConfetti(){
  if(confettiStopTimer){ clearTimeout(confettiStopTimer); confettiStopTimer=null; }
  if(confettiRAF){ cancelAnimationFrame(confettiRAF); confettiRAF=null; }
  const c=document.getElementById('confettiCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function showWinner(s,votes,names,colors,total){
  if(!total) return;
  const numOpts=s.numOpts||2;
  const maxV=Math.max(...votes.slice(0,numOpts));
  const winIdx=votes.indexOf(maxV);
  const winName=(names[winIdx]||'?').toUpperCase();
  const winPct=Math.round(maxV/total*100);
  const winColor=colors[winIdx];
  document.getElementById('wWinnerName').textContent=winName;
  document.getElementById('wWinnerPct').textContent=winPct+'%';
  document.getElementById('wWinnerBg').style.background=winColor;
  document.getElementById('wBox').classList.add('winner-mode');
  document.getElementById('wWinner').classList.add('show');
  startConfetti(winColor);
}

function hideWinner(){
  document.getElementById('wBox').classList.remove('winner-mode');
  document.getElementById('wWinner').classList.remove('show');
  stopConfetti();winnerShown=false;
}

const COLORS=['rgba(255,145,20,0.74)','rgba(55,2,2,0.98)','rgba(68,136,255,0.75)','rgba(74,222,128,0.75)'];

function render(s){
  const numOpts=s.numOpts||2;
  const votes=[s.vA||0,s.vB||0,s.vC||0,s.vD||0].slice(0,numOpts);
  const names=[s.nameA||'A',s.nameB||'B',s.nameC||'C',s.nameD||'D'].slice(0,numOpts);
  const total=votes.reduce((a,b)=>a+b,0);
  document.getElementById('wQuestion').textContent=s.question||'¿Qué eligen?';
  document.getElementById('wTotal').textContent=total+(total===1?' voto total':' votos totales');
  if(total>lastVoteCount&&total>0){lastVoteCount=total;playVoteSound(votes[0],votes[1]||0);}
  const box2=document.getElementById('wBox');
  const boxM=document.getElementById('wBoxMulti');
  if(numOpts===2){box2.style.display='';boxM.style.display='none';renderTwo(s,total,votes,names);}
  else if(numOpts===9){
    box2.style.display='none';boxM.style.display='block';
    const numVotes=[];
    for(let i=1;i<=9;i++) numVotes.push(s['v'+i]||0);
    renderMulti(numVotes,[],Object.values(s).reduce((a,v)=>typeof v==='number'?a:a,0),9);
    const t9=numVotes.reduce((a,v)=>a+v,0);
    renderMulti(numVotes,[],t9,9);
  }
  else{box2.style.display='none';boxM.style.display='block';renderMulti(votes,names,total,numOpts);}
  const timerEl=document.getElementById('wTimer');
  if(s.timerEnd&&s.timerEnd>0){
    const rem=Math.max(0,Math.ceil((s.timerEnd-Date.now())/1000));
    if(rem>0){
      timerEl.style.display='block';timerEl.textContent=rem+'s';
      timerEl.className='w-timer'+(rem<=10?' urgent':'');
      if(rem!==lastTimerSec){lastTimerSec=rem;if(rem<=10)playCountdown(rem);}
      if(winnerShown&&s.timerEnd!==lastTimerEnd)hideWinner();
    } else {
      timerEl.style.display='none';
      if(!winnerShown){winnerShown=true;lastTimerEnd=s.timerEnd;showWinner(s,votes,names,COLORS,total);if(total>0)playWinner(votes[0]>=Math.max(...votes));}
    }
  } else {timerEl.style.display='none';if(winnerShown)hideWinner();}
}

function renderTwo(s,total,votes,names){
  const vA=votes[0],vB=votes[1];
  const pA=total===0?50:Math.round(vA/total*100),pB=100-pA;
  document.getElementById('wNameA').textContent=names[0].toUpperCase();
  document.getElementById('wNameB').textContent=names[1].toUpperCase();
  document.getElementById('wPctA').textContent=pA+'%';document.getElementById('wPctB').textContent=pB+'%';
  document.getElementById('wVotesA').textContent=vA;document.getElementById('wVotesB').textContent=vB;
  if(pA!==lastPA){lastPA=pA;const fillA=document.getElementById('fillA');
    if(firstRender){firstRender=false;fillA.style.transition='none';fillA.style.width=pA+'%';requestAnimationFrame(()=>{fillA.style.transition='width 1.4s cubic-bezier(.25,.46,.45,.94)';});}
    else fillA.style.width=pA+'%';}
  const glow=document.getElementById('glowOverlay');
  if(pA>pB)glow.style.boxShadow='inset 100px 0 120px rgba(255,145,20,.25),inset -30px 0 60px rgba(55,2,2,.15)';
  else if(pB>pA)glow.style.boxShadow='inset -100px 0 120px rgba(55,2,2,.3),inset 30px 0 60px rgba(255,145,20,.12)';
  else glow.style.boxShadow='none';
  const pctA=document.getElementById('wPctA'),pctB=document.getElementById('wPctB');
  const nameA=document.getElementById('wNameA'),nameB=document.getElementById('wNameB');
  if(total===0){pctA.className='w-pct';pctB.className='w-pct';nameA.className='w-name';nameB.className='w-name';}
  else if(pA>pB){pctA.className='w-pct win';pctB.className='w-pct lose';nameA.className='w-name win';nameB.className='w-name';}
  else if(pB>pA){pctB.className='w-pct win';pctA.className='w-pct lose';nameB.className='w-name win';nameA.className='w-name';}
  else{pctA.className='w-pct';pctB.className='w-pct';nameA.className='w-name';nameB.className='w-name';}
  const leader=pA>pB?'a':pA<pB?'b':null,diff=Math.abs(pA-pB);
  if(total>=10&&prevLeader&&leader&&leader!==prevLeader&&prevDiff>=15&&!remCooldown){
    remCooldown=true;const nm=(leader==='a'?names[0]:names[1]).toUpperCase();
    document.getElementById('wRemSub').textContent=nm+' ESTÁ SUBIENDO';
    const rem=document.getElementById('wRemontada');rem.classList.add('show');
    if(remTimeout)clearTimeout(remTimeout);
    remTimeout=setTimeout(()=>{rem.classList.remove('show');setTimeout(()=>{remCooldown=false;},10000);},3500);}
  prevLeader=leader;prevDiff=diff;
}

function renderMulti(votes,names,total,numOpts){
  // Modo comodines (9 opciones) — grid 3x3 dorado
  if(numOpts===9){
    renderComodinGrid(votes,total);
    return;
  }

  const pcts=votes.map(v=>total===0?Math.round(100/numOpts):Math.round(v/total*100));
  const maxPct=Math.max(...pcts);const keys=['A','B','C','D'];
  const bar=document.getElementById('wMultiBar'),labels=document.getElementById('wMultiLabels');
  if(bar.children.length!==numOpts){
    bar.innerHTML='';
    pcts.forEach((p,i)=>{const d=document.createElement('div');d.className='w-multi-seg';d.style.background=COLORS[i];d.style.width=p+'%';bar.appendChild(d);});
  } else Array.from(bar.children).forEach((seg,i)=>seg.style.width=pcts[i]+'%');
  if(labels.children.length!==numOpts){
    labels.innerHTML='';
    pcts.forEach((p,i)=>{const isWin=p===maxPct&&total>0;const div=document.createElement('div');div.className='w-multi-label';
      div.innerHTML=`<div class="w-multi-key">${keys[i]}</div><div class="w-multi-name">${(names[i]||keys[i]).toUpperCase()}</div><div class="w-multi-pct ${total===0?'':isWin?'win':'lose'}" id="mpct${i}">${p}%</div><div class="w-multi-votes" id="mvotes${i}" style="display:none">${votes[i]} votos</div>`;
      labels.appendChild(div);});
  } else {pcts.forEach((p,i)=>{const isWin=p===maxPct&&total>0;
    const pe=document.getElementById('mpct'+i),ve=document.getElementById('mvotes'+i);
    if(pe){pe.textContent=p+'%';pe.className='w-multi-pct '+(total===0?'':isWin?'win':'lose');}
    if(ve)ve.textContent=votes[i]+' votos';});}
}

function renderComodinGrid(votes,total){
  const labels=document.getElementById('wMultiLabels');
  const bar=document.getElementById('wMultiBar');
  bar.style.display='none';
  labels.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;';
  const maxV=Math.max(...votes,1);

  if(labels.children.length!==9){
    labels.innerHTML='';
    for(let i=0;i<9;i++){
      const v=votes[i]||0;
      const pct=total===0?0:Math.round(v/total*100);
      const isWin=v===maxV&&total>0;
      const div=document.createElement('div');
      div.style.cssText=`text-align:center;background:rgba(255,208,0,${isWin?.14:.05});border:1px solid rgba(255,208,0,${isWin?.55:.18});border-radius:10px;padding:8px 4px;transition:background .5s,border-color .5s;overflow:hidden;position:relative;${isWin&&total>0?'animation:comodinWin 1s ease-in-out infinite alternate;':''}` ;
      // Barra de fondo animada
      div.innerHTML=`
        <div id="cgbar${i}" style="position:absolute;bottom:0;left:0;width:100%;background:rgba(255,208,0,${isWin?.12:.04});height:${pct}%;transition:height 1.2s cubic-bezier(.25,.46,.45,.94);"></div>
        <div style="position:relative;z-index:1;">
          <div style="font-size:22px;font-weight:900;color:#FFD000;font-family:'Bebas Neue',sans-serif;line-height:1;">${i+1}</div>
          <div style="font-size:10px;color:rgba(255,255,255,.4);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-top:2px;">Carta</div>
          <div id="cgpct${i}" style="font-size:20px;font-weight:900;font-family:'Bebas Neue',sans-serif;color:${isWin?'#FFD000':'rgba(255,255,255,.5)'};margin-top:4px;transition:color .5s;">${pct}%</div>
        </div>`;
      labels.appendChild(div);
    }
  } else {
    Array.from(labels.children).forEach((div,i)=>{
      const v=votes[i]||0;
      const pct=total===0?0:Math.round(v/total*100);
      const isWin=v===maxV&&total>0;
      div.style.background=`rgba(255,208,0,${isWin?.14:.05})`;
      div.style.borderColor=`rgba(255,208,0,${isWin?.55:.18})`;
      div.style.animation=isWin&&total>0?'comodinWin 1s ease-in-out infinite alternate':''  ;
      const barEl=div.querySelector(`#cgbar${i}`);
      if(barEl){barEl.style.height=pct+'%';barEl.style.background=`rgba(255,208,0,${isWin?.12:.04})`;}
      const pctEl=div.querySelector(`#cgpct${i}`);
      if(pctEl){pctEl.textContent=pct+'%';pctEl.style.color=isWin?'#FFD000':'rgba(255,255,255,.5)';}
    });
  }
}



// ══ Audio Engine ══
function playVoteSound(pA,pB){
  const ac=getAC(); if(!ac) return;
  const t=ac.currentTime;
  const isA=pA>=pB;
  const freq=isA?880:660;
  const o=ac.createOscillator();
  const g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type='sine';
  o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(freq*1.2,t+0.04);
  g.gain.setValueAtTime(0.12,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.start(t); o.stop(t+0.12);
}

function playCountdown(sec){
  const ac=getAC(); if(!ac) return;
  const t=ac.currentTime;
  if(sec<=5){
    const o=ac.createOscillator();
    const g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='square';
    o.frequency.value=sec===1?1200:800;
    g.gain.setValueAtTime(0.2,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.start(t); o.stop(t+0.1);
  } else if(sec===10){
    [600,800].forEach((freq,i)=>{
      const o=ac.createOscillator();
      const g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type='sine'; o.frequency.value=freq;
      const st=t+i*0.12;
      g.gain.setValueAtTime(0.18,st);
      g.gain.exponentialRampToValueAtTime(0.001,st+0.15);
      o.start(st); o.stop(st+0.15);
    });
  }
}

function playWinner(isA){
  const ac=getAC(); if(!ac) return;
  const t=ac.currentTime;
  const baseFreq=isA?523:392;
  [1,1.25,1.5,2].forEach((mult,i)=>{
    const o=ac.createOscillator();
    const g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='triangle'; o.frequency.value=baseFreq*mult;
    const st=t+i*0.1;
    g.gain.setValueAtTime(0.25,st);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.3);
    o.start(st); o.stop(st+0.3);
  });
  const sub=ac.createOscillator();
  const subG=ac.createGain();
  sub.connect(subG); subG.connect(ac.destination);
  sub.type='sine'; sub.frequency.value=80;
  subG.gain.setValueAtTime(0.4,t);
  subG.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  sub.start(t); sub.stop(t+0.3);
}

setInterval(()=>{
  try{
    const raw=localStorage.getItem(LS);
    if(!raw) return;
    const s=JSON.parse(raw);
    const w=document.getElementById('widget');
    if(s.active){ w.classList.add('visible'); render(s); }
    else{ w.classList.remove('visible'); hideWinner(); }
  }catch(e){}
},500);
</script>
