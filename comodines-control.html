<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comodines Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:'Inter',sans-serif;color:#fff;padding:12px;max-width:500px;}
h1{font-size:13px;font-weight:700;margin-bottom:2px;color:#FFD000;}
.sub{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:12px;}

/* Holders */
.holders{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.holder{background:rgba(255,255,255,.04);border-radius:10px;padding:10px;border:1px solid rgba(255,208,0,.15);}
.holder-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#FFD000;margin-bottom:6px;}
.holder.chat-h .holder-title{color:#F59E0B;}
.holder-card{background:rgba(255,208,0,.06);border-radius:7px;padding:7px 8px;border-left:3px solid #FFD000;}
.holder.chat-h .holder-card{border-left-color:#F59E0B;}
.holder-card-name{font-size:11px;font-weight:700;color:#fff;margin-bottom:2px;}
.holder-card-desc{font-size:9px;color:rgba(255,255,255,.45);line-height:1.4;}
.holder-card-rarity{font-size:8px;letter-spacing:2px;font-weight:700;margin-top:4px;}
.comun{color:#4ade80;}.raro{color:#FFD000;}.epico{color:#c084fc;}

/* Botones principales */
.btn-sorteo{
  width:100%;padding:10px;border-radius:9px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;
  background:rgba(255,208,0,.15);border:1px solid rgba(255,208,0,.5);color:#FFD000;
  margin-bottom:8px;transition:.15s;
}
.btn-sorteo:hover{background:rgba(255,208,0,.25);}

/* Selectores */
.selector{display:none;border-radius:9px;padding:9px;margin-bottom:8px;border:1px solid;}
.selector.show{display:block;}
.selector.sam-sel{background:rgba(255,208,0,.05);border-color:rgba(255,208,0,.25);}
.selector.chat-sel{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.25);}
.sel-title{font-size:9px;letter-spacing:2px;font-weight:700;margin-bottom:6px;}
.sam-sel .sel-title{color:rgba(255,208,0,.7);}
.chat-sel .sel-title{color:rgba(245,158,11,.7);}
.num-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
.num-btn{
  padding:6px 2px;border-radius:5px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;
  background:rgba(255,208,0,.1);border:1px solid rgba(255,208,0,.25);
  color:#FFD000;transition:.15s;text-align:center;
}
.chat-sel .num-btn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.25);color:#F59E0B;}
.num-btn:hover:not(:disabled){background:rgba(255,208,0,.3);}
.chat-sel .num-btn:hover:not(:disabled){background:rgba(245,158,11,.3);}
.num-btn:disabled{opacity:.25;cursor:not-allowed;}

/* Botones acción */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.btn-a{
  padding:8px 6px;border-radius:8px;font-size:10px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;border:1px solid;
  transition:.15s;text-align:center;
}
.btn-a:disabled{opacity:.3;cursor:not-allowed;}
.btn-a:not(:disabled):hover{opacity:.8;}
.btn-rev-sam{background:rgba(255,208,0,.1);border-color:rgba(255,208,0,.4);color:#FFD000;}
.btn-rev-chat{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);color:#F59E0B;}
.btn-act-sam{background:rgba(255,208,0,.18);border-color:rgba(255,208,0,.6);color:#FFD000;}
.btn-act-chat{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.6);color:#F59E0B;}
.btn-close{background:rgba(255,180,0,.08);border-color:rgba(255,180,0,.3);color:rgba(255,180,0,.7);grid-column:1/-1;}
.btn-hide{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4);grid-column:1/-1;font-size:10px;}
.btn-emergency{background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.35);color:rgba(255,100,100,.8);grid-column:1/-1;font-size:10px;}

/* Referencia — sin números ni orden */
.section-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:6px;}
.ref-note{font-size:9px;color:rgba(255,208,0,.4);margin-bottom:8px;font-style:italic;}
.ref-grid{display:flex;flex-direction:column;gap:5px;}
.ref-row{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;padding:8px 10px;
}
.ref-emoji{font-size:18px;line-height:1.3;min-width:24px;}
.ref-info{flex:1;}
.ref-name{font-size:11px;font-weight:700;color:#fff;margin-bottom:2px;}
.ref-desc{font-size:9px;color:rgba(255,255,255,.45);line-height:1.4;}
.ref-rar{font-size:7px;letter-spacing:3px;font-weight:700;margin-top:3px;}

.status{font-size:10px;text-align:center;color:rgba(255,255,255,.3);padding:5px;min-height:18px;}
.status.ok{color:#FFD000;}.status.err{color:#f87171;}
</style>
</head>
<body>
<h1>🃏 Comodines Control</h1>
<div class="sub">Solo visible para Sam — el mazo se mezcla diferente cada stream</div>

<!-- Quién tiene qué -->
<div class="holders">
  <div class="holder">
    <div class="holder-title">⚔️ Tu carta</div>
    <div id="samHolderContent"><span style="color:rgba(255,255,255,.2);font-size:10px;">Sin carta</span></div>
  </div>
  <div class="holder chat-h">
    <div class="holder-title">💬 Carta del Chat</div>
    <div id="chatHolderContent"><span style="color:rgba(255,255,255,.2);font-size:10px;">Sin carta</span></div>
  </div>
</div>

<!-- Iniciar sorteo -->
<button class="btn-sorteo" onclick="iniciarSorteo()">🃏 Iniciar sorteo — mostrar cartas en stream</button>

<!-- Selector Sam -->
<div class="selector sam-sel" id="samSelector">
  <div class="sel-title">⚔️ SAM — elige tu carta (1-9):</div>
  <div class="num-grid" id="samNumGrid"></div>
</div>

<!-- Selector Chat -->
<div class="selector chat-sel" id="chatSelector">
  <div class="sel-title">💬 CHAT — asigna la carta que votó (1-9):</div>
  <div class="num-grid" id="chatNumGrid"></div>
</div>

<!-- Acciones -->
<div class="action-grid">
  <button class="btn-a btn-rev-sam" id="btnRevSam" disabled onclick="revelarSam()">🟡 Revelar carta Sam</button>
  <button class="btn-a btn-rev-chat" id="btnRevChat" disabled onclick="revelarChat()">🟠 Revelar carta Chat</button>
  <button class="btn-a btn-act-sam" id="btnActSam" disabled onclick="activar('sam')">⚡ Activar comodín Sam</button>
  <button class="btn-a btn-act-chat" id="btnActChat" disabled onclick="activar('chat')">⚡ Activar comodín Chat</button>
  <button class="btn-a btn-close" onclick="cerrarActivacion()">✕ Cerrar activación</button>
  <button class="btn-a btn-hide" onclick="ocultarTodo()">🙈 Ocultar HUD</button>
  <button class="btn-a btn-emergency" onclick="resetEmergencia()">🔄 RESET EMERGENCIA</button>
</div>

<!-- Referencia (solo nombre y descripción, sin números ni orden) -->
<div class="section-title">Referencia — qué hace cada comodín</div>
<div class="ref-note">ℹ️ No muestra qué número tiene cada uno</div>
<div class="ref-grid" id="refGrid"></div>

<div class="status" id="statusBar"></div>

<script>
const LS='comodines_state';

const TODOS=[
  {emoji:'💚',titulo:'Recuperación',   desc:'Si ganas esta ronda recuperas media vida.',                          rareza:'comun'},
  {emoji:'🎲',titulo:'Lotería',        desc:'Ganas o pierdes media vida al azar. 50/50.',                        rareza:'comun'},
  {emoji:'🔄',titulo:'Inversión Total',desc:'Las opciones se invierten. Hay que votar mal para ganar.',          rareza:'raro'},
  {emoji:'💀',titulo:'Doble o nada',   desc:'Si pierdes esta ronda, pierdes 1 vida completa.',                   rareza:'raro'},
  {emoji:'🛡️',titulo:'Escudo',         desc:'Tu próximo error no te quita vida. Un fallo gratis.',               rareza:'raro'},
  {emoji:'⚔️',titulo:'Sabotaje',       desc:'Si el rival falla, pierde 1 vida completa en lugar de media.',      rareza:'raro'},
  {emoji:'🩸',titulo:'Robo de vida',   desc:'Le robas media vida al rival y te la sumas.',                       rareza:'epico'},
  {emoji:'🔀',titulo:'Ruleta de vidas',desc:'Las vidas de Sam y Chat se intercambian completamente.',            rareza:'epico'},
  {emoji:'✨',titulo:'Resurrección',   desc:'Recuperas TODAS tus vidas de golpe. Instantáneo.',                 rareza:'epico'},
];

let mazo=[];
let samIdx=null,chatIdx=null;
let samUsed=false,chatUsed=false;

// Referencia siempre visible pero en orden distinto al mazo
function renderRef(){
  const grid=document.getElementById('refGrid');
  grid.innerHTML='';
  // Mostrar en orden fijo (alfabético) para que no coincida con posición del mazo
  [...TODOS].sort((a,b)=>a.titulo.localeCompare(b.titulo)).forEach(c=>{
    const div=document.createElement('div');
    div.className='ref-row';
    div.innerHTML=`
      <div class="ref-emoji">${c.emoji}</div>
      <div class="ref-info">
        <div class="ref-name">${c.titulo}</div>
        <div class="ref-desc">${c.desc}</div>
        <div class="ref-rar ${c.rareza}">${c.rareza.toUpperCase()}</div>
      </div>`;
    grid.appendChild(div);
  });
}

function iniciarSorteo(){
  // Mezclar mazo nuevo cada vez
  mazo=[...TODOS].sort(()=>Math.random()-.5);
  samIdx=null;chatIdx=null;samUsed=false;chatUsed=false;
  updateHolders();
  updateBtns();
  // Mostrar selector Sam
  document.getElementById('samSelector').classList.add('show');
  document.getElementById('chatSelector').classList.remove('show');
  renderNumGrids();
  save({action:'sorteo',mazo});
  setStatus('Mazo iniciado — elige tu carta','ok');
}

function renderNumGrids(){
  ['sam','chat'].forEach(side=>{
    const grid=document.getElementById(side+'NumGrid');
    grid.innerHTML='';
    mazo.forEach((_,i)=>{
      const btn=document.createElement('button');
      btn.className='num-btn';
      btn.textContent=i+1;
      const otherIdx=side==='sam'?chatIdx:samIdx;
      btn.disabled=(i===otherIdx);
      btn.onclick=()=>side==='sam'?elegirSam(i):elegirChat(i);
      grid.appendChild(btn);
    });
  });
}

function elegirSam(idx){
  samIdx=idx;
  document.getElementById('samSelector').classList.remove('show');
  // Mostrar selector Chat
  document.getElementById('chatSelector').classList.add('show');
  renderNumGrids(); // refresh para deshabilitar la carta que eligió Sam
  document.getElementById('btnRevSam').disabled=false;
  updateHolders();updateBtns();
  setStatus(`Sam eligió carta ${idx+1} — ahora asigna la del Chat`,'ok');
}

function elegirChat(idx){
  if(idx===samIdx){setStatus('Esa carta ya es tuya','err');return;}
  chatIdx=idx;
  document.getElementById('chatSelector').classList.remove('show');
  document.getElementById('btnRevChat').disabled=false;
  updateHolders();updateBtns();
  setStatus(`Chat tiene carta ${idx+1} — listo para revelar`,'ok');
}

function revelarSam(){
  if(samIdx===null)return;
  save({action:'chooseSam',idx:samIdx});
  setStatus('Revelando carta de Sam...','ok');
}

function revelarChat(){
  if(chatIdx===null)return;
  save({action:'chooseChat',idx:chatIdx});
  setStatus('Revelando carta del Chat...','ok');
}

function activar(side){
  save({action:side==='sam'?'activateSam':'activateChat'});
  if(side==='sam')samUsed=true; else chatUsed=true;
  updateHolders();updateBtns();
  setStatus(`Comodín de ${side==='sam'?'Sam':'el Chat'} activado`,'ok');
}

function cerrarActivacion(){save({action:'closeAct'});setStatus('Activación cerrada','ok');}
function ocultarTodo(){save({action:'hide'});setStatus('HUD oculto','');}

function resetEmergencia(){
  samIdx=null;chatIdx=null;samUsed=false;chatUsed=false;
  ['samSelector','chatSelector'].forEach(id=>document.getElementById(id).classList.remove('show'));
  updateHolders();updateBtns();
  save({action:'reset'});
  setStatus('🔄 Reset de emergencia completo','ok');
}

function updateHolders(){
  const samEl=document.getElementById('samHolderContent');
  const chatEl=document.getElementById('chatHolderContent');
  if(samIdx!==null){
    const c=mazo[samIdx];
    samEl.innerHTML=`<div class="holder-card">
      <div class="holder-card-name">${c.emoji} ${c.titulo}${samUsed?' <span style="color:rgba(255,255,255,.3);font-size:9px;">· USADO</span>':''}</div>
      <div class="holder-card-desc">${c.desc}</div>
      <div class="holder-card-rarity ${c.rareza}">${c.rareza.toUpperCase()}</div>
    </div>`;
  } else samEl.innerHTML='<span style="color:rgba(255,255,255,.2);font-size:10px;">Sin carta</span>';
  if(chatIdx!==null){
    const c=mazo[chatIdx];
    chatEl.innerHTML=`<div class="holder-card">
      <div class="holder-card-name">${c.emoji} ${c.titulo}${chatUsed?' <span style="color:rgba(255,255,255,.3);font-size:9px;">· USADO</span>':''}</div>
      <div class="holder-card-desc">${c.desc}</div>
      <div class="holder-card-rarity ${c.rareza}">${c.rareza.toUpperCase()}</div>
    </div>`;
  } else chatEl.innerHTML='<span style="color:rgba(255,255,255,.2);font-size:10px;">Sin carta</span>';
}

function updateBtns(){
  document.getElementById('btnRevSam').disabled=samIdx===null;
  document.getElementById('btnRevChat').disabled=chatIdx===null;
  document.getElementById('btnActSam').disabled=samIdx===null||samUsed;
  document.getElementById('btnActChat').disabled=chatIdx===null||chatUsed;
}

function save(extra={}){
  localStorage.setItem(LS,JSON.stringify({mazo,samIdx,chatIdx,samUsed,chatUsed,ts:Date.now(),...extra}));
}

function setStatus(msg,type){
  const el=document.getElementById('statusBar');
  el.textContent=msg;el.className='status '+(type||'');
}

renderRef();
</script>
</body>
</html>
